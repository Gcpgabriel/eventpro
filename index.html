NO<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0f1a">
<meta name="description" content="EventPro — Sistema de Gestão Profissional de Eventos">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EventPro">
<title>EventPro — Gestão de Eventos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');
:root{--bg:#0b0f1a;--bg2:#111827;--bg3:#1a2233;--surface:#1e2d3d;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#eef2ff;--text2:#94a3b8;--text3:#475569;--accent:#6366f1;--accent2:#a5b4fc;--glow:rgba(99,102,241,0.15);--green:#10b981;--gbg:rgba(16,185,129,0.12);--amber:#f59e0b;--abg:rgba(245,158,11,0.12);--red:#ef4444;--rbg:rgba(239,68,68,0.12);--blue:#3b82f6;--bbg:rgba(59,130,246,0.12);--purple:#8b5cf6;--pbg:rgba(139,92,246,0.12);--cyan:#06b6d4;--cbg:rgba(6,182,212,0.12);--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--r:10px;--r2:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* LAYOUT */
#app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:228px;min-width:228px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .3s;}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s;}
.sb-logo:hover{background:var(--bg3);}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:14px;color:#fff;flex-shrink:0;}
.logo-name{font-family:var(--fh);font-weight:700;font-size:15px;}
.logo-pro{font-size:9px;background:var(--accent);color:#fff;padding:2px 5px;border-radius:4px;font-weight:700;margin-left:auto;}
.sb-nav{flex:1;overflow-y:auto;padding:8px 8px;}
.nav-sec{margin-bottom:4px;}
.nav-sec-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:8px 10px 4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;position:relative;user-select:none;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--glow);color:var(--accent2);font-weight:500;}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--accent);border-radius:0 3px 3px 0;}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;font-size:10px;padding:1px 5px;border-radius:10px;font-weight:700;}
.nb-red{background:var(--red);color:#fff;}
.nb-amber{background:var(--amber);color:#000;}
.nb-green{background:var(--green);color:#fff;}
.sb-footer{padding:10px 8px;border-top:1px solid var(--border);}
.user-row{display:flex;align-items:center;gap:9px;padding:8px;border-radius:var(--r);cursor:pointer;transition:background .15s;}
.user-row:hover{background:var(--bg3);}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.user-name{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-size:10.5px;color:var(--text3);}
.user-actions{position:relative;margin-left:auto;display:flex;align-items:center;}
.user-menu-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;}
.user-menu-btn:hover{background:var(--bg3);color:var(--text);}
.user-menu{position:absolute;right:0;bottom:34px;min-width:210px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;box-shadow:0 10px 24px rgba(0,0,0,.35);padding:6px;z-index:20;}
.user-menu-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-size:12.5px;text-align:left;cursor:pointer;}
.user-menu-item:hover{background:var(--bg3);color:var(--text);}
.user-menu-item.danger{color:var(--red);}

#app.sidebar-collapsed #sidebar{width:54px;min-width:54px;}
#app.sidebar-collapsed .logo-name,
#app.sidebar-collapsed .logo-pro,
#app.sidebar-collapsed .nav-item span:not(.nav-icon),
#app.sidebar-collapsed .nav-badge,
#app.sidebar-collapsed .user-name,
#app.sidebar-collapsed .user-role,
#app.sidebar-collapsed .nav-sec-label{display:none;}
#app.sidebar-collapsed .nav-item{justify-content:center;padding:10px;}
#app.sidebar-collapsed .sb-logo{justify-content:center;padding:14px 10px;}
#app.sidebar-collapsed .user-row{justify-content:center;cursor:default;pointer-events:none;}
#app.sidebar-collapsed .user-actions{display:none;}
#app.sidebar-collapsed .user-menu{right:-8px;}

/* MAIN */
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
#topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;}
.topbar-title{font-family:var(--fh);font-size:16px;font-weight:600;flex:1;}
.sync-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 7px;border-radius:20px;cursor:default;white-space:nowrap;}
.sync-badge.sync-ok{background:rgba(34,197,94,.15);color:#16a34a;}
.sync-badge.sync-pending{background:rgba(99,102,241,.15);color:var(--accent);animation:syncpulse 1s infinite;}
.sync-badge.sync-error{background:rgba(239,68,68,.15);color:#dc2626;}
@keyframes syncpulse{0%,100%{opacity:1}50%{opacity:.4}}
.search-box{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:5px 11px;font-size:12.5px;color:var(--text3);width:190px;}
#content{flex:1;overflow-y:auto;padding:18px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);cursor:pointer;font-size:12.5px;font-weight:500;border:none;font-family:var(--fb);transition:all .15s;line-height:1;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#4f46e5;transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--bg3);color:var(--text);}
.btn-sm{padding:5px 10px;font-size:11.5px;}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;border-radius:8px;}
.btn-danger{background:var(--rbg);color:var(--red);border:1px solid var(--red);}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:border-color .2s;}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.card-title{font-family:var(--fh);font-size:13.5px;font-weight:600;flex:1;}
.card-body{padding:14px 16px;}

/* GRID */
.grid{display:grid;gap:14px;}
.g2{grid-template-columns:1fr 1fr;}
.g3{grid-template-columns:1fr 1fr 1fr;}
.g4{grid-template-columns:repeat(4,1fr);}

/* STAT CARDS */
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;cursor:pointer;transition:border-color .2s;}
.stat:hover{border-color:var(--border2);}
.stat-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.stat-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.stat-chg{font-size:10.5px;padding:2px 6px;border-radius:20px;font-weight:700;}
.up{background:var(--gbg);color:var(--green);}
.dn{background:var(--rbg);color:var(--red);}
.stat-val{font-family:var(--fh);font-size:24px;font-weight:700;line-height:1;margin-bottom:3px;}
.stat-lbl{font-size:11.5px;color:var(--text2);}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700;}
.b-green{background:var(--gbg);color:var(--green);}
.b-amber{background:var(--abg);color:var(--amber);}
.b-red{background:var(--rbg);color:var(--red);}
.b-blue{background:var(--bbg);color:var(--blue);}
.b-purple{background:var(--pbg);color:var(--purple);}
.b-cyan{background:var(--cbg);color:var(--cyan);}
.b-gray{background:rgba(255,255,255,0.06);color:var(--text2);}

/* TABLE */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:9px 13px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:11px 13px;border-bottom:1px solid var(--border);font-size:12.5px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.015);}

/* FORM */
.fg{margin-bottom:13px;}
.fl{display:block;font-size:11.5px;font-weight:600;color:var(--text2);margin-bottom:5px;}
.fc{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:8px 11px;color:var(--text);font-size:13px;font-family:var(--fb);outline:none;transition:border-color .15s;}
.fc:focus{border-color:var(--accent);}
textarea.fc{resize:vertical;min-height:72px;}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-ov.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;transform:translateY(16px);transition:transform .2s;}
.modal-ov.open .modal{transform:translateY(0);}
.modal-hd{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.modal-title{font-family:var(--fh);font-size:15px;font-weight:600;flex:1;}
.modal-bd{padding:18px;}
.modal-ft{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}

/* PROGRESS */
.prog{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.prog-bar{height:100%;border-radius:3px;transition:width .5s;}

/* TABS */
.tabs{display:flex;gap:2px;padding:3px;background:var(--bg3);border-radius:var(--r);width:fit-content;}
.tab{padding:5px 12px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--text2);transition:all .15s;}
.tab.active{background:var(--bg2);color:var(--text);font-weight:500;}

/* LIST */
.li{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--border);}
.li:last-child{border-bottom:none;}
.li-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.li-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-sub{font-size:11.5px;color:var(--text2);margin-top:2px;}

/* CHECKLIST */
.ci{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.ci:last-child{border-bottom:none;}
.cb{width:17px;height:17px;border-radius:5px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.cb.on{background:var(--green);border-color:var(--green);}

/* NPS */
.nps-row{display:flex;gap:5px;flex-wrap:wrap;}
.nps-d{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .15s;background:var(--bg3);color:var(--text2);}
.nps-d:hover,.nps-d.sel{border-color:var(--accent);color:var(--accent2);background:var(--glow);}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:38px;width:370px;max-height:88vh;overflow-y:auto;}
.login-logo{text-align:center;margin-bottom:26px;}
.login-ico{width:50px;height:50px;background:var(--accent);border-radius:13px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:20px;color:#fff;margin-bottom:10px;}

/* NOTIF */
#notifs{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:7px;}
.notif{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 14px;font-size:12.5px;display:flex;align-items:center;gap:9px;transform:translateX(120%);transition:transform .3s;pointer-events:all;max-width:280px;}
.notif.show{transform:translateX(0);}

/* PULL TO REFRESH */
#pull-refresh-indicator{position:fixed;left:50%;top:8px;transform:translate(-50%,-140%);transition:transform .2s ease,opacity .2s ease;background:var(--bg2);border:1px solid var(--border2);border-radius:999px;padding:6px 12px;font-size:11.5px;color:var(--text2);z-index:220;pointer-events:none;opacity:0;}
#pull-refresh-indicator.show{transform:translate(-50%,0);opacity:1;}
#pull-refresh-indicator.ready{border-color:var(--accent);color:var(--accent2);}
#pull-refresh-indicator.loading{border-color:var(--green);color:var(--green);}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-d{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:3px 2px;border-radius:var(--r);font-size:11px;cursor:pointer;transition:background .15s;position:relative;}
.cal-d:hover{background:var(--bg3);}
.cal-d.today{background:var(--glow);color:var(--accent2);font-weight:700;}
.cal-d.has-ev::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:2px;}
.cal-d.other{color:var(--text3);}
.cal-d.sel-day{outline:1px solid var(--accent);background:var(--glow);color:var(--accent2);font-weight:700;}

/* AGENDA DIA */
.day-nav{display:flex;align-items:center;gap:8px;margin:10px 0 12px;}
.day-strip{display:flex;gap:8px;overflow-x:auto;scroll-snap-type:x mandatory;padding:2px 0;flex:1;}
.day-pill{min-width:88px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);cursor:pointer;scroll-snap-align:start;transition:all .15s;text-align:center;}
.day-pill:hover{border-color:var(--border2);}
.day-pill.active{background:var(--glow);border-color:var(--accent);}
.day-pill-dow{font-size:10px;color:var(--text2);line-height:1.2;}
.day-pill-date{font-size:12px;font-weight:600;}
.agenda-day-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;cursor:pointer;transition:border-color .2s,transform .15s;}
.agenda-day-card:hover{border-color:var(--accent);transform:translateY(-1px);}

/* EVENT DRAWER */
.drawer-ov{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:140;opacity:0;pointer-events:none;transition:opacity .2s;}
.drawer-ov.open{opacity:1;pointer-events:all;}
.drawer{position:absolute;right:0;top:0;height:100%;width:min(92vw,440px);background:var(--bg2);border-left:1px solid var(--border2);padding:16px;overflow-y:auto;transform:translateX(100%);transition:transform .2s;}
.drawer-ov.open .drawer{transform:translateX(0);}

/* DIVIDER */
.div{height:1px;background:var(--border);margin:14px 0;}

/* EMPTY */
.empty{text-align:center;padding:36px 20px;color:var(--text3);}
.empty-ico{font-size:34px;margin-bottom:10px;}

/* EVENT CARD */
.ev-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;cursor:pointer;transition:border-color .2s,transform .15s;flex:1;min-width:260px;}
.ev-card:hover{border-color:var(--accent);transform:translateY(-1px);}

/* RESPONSIVE */
.mob-menu-btn{display:none;width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:18px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;}
.sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:149;}

@media(max-width:768px){
  /* Sidebar como overlay */
  #sidebar{
    position:fixed;left:0;top:0;height:100%;z-index:150;
    width:240px;min-width:240px;
    transform:translateX(-100%);
    transition:transform .25s;
    box-shadow:4px 0 24px rgba(0,0,0,.45);
  }
  #sidebar.mob-open{transform:translateX(0);}
  /* Mostra todos os itens da sidebar (não colapsa em mobile) */
  #sidebar .logo-name,#sidebar .logo-pro,
  #sidebar .nav-item span:not(.nav-icon),
  #sidebar .nav-badge,#sidebar .user-name,
  #sidebar .user-role,#sidebar .nav-sec-label{display:unset;}
  #sidebar .nav-item{justify-content:flex-start;padding:7px 10px;}
  #sidebar .sb-logo{justify-content:flex-start;padding:18px 16px 14px;}
  #sidebar .user-row{cursor:pointer;pointer-events:all;}
  #sidebar .user-actions{display:flex;}
  /* Fundo escuro ao abrir sidebar */
  .sb-backdrop.mob-open{display:block;}
  /* Botão hambúrguer visível */
  .mob-menu-btn{display:inline-flex;}
  /* Content ocupa tudo */
  #main{width:100%;}
  #content{padding:12px 10px;}
  /* Topbar */
  .topbar-title{font-size:14px;}
  .search-box{display:none;}
  /* Grids */
  .g4,.g3{grid-template-columns:1fr 1fr;}
  .g2{grid-template-columns:1fr;}
  /* Stat cards menores */
  .stat{padding:11px 12px;}
  .stat-val{font-size:20px;}
  /* Tabelas: padding menor */
  th{padding:7px 9px;font-size:10px;}
  td{padding:9px 9px;font-size:12px;}
  /* Cards */
  .card-header{padding:11px 13px;}
  .card-body{padding:11px 13px;}
  /* Modal: quase fullscreen */
  .modal-ov{padding:0;align-items:flex-end;}
  .modal{border-radius:16px 16px 0 0;max-height:92vh;max-width:100%;}
  /* Login card full-width */
  .login-card{width:calc(100vw - 28px);padding:26px 20px;border-radius:16px;}
  /* NPS dots */
  .nps-d{width:29px;height:29px;font-size:11.5px;}
  /* Day pills */
  .day-pill{min-width:70px;padding:6px 8px;}
  /* Botões nos forms: full width */
  .modal-ft{flex-direction:column-reverse;gap:6px;}
  .modal-ft .btn{width:100%;justify-content:center;}
  /* Sync badge menor */
  .sync-badge{font-size:10px;padding:2px 5px;}
  /* Notif toast: full width */
  #notifs{left:10px;right:10px;top:10px;}
  .notif{max-width:100%;}
}

@keyframes pulseDot{
  0%{opacity:.35;transform:scale(.8);}
  50%{opacity:1;transform:scale(1);}
  100%{opacity:.35;transform:scale(.8);}
}
</style>
</head>
<body>
<div id="notifs"></div>
<div id="root"></div>
<div id="pull-refresh-indicator" aria-live="polite">Puxe para atualizar</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./eventpro-supabase.js"></script>
<script>
function pgConfig(){
  const co=DB.company;
  const isAdmin=currentRole()==='admin';
  const compId=Number(S.companyId||1);
  const sysUsers=(DB_ALL?.users||[]).filter(u=>Number(u.empresa_id)===compId);
  const employees=sysUsers.filter(u=>roleNorm(u.role)!=='admin');
  const MAX_EMPLOYEES=3;
  const canAddUser=isAdmin&&employees.length<MAX_EMPLOYEES;
  const logoPreview=co.logo?`<img src="${co.logo}" alt="Logo da empresa" style="max-height:120px;max-width:300px;display:block;border-radius:8px;border:1px solid var(--border);margin-top:8px;">`:'<div style="color:var(--muted);font-size:13px;margin-top:8px;">Nenhuma logo carregada</div>';
  const editFields=isAdmin?`

async function manualSync(){
  if(S.syncStatus.pending)return;
  if(!S.companyId){toast('Nenhuma empresa ativa na sessão.','err');return;}
  if(!window.EventProSupabase?.pushSnapshot){toast('Módulo de nuvem não carregado ainda. Aguarde.','err');return;}
  const _start=Date.now();
  S.syncStatus.pending=true;
  S.syncStatus.error=false;
  render();
  try{
    const res=await window.EventProSupabase.pushSnapshot(Number(S.companyId),DB_ALL,CLISTS_ALL);
    if(res?.error)throw res.error;
    S.syncStatus.lastSyncAt=Date.now();
    S.syncStatus.lastDuration=Date.now()-_start;
    S.syncStatus.error=false;
    toast(`✅ Sincronizado em ${S.syncStatus.lastDuration}ms`);
  }catch(e){
    S.syncStatus.error=true;
    toast('Falha ao sincronizar: '+(e?.message||e),'err');
  }finally{
    S.syncStatus.pending=false;
    render();
  }
}
async function manualPull(){
  if(S.syncStatus.pending)return;
  if(!S.companyId){toast('Nenhuma empresa ativa na sessão.','err');return;}
  S.syncStatus.pending=true;
  render();
  try{
    const result=await syncCloudSnapshotOnBoot({force:true});
    if(result?.updated)toast('✅ Dados atualizados da nuvem!');
    else toast('Dados locais já estão na versão mais recente.');
    S.syncStatus.error=false;
  }catch(e){
    S.syncStatus.error=true;
    toast('Falha ao baixar da nuvem: '+(e?.message||e),'err');
  }finally{
    S.syncStatus.pending=false;
    render();
  }
}
function handleLogoUpload(e){
  const file=e.target.files[0];
  if(!file)return;
  const errEl=document.getElementById('cfg-logo-error');
  if(file.size>2*1024*1024){
    errEl.textContent='Arquivo muito grande. O tamanho máximo é 2 MB.';
    errEl.style.display='block';
    e.target.value='';
    return;
  }
  errEl.style.display='none';
  const reader=new FileReader();
  reader.onload=ev=>{
    DB.company.logo=ev.target.result;
    const idx=DB_ALL.companies.findIndex(c=>c.id===Number(S.companyId||1));
    if(idx>=0)DB_ALL.companies[idx].logo=ev.target.result;
    saveDB();
    render();
  };
  reader.readAsDataURL(file);
}

function removeLogo(){
  DB.company.logo='';
  const idx=DB_ALL.companies.findIndex(c=>c.id===Number(S.companyId||1));
  if(idx>=0)DB_ALL.companies[idx].logo='';
  saveDB();
  render();
}

function saveConfig(){
  DB.company.name=document.getElementById('cfg-name').value.trim();
  DB.company.owner=document.getElementById('cfg-owner').value.trim();
  if(!saveCompanyProfileFromInputs('cfg-'))return;
  const idx=DB_ALL.companies.findIndex(c=>c.id===Number(S.companyId||1));
  if(idx>=0)Object.assign(DB_ALL.companies[idx],{
    name:DB.company.name,owner:DB.company.owner,cnpj:DB.company.cnpj,
    phone:DB.company.phone,email:DB.company.email,city:DB.company.city,address:DB.company.address,
    specialties:DB.company.specialties,
  });
  toast('Configurações salvas com sucesso ✅');
  render();
}

function normalizeFinanceEntry(entry,type){
  const r={...entry};
  const due=r.data_vencimento||r.due||new Date().toISOString().slice(0,10);
  r.data_vencimento=due;
  r.due=due;

  if(type==='rec'){
    if(r.status==='pendente')r.status='a_receber';
    if(r.status==='pago')r.status='recebido';
    if(r.status!=='a_receber'&&r.status!=='recebido')r.status='a_receber';
  }else{
    if(r.status==='pendente')r.status='a_pagar';
    if(r.status!=='a_pagar'&&r.status!=='pago')r.status='a_pagar';
  }

  return r;
}

function normalizeClistsStore(raw){
  if(!raw||typeof raw!=='object')return{'1':{}};
  const keys=Object.keys(raw);
  const nested=keys.length&&keys.every(k=>raw[k]&&typeof raw[k]==='object'&&!Array.isArray(raw[k]));
  if(nested&&keys.some(k=>raw[k]&&raw[k][1]!==undefined))return raw;
  return{'1':raw};
}

function paymentMethodKey(name){
  return String(name||'')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,' ')
    .trim();
}

function ensureDefaultPaymentMethodsForStore(store){
  store.paymentMethods=Array.isArray(store.paymentMethods)?store.paymentMethods:[];
  const legacyAliases={
    'pix':'pix - a vista (assinatura do contrato)',
    'cartao':'cartao de credito (a vista)',
    'cartão':'cartao de credito (a vista)',
    'pix (entrada + restante)':'pix - entrada + restante (porcentagem variavel)',
    'bk':'bk - boleto 7 dias',
  };
  const defaultByKey={};
  DEFAULT_PAYMENT_METHODS.forEach(pm=>{defaultByKey[paymentMethodKey(pm.name)]=pm;});

  // Migra nomes antigos para o novo padrao sem perder IDs/referencias.
  store.paymentMethods=store.paymentMethods.map(pm=>{
    const key=paymentMethodKey(pm?.name);
    const aliasTarget=legacyAliases[key];
    if(!aliasTarget)return pm;
    const target=defaultByKey[paymentMethodKey(aliasTarget)];
    if(!target)return pm;
    return {
      ...pm,
      name:target.name,
      description:target.description,
    };
  });

  // Remove duplicados gerados por migracao/legacy, mantendo o menor id.
  const dedupMap=new Map();
  store.paymentMethods.forEach(pm=>{
    const key=paymentMethodKey(pm?.name);
    if(!key)return;
    if(!dedupMap.has(key)||Number(pm?.id||0)<Number(dedupMap.get(key)?.id||0)){
      dedupMap.set(key,pm);
    }
  });
  store.paymentMethods=Array.from(dedupMap.values()).sort((a,b)=>Number(a.id||0)-Number(b.id||0));

  const existing=new Set(store.paymentMethods.map(pm=>paymentMethodKey(pm?.name)));
  let idCursor=store.paymentMethods.length?Math.max(...store.paymentMethods.map(pm=>Number(pm?.id||0))):0;
  DEFAULT_PAYMENT_METHODS.forEach((base)=>{
    const key=paymentMethodKey(base.name);
    if(existing.has(key))return;
    idCursor+=1;
    store.paymentMethods.push({
      id:idCursor,
      name:base.name,
      description:base.description,
      empresa_id:1,
    });
    existing.add(key);
  });
}

function getEventProfitabilityRows(){
  const rec=(DB.finance?.rec||[]).map(r=>normalizeFinanceEntry(r,'rec'));
  const pay=(DB.finance?.pay||[]).map(p=>normalizeFinanceEntry(p,'pay'));

  const events=(DB.events||[]);
  const baseRows=events.map(ev=>{
    const eventReceivables=rec.filter(item=>Number(item.eid)===Number(ev.id));
    const eventPayables=pay.filter(item=>Number(item.eid)===Number(ev.id));
    const plannedRevenue=eventReceivables.reduce((acc,item)=>acc+Number(item.val||0),0)||Math.max(0,Number(ev.value||0));
    const receivedRevenue=eventReceivables
      .filter(item=>item.status==='recebido')
      .reduce((acc,item)=>acc+Number(item.val||0),0);
    const directCosts=eventPayables.reduce((acc,item)=>acc+Number(item.val||0),0);
    const paidCosts=eventPayables
      .filter(item=>item.status==='pago')
      .reduce((acc,item)=>acc+Number(item.val||0),0);
    const consumableCosts=Math.max(0,Number(ev.consumablesTotalCost||0));
    const equipmentIds=new Set(
      [
        ...(Array.isArray(ev.equip)?ev.equip:[]),
        ...(Array.isArray(ev.extraEquipPlan)?ev.extraEquipPlan.map(item=>item.eqId):[]),
      ].map(id=>Number(id)).filter(Number.isFinite)
    );

    return {
      event:ev,
      plannedRevenue,
      receivedRevenue,
      directCosts,
      paidCosts,
      consumableCosts,
      temporaryRentalAllocated:0,
      indirectAllocated:0,
      equipmentIds,
    };
  });

  const revenueBase=baseRows.reduce((acc,row)=>acc+Math.max(0,row.plannedRevenue),0);
  const eventCount=Math.max(1,baseRows.length);

  // Exclude per-event temp-rental entries (eid set) from the global proportional allocation to avoid double-counting
  const tempRentalPayables=pay.filter(item=>item.type==='temp-rental'&&Number(item.equipId)&&!Number(item.eid||0));
  tempRentalPayables.forEach(entry=>{
    const relatedRows=baseRows.filter(row=>row.equipmentIds.has(Number(entry.equipId)));
    if(!relatedRows.length)return;
    const share=Number(entry.val||0)/relatedRows.length;
    relatedRows.forEach(row=>{row.temporaryRentalAllocated+=share;});
  });

  return baseRows
    .map(row=>{
      const totalPlannedCost=row.directCosts+row.consumableCosts+row.temporaryRentalAllocated+row.indirectAllocated;
      const totalPaidCost=row.paidCosts+row.consumableCosts+row.temporaryRentalAllocated+row.indirectAllocated;
      const projectedProfit=row.plannedRevenue-totalPlannedCost;
      const realizedProfit=row.receivedRevenue-totalPaidCost;

      return {
        ...row,
        totalPlannedCost,
        totalPaidCost,
        projectedProfit,
        realizedProfit,
        marginPct:row.plannedRevenue>0?(projectedProfit/row.plannedRevenue)*100:null,
      };
    })
    .sort((a,b)=>startTsOfEvent(b.event)-startTsOfEvent(a.event));
}

async function hashPassword(pass){
  const enc=new TextEncoder();
  const buf=await crypto.subtle.digest('SHA-256',enc.encode(String(pass)));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function isHashed(p){return typeof p==='string'&&p.length===64&&/^[0-9a-f]+$/.test(p);}
async function verifyPassword(plain,stored){
  if(!stored)return false;
  if(isHashed(stored))return(await hashPassword(plain))===stored;
  return String(plain)===String(stored); // legacy plain-text backward compat
}

async function ensureSupabaseAuthForLocalUser(user,password){
  if(!window.EventProSupabase||!user?.email||!password){
    return { session:null, error:new Error('Supabase indisponível para provisionamento.') };
  }

  const normalizedEmail=String(user.email).trim().toLowerCase();
  let remoteLogin=await window.EventProSupabase.signInWithPassword(normalizedEmail,password);
  if(!remoteLogin?.error){
    const session=await window.EventProSupabase.refreshSession();
    return { session, error:null, created:false };
  }

  const companyRef=(DB_ALL?.companies||[]).find(c=>Number(c.id)===Number(user.empresa_id||S.companyId||1));
  const metadata={
    full_name:user.name||'',
    role:roleNorm(user.role),
    company_id:Number(user.empresa_id||S.companyId||1),
    company_name:companyRef?.name||DB.company?.name||'',
  };

  if(window.EventProSupabase.createManagedUser){
    const remoteCreate=await window.EventProSupabase.createManagedUser(normalizedEmail,password,metadata);
    const createMessage=String(remoteCreate?.error?.message||'').toLowerCase();
    const alreadyExists=createMessage.includes('already registered')||createMessage.includes('already been registered')||createMessage.includes('user already registered');
    if(remoteCreate?.error&&!alreadyExists){
      return { session:null, error:remoteCreate.error, created:false };
    }

    remoteLogin=await window.EventProSupabase.signInWithPassword(normalizedEmail,password);
    if(!remoteLogin?.error){
      const session=await window.EventProSupabase.refreshSession();
      return { session, error:null, created:true };
    }
  }

  return { session:null, error:remoteLogin?.error||new Error('Falha ao autenticar no Supabase.') };
}

          }else{
            S.syncStatus.lastSyncAt=Date.now();
            S.syncStatus.lastDuration=Date.now()-_pushStart;
            S.syncStatus.error=false;
          }
          render();
        })
        .catch(function(e){
          S.syncStatus.pending=false;
          S.syncStatus.error=true;
          console.warn('Cloud sync push falhou (não crítico):',e);
          toastSyncWarn('Salvo localmente, mas não foi possível enviar para nuvem agora.');
          render();
        });
    }
  }catch(e){
    console.error('Erro ao salvar:',e);
    toast('Falha ao salvar dados localmente.','err');
  }

async function syncCloudSnapshotOnBoot(options){
  const opts=options||{};
  if(!window.EventProSupabase?.pullSnapshot)return {updated:false,reason:'no-client'};
  if(!S.in||!S.currentUser)return {updated:false,reason:'no-user'};

  const session=await window.EventProSupabase.refreshSession();
  if(!session)return {updated:false,reason:'no-session'};

  const companyId=Number(S.companyId||S.currentUser?.empresa_id||0);
  if(!companyId)return {updated:false,reason:'no-company'};

  const result=await window.EventProSupabase.pullSnapshot(companyId);
  if(result?.error){
    console.warn('Cloud sync pull falhou:',result.error);
    return {updated:false,reason:'pull-error',error:result.error};
  }
  if(!result?.data?.db)return {updated:false,reason:'no-data'};

  const cloudDBCandidate=normalizeMultiTenantStore(result.data.db);
  const cloudClistsCandidate=result.data.clists?normalizeClistsStore(result.data.clists):null;
  const localCount=countTenantRecords(DB_ALL,CLISTS_ALL,companyId);
  const cloudCount=countTenantRecords(cloudDBCandidate,cloudClistsCandidate?{[String(companyId)]:cloudClistsCandidate[String(companyId)]||{}}:{},companyId);

  const localTs=getLocalDataTs();
  const cloudTs=getCloudSnapshotTs(result);
  // force:true → usuário pediu explicitamente; sempre aplica a nuvem (ex: botão "Baixar da nuvem")
  // Realtime → só aplica se a nuvem for realmente mais nova (evita sobrescrever edição local concorrente)
  const shouldKeepLocal=!opts.force&&(
    (localTs>0&&localCount>0&&(cloudTs===0||cloudTs<=localTs))||(localCount>0&&cloudCount===0)
  );
  if(shouldKeepLocal){
    // Evita apagar alterações locais quando a nuvem está atrasada.
    if(window.EventProSupabase?.pushSnapshot){
      try{
        const pushRes=await window.EventProSupabase.pushSnapshot(companyId,DB_ALL,CLISTS_ALL);
        if(pushRes?.error)console.warn('Cloud resync após detectar snapshot antigo falhou:',pushRes.error);
      }catch(pushErr){
        console.warn('Cloud resync após detectar snapshot antigo falhou:',pushErr);
      }
    }
    if(cloudCount===0&&localCount>0){
      toastSyncWarn('Snapshot da nuvem veio vazio; mantivemos seus dados locais.');
    }
    return {updated:false,reason:'cloud-stale-kept-local'};
  }

  try{
    const cloudDB=cloudDBCandidate;
    const localUsers=deepClone(DB_ALL.users||[]);
    DB_ALL=cloudDB;
    // Preserva segredos locais para manter login offline e first-access flow.
    DB_ALL.users=DB_ALL.users.map(function(cu){
      const lu=localUsers.find(function(u){ return Number(u.id)===Number(cu.id); });
      return lu?Object.assign({},cu,{
        passwordHash:lu.passwordHash||cu.passwordHash,
        password:lu.password||cu.password,
        mustResetPassword:lu.mustResetPassword!=null?lu.mustResetPassword:cu.mustResetPassword,
      }):cu;
    });

    if(result.data.clists){
      CLISTS_ALL=normalizeClistsStore(result.data.clists);
      localStorage.setItem('eventpro_clists_all',JSON.stringify(CLISTS_ALL));
    }

    localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
    setLocalDataTs(cloudTs||Date.now());
    const freshUser=DB_ALL.users.find(function(u){ return Number(u.id)===Number(S.currentUser?.id); })||S.currentUser;
    applyTenantScope(freshUser);
    if(opts.skipRender!==true)render();
    console.log('Cloud sync concluído com sucesso.');
    return {updated:true,reason:'ok'};
  }catch(syncErr){
    console.warn('Erro ao aplicar snapshot da nuvem:',syncErr);
    return {updated:false,reason:'apply-error',error:syncErr};
  }
}

async function runPullRefreshSync(){
  if(PULL_REFRESH.running)return;
  PULL_REFRESH.running=true;
  updatePullRefreshIndicator({show:true,loading:true,text:'Atualizando dados...'});
  try{
    const status=await syncCloudSnapshotOnBoot({force:true});
    if(status?.updated){
      toast('Dados atualizados com sucesso.','ok');
    }else if(status?.reason==='no-session'){
      toast('Sessão da nuvem expirada. Faça login novamente.','warn');
    }else if(status?.reason!=='no-data'){
      toast('Não foi possível atualizar os dados agora.','warn');
    }
  }catch(error){
    console.warn('Pull-to-refresh falhou:',error);
    toast('Falha ao atualizar dados da nuvem.','err');
  }finally{
    PULL_REFRESH.running=false;
    resetPullRefreshUI();
  }
}

function installPullToRefreshGesture(){
  if(PULL_REFRESH.installed)return;
  PULL_REFRESH.installed=true;
  const TRIGGER_DISTANCE=72;
  const MAX_DISTANCE=120;

  document.addEventListener('touchstart',function(ev){
    if(!S.in||S.modal||PULL_REFRESH.running)return;
    if(ev.touches.length!==1)return;
    const content=document.getElementById('content');
    if(!content||content.scrollTop>0)return;
    const touch=ev.touches[0];
    PULL_REFRESH.dragging=true;
    PULL_REFRESH.armed=false;
    PULL_REFRESH.startY=touch.clientY;
    PULL_REFRESH.startX=touch.clientX;
    PULL_REFRESH.distance=0;
  },{passive:true});

  document.addEventListener('touchmove',function(ev){
    if(!PULL_REFRESH.dragging)return;
    const content=document.getElementById('content');
    if(!content){
      PULL_REFRESH.dragging=false;
      return;
    }
    const touch=ev.touches[0];
    const dy=touch.clientY-PULL_REFRESH.startY;
    const dx=touch.clientX-PULL_REFRESH.startX;
    if(Math.abs(dx)>Math.abs(dy)||dy<=0||content.scrollTop>0){
      PULL_REFRESH.dragging=false;
      resetPullRefreshUI();
      return;
    }

    const distance=Math.min(MAX_DISTANCE,dy*0.45);
    PULL_REFRESH.distance=distance;
    PULL_REFRESH.armed=distance>=TRIGGER_DISTANCE;
    ev.preventDefault();
    content.style.transition='none';
    content.style.transform=`translateY(${distance}px)`;
    updatePullRefreshIndicator({
      show:true,
      ready:PULL_REFRESH.armed,
      text:PULL_REFRESH.armed?'Solte para atualizar':'Puxe para atualizar',
    });
  },{passive:false});

  document.addEventListener('touchend',function(){
    if(!PULL_REFRESH.dragging)return;
    const shouldSync=PULL_REFRESH.armed;
    PULL_REFRESH.dragging=false;
    if(shouldSync){
      void runPullRefreshSync();
    }else{
      resetPullRefreshUI();
    }
  },{passive:true});

  document.addEventListener('touchcancel',function(){
    if(!PULL_REFRESH.dragging)return;
    PULL_REFRESH.dragging=false;
    resetPullRefreshUI();
  },{passive:true});
}

  }
}

async function updatePasswordFromRecovery(){
  const newPassword=(document.getElementById('reset-password-new')?.value||'').trim();
  const confirmPassword=(document.getElementById('reset-password-confirm')?.value||'').trim();

  if(!S.authRecovery.canReset){
    S.authRecovery.resetError='Abra este formulário a partir do link de recuperação enviado por e-mail.';
    S.authRecovery.resetMessage='';
    render();
    return;
  }
  const passwordValidation=validatePasswordPolicy(newPassword,confirmPassword);
  if(!passwordValidation.ok){
    S.authRecovery.resetError=passwordValidation.message;
    S.authRecovery.resetMessage='';
    render();
    return;
  }

  S.authRecovery.resetLoading=true;
  S.authRecovery.resetError='';
  S.authRecovery.resetMessage='';
  render();

  try{
    if(S.authRecovery.localUserId){
      const localUser=(DB_ALL?.users||[]).find(u=>Number(u.id)===Number(S.authRecovery.localUserId));
      if(!localUser)throw new Error('Usuário local não encontrado para redefinição.');
      if(window.EventProSupabase?.updateUserPassword){
        const remoteReset=await window.EventProSupabase.updateUserPassword(newPassword);
        if(remoteReset?.error)console.warn('Atualização de senha no Supabase não concluída no primeiro acesso:',remoteReset.error);
      }
      localUser.passwordHash=await hashPassword(newPassword);
      localUser.password='';
      localUser.mustResetPassword=false;
      localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
      applyTenantScope(localUser);
      S.in=true;
      S.page='dashboard';
      localStorage.setItem('eventpro_session_user',String(localUser.id));
      S.authRecovery.canReset=false;
      S.authRecovery.localUserId=null;
      S.authRecovery.resetLoading=false;
      S.authRecovery.resetMessage='Senha atualizada com sucesso. Bem-vindo ao EventPro.';
      setPublicRoute('/');
      render();
      return;
    }

    if(!window.EventProSupabase?.updateUserPassword){
      throw new Error('EventProSupabase indisponível para atualização de senha.');
    }

    // Captura o email da sessão ANTES de atualizar a senha
    // (após updateUser a sessão pode ser invalidada/trocada)
    let syncEmail=null;
    if(window.EventProSupabase.prepareRecoverySessionFromUrl){
      const prep=await window.EventProSupabase.prepareRecoverySessionFromUrl({requireSession:true});
      if(prep?.error)throw prep.error;
      if(prep?.sessionEstablished){
        S.authRecovery.canReset=true;
        syncEmail=(prep?.session?.user?.email||'').toLowerCase()||null;
      }
    }
    if(!syncEmail&&window.EventProSupabase.getClient){
      try{
        const preSession=await window.EventProSupabase.getClient().auth.getSession();
        syncEmail=(preSession?.data?.session?.user?.email||'').toLowerCase()||null;
      }catch(_){/* ignora */}
    }

    const res=await window.EventProSupabase.updateUserPassword(newPassword);
    if(res?.error)throw res.error;

    // Sincroniza hash local com o email capturado antes do update
    if(syncEmail&&DB_ALL?.users){
      const localUserByEmail=DB_ALL.users.find(u=>String(u.email||'').toLowerCase()===syncEmail);
      if(localUserByEmail){
        localUserByEmail.passwordHash=await hashPassword(newPassword);
        localUserByEmail.password='';
        localUserByEmail.mustResetPassword=false;
        localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
      }
    }else{
      console.warn('Hash sync: email da sessão de recovery não encontrado. Login local pode falhar.');
    }

    S.authRecovery.canReset=false;
    S.authRecovery.resetMessage='Senha atualizada com sucesso. Faça login com a nova senha.';
    sessionStorage.removeItem('eventpro_pwd_recovery_ready');

    const p1=document.getElementById('reset-password-new');
    const p2=document.getElementById('reset-password-confirm');
    if(p1)p1.value='';
    if(p2)p2.value='';

    setTimeout(()=>{
      S.loginView='login';
      setPublicRoute('/');
      render();
    },1200);
  }catch(error){
    console.error('Erro ao atualizar senha:',error);
    S.authRecovery.resetError='Não foi possível atualizar sua senha. Solicite um novo link e tente novamente.';
  }finally{
    S.authRecovery.resetLoading=false;
    render();
  }
}

function loadDB(){
  try{
    const savedAll=localStorage.getItem('eventpro_db_all');
    const legacy=localStorage.getItem('eventpro_db');
    DB_ALL=normalizeMultiTenantStore(savedAll?JSON.parse(savedAll):(legacy?JSON.parse(legacy):deepClone(DB)));

    const savedClistsAll=localStorage.getItem('eventpro_clists_all');
    const legacyClists=localStorage.getItem('eventpro_clists');
    CLISTS_ALL=normalizeClistsStore(savedClistsAll?JSON.parse(savedClistsAll):(legacyClists?JSON.parse(legacyClists):deepClone(clists)));

    // Persiste a versão normalizada para manter consistência entre sessões/tenants.
    localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
    localStorage.setItem('eventpro_clists_all',JSON.stringify(CLISTS_ALL));

    if(!Array.isArray(DB_ALL?.users)||!DB_ALL.users.length||!Array.isArray(DB_ALL?.companies)||!DB_ALL.companies.length){
      resetToDefaultStores();
      localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
      localStorage.setItem('eventpro_clists_all',JSON.stringify(CLISTS_ALL));
    }

    S.sidebarCollapsed=localStorage.getItem('eventpro_sidebar_collapsed')==='1';
    const sessionUserId=Number(localStorage.getItem('eventpro_session_user')||0);
    const sessionUser=DB_ALL.users.find(u=>Number(u.id)===sessionUserId);
    if(sessionUser){
      applyTenantScope(sessionUser);
      S.in=true;
      S.page='dashboard';
    }
  }catch(e){
    console.error('Erro ao carregar:',e);
    resetToDefaultStores();
    localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
    localStorage.setItem('eventpro_clists_all',JSON.stringify(CLISTS_ALL));
  }
}

function updateContractSplitRemainingFromEntry(){
  const ev=getSelectedContractEvent();
  const total=Number(ev?.value||0);
  const entryField=document.getElementById('contractEntryValue');
  const remainingField=document.getElementById('contractRemainingValue');
  if(!entryField||!remainingField||total<=0)return;
  const entry=Math.max(0,Number(entryField.value||0));
  const remaining=Math.max(0,total-entry);
  remainingField.value=remaining.toFixed(2);
}

function toggleContractPaymentDetails(){
  const paymentId=Number(document.getElementById('contractPayment')?.value||0);

  const active=contractPaymentUsesPixEntryBalance(paymentId);

  const ev=getSelectedContractEvent();
  const total=Number(ev?.value||0);
  const entryField=document.getElementById('contractEntryValue');
  const remainingField=document.getElementById('contractRemainingValue');
  const entryDueField=document.getElementById('contractEntryDue');
  const remainingDueField=document.getElementById('contractRemainingDue');

function updateContractSignalPreview(){
  const totalField=document.getElementById('contractTotalValue');
  const signalPctField=document.getElementById('contractSignalPct');
  const signalValueField=document.getElementById('contractSignalValue');
  const finalField=document.getElementById('contractFinalValue');
  if(!totalField||!signalPctField||!signalValueField||!finalField)return;
  const total=Math.max(0,Number(totalField.value||0));
  const pct=Math.max(0,Math.min(100,Number(signalPctField.value||0)));
  const signal=Math.round((total*(pct/100))*100)/100;
  const final=Math.max(0,Math.round((total-signal)*100)/100);
  signalValueField.value=signal.toFixed(2);
  finalField.value=final.toFixed(2);
}

function extractCityUFFromAddress(address){

  const normalized=text.replace(/\s+/g,' ');

  if(slashMatch)return `${slashMatch[1].trim()}/${slashMatch[2].toUpperCase()}`;
  const dashMatch=normalized.match(/([A-Za-zÀ-ÿ][A-Za-zÀ-ÿ\s.'-]{1,})\s*-\s*([A-Za-z]{2})(?=\b|[^A-Za-z])/u);
  if(dashMatch)return `${dashMatch[1].trim()}/${dashMatch[2].toUpperCase()}`;
  return '';
}

function fmtRelativeDayLabel(iso){
  if(!iso)return 'sem data';
  const ref=new Date(`${isoToday()}T12:00:00`);
  const dt=new Date(`${iso}T12:00:00`);
  if(Number.isNaN(dt.getTime()))return 'sem data';
  const diff=Math.round((dt-ref)/86400000);
  if(diff===0)return 'hoje';
  if(diff===1)return 'amanhã';
  if(diff===-1)return 'ontem';
  if(diff>1)return `em ${diff} dias`;
  return `${Math.abs(diff)} dias atrás`;
}

function isoToday(){
  const d=new Date();
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');

  return `${y}-${m}-${day}`;
}

function shiftISODate(iso,deltaDays){
  const base=String(iso||isoToday()).split('-').map(Number);
  const dt=new Date(base[0]||new Date().getFullYear(),(base[1]||1)-1,base[2]||1);
  dt.setDate(dt.getDate()+Number(deltaDays||0));
  const y=dt.getFullYear();
  const m=String(dt.getMonth()+1).padStart(2,'0');
  const d=String(dt.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function onlyDigits(v){
  return String(v||'').replace(/\D/g,'');
}

function isValidCPF(cpf){
  const d=onlyDigits(cpf);
  if(d.length!==11)return false;
  if(/^(\d)\1{10}$/.test(d))return false;
  const calc=(base,factor)=>{
    let sum=0;
    for(let i=0;i<base.length;i++)sum+=Number(base[i])*(factor-i);
    const r=(sum*10)%11;
    return r===10?0:r;
  };
  const d1=calc(d.slice(0,9),10);
  const d2=calc(d.slice(0,10),11);
  return d1===Number(d[9])&&d2===Number(d[10]);
}

function isStrongPassword(pwd){
  if(!pwd||pwd.length<8)return false;
  const hasUpper=/[A-Z]/.test(pwd);
  const hasLower=/[a-z]/.test(pwd);
  const hasDigit=/\d/.test(pwd);
  const hasSpecial=/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pwd);
  return (hasUpper&&hasLower&&hasDigit)||(hasUpper&&hasLower&&hasSpecial)||(hasUpper&&hasDigit&&hasSpecial)||(hasLower&&hasDigit&&hasSpecial);
}

function getPasswordStrength(pwd){
  if(!pwd)return {score:0,label:'Nenhuma'};
  if(pwd.length<8)return {score:1,label:'Muito fraca'};
  let strength=0;
  if(/[a-z]/.test(pwd))strength++;
  if(/[A-Z]/.test(pwd))strength++;
  if(/\d/.test(pwd))strength++;
  if(/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pwd))strength++;
  const labels=['','Fraca','Média','Forte','Muito forte'];
  return {score:strength,label:labels[strength]||'Desconhecida'};
}

function validatePasswordPolicy(pwd,confirmPwd){
  const password=String(pwd||'').trim();
  const confirm=confirmPwd===undefined?null:String(confirmPwd||'').trim();
  if(password.length<PASSWORD_MIN_LEN){
    return {ok:false,message:`A senha deve ter no mínimo ${PASSWORD_MIN_LEN} caracteres.`};
  }
  if(!isStrongPassword(password)){
    const strength=getPasswordStrength(password);
    return {ok:false,message:`Senha fraca. Use maiúsculas, minúsculas, números e caracteres especiais. Força: ${strength.label}`};
  }
  if(confirm!==null&&password!==confirm){
    return {ok:false,message:'As senhas não conferem.'};
  }
  return {ok:true};
}

function isValidCNPJ(cnpj){
  const d=onlyDigits(cnpj);
  if(d.length!==14)return false;
  if(/^(\d)\1{13}$/.test(d))return false;
  const calc=(base,factor)=>{
    let sum=0;
    for(let i=0;i<base.length;i++){
      sum+=Number(base[i])*factor;
      factor=(factor===2?9:factor-1);
    }
    const r=sum%11;
    return r<2?0:11-r;
  };
  const d1=calc(d.slice(0,12),5);
  const d2=calc(d.slice(0,13),6);
  return d1===Number(d[12])&&d2===Number(d[13]);
}

function formatCPF(cpf){
  const d=onlyDigits(cpf).slice(0,11);
  return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');
}

function formatCNPJ(cnpj){
  const d=onlyDigits(cnpj).slice(0,14);
  return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
}

function maskDocument(doc,type){

  if(type==='PJ'&&d.length===14)return `**.${d.slice(2,5)}.${d.slice(5,8)}/****-**`;
  return '***';
}

function valorPorExtenso(valor){
  if(!valor||isNaN(valor))return'zero reais';
  const n=Math.round(Number(valor)*100);
  const reais=Math.floor(n/100);
  const centavos=n%100;
  const u=['','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
  const d=['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
  const c=['','cem','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
  function centenas(n){
    if(n===0)return'';
    if(n===100)return'cem';
    const r=[];
    if(Math.floor(n/100))r.push(c[Math.floor(n/100)]);
    const resto=n%100;
    if(resto<20&&resto>0)r.push(u[resto]);
    else{if(Math.floor(resto/10))r.push(d[Math.floor(resto/10)]);if(resto%10)r.push(u[resto%10]);}
    return r.join(' e ');
  }
  function milhar(n){
    if(n===0)return'';
    const r=[];
    if(Math.floor(n/1000000)){const m=Math.floor(n/1000000);r.push(centenas(m)+(m===1?' milhão':' milhões'));n=n%1000000;}
    if(Math.floor(n/1000)){const m=Math.floor(n/1000);r.push(m===1?'mil':centenas(m)+' mil');n=n%1000;}
    if(n>0)r.push(centenas(n));
    return r.join(' e ');
  }
  const parteReais=milhar(reais)||(centavos>0?'':'zero');
  const sufReais=reais===1?'real':'reais';
  if(centavos===0)return`${parteReais} ${sufReais}`;
  const parteCents=centavos<20?u[centavos]:(d[Math.floor(centavos/10)]+(centavos%10?' e '+u[centavos%10]:''));
  const sufCents=centavos===1?'centavo':'centavos';
  return`${parteReais} ${sufReais} e ${parteCents} ${sufCents}`;
}

}

function createContract(){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem gerar contratos.'))return false;
  const eid=Number(document.getElementById('newContractEvent')?.value||S.contractPrefillEventId||0);
  const ev=DB.events.find(e=>e.id===eid);
  if(!ev){toast('Selecione um evento válido.','err');return false;}

  const eventName=document.getElementById('contractEventName')?.value.trim()||ev.name;
  const clientName=document.getElementById('contractClientName')?.value.trim()||ev.client;
  const eventDate=(document.getElementById('contractEventDate')?.value||ev.date||'').trim();
  const eventTime=(document.getElementById('contractEventTime')?.value||ev.time||'19:00').trim();
  const eventEndTime=(document.getElementById('contractEventEndTime')?.value||ev.endTime||'23:00').trim();
  const eventVenue=document.getElementById('contractEventVenue')?.value.trim()||ev.venue||'';
  const cl=DB.clients.find(c=>c.name===clientName)||DB.clients.find(c=>c.name===ev.client);
  const duration=Number(document.getElementById('contractDuration')?.value||6);
  const paymentId=Number(document.getElementById('contractPayment')?.value||1);
  const pm=DB.paymentMethods.find(p=>p.id===paymentId)||DB.paymentMethods[0];
  const notesBase=document.getElementById('contractNotes')?.value.trim()||'';
  const serviceNotes=document.getElementById('contractServiceNotes')?.value.trim()||'';
  const clientAddr=document.getElementById('contractClientAddr')?.value.trim()||cl?.address||'';
  const checkedServices=Array.from(document.querySelectorAll('[name="contractService"]:checked')).map(el=>el.value);
  const customServices=document.getElementById('contractServicesCustom')?.value.trim();
  const totalValue=Math.max(0,Math.round(Number(document.getElementById('contractTotalValue')?.value||ev.value||0)*100)/100);
  const signalPct=Math.max(0,Math.min(100,Number(document.getElementById('contractSignalPct')?.value||0)));
  const signalDue=(document.getElementById('contractSignalDue')?.value||'').trim()||new Date().toISOString().slice(0,10);
  const signalValue=Math.max(0,Math.round(Number(document.getElementById('contractSignalValue')?.value||0)*100)/100);
  const finalValue=Math.max(0,Math.round(Number(document.getElementById('contractFinalValue')?.value||0)*100)/100);
  const expenses=collectContractExpenseBreakdown();
  const equipmentPricing=Array.from(document.querySelectorAll('[data-contract-eq-id]')).map(input=>{
    const eqId=Number(input.getAttribute('data-contract-eq-id')||0);
    const qty=Math.max(1,Number(input.getAttribute('data-contract-eq-qty')||1));
    const unitValue=Math.max(0,Math.round(Number(input.value||0)*100)/100);
    const eq=DB.equipment.find(item=>Number(item.id)===eqId);
    return {eqId,name:eq?.name||`Equipamento ${eqId}`,qty,unitValue,totalValue:Math.round(unitValue*qty*100)/100};
  }).filter(item=>item.eqId>0);
  if(customServices)checkedServices.push(customServices);
  const services=checkedServices.join(', ')||'Som e Iluminação';
  const notes=[notesBase,serviceNotes].filter(Boolean).join('\n');

  if(!eventName||!clientName||!eventDate||!eventVenue){toast('Preencha os dados principais do evento no Passo 1.','err');return false;}
  if(!services){toast('Selecione pelo menos uma categoria de serviços.','err');return false;}
  if(totalValue<=0){toast('Informe um valor total válido no Passo 3.','err');return false;}

  // Mantém o evento alinhado com os dados informados no contrato.
  ev.name=eventName;
  ev.client=clientName;
  ev.date=eventDate;
  ev.time=eventTime;
  ev.endDate=eventDate;
  ev.endTime=eventEndTime;
  ev.venue=eventVenue;
  ev.value=totalValue;

  let paymentPlan=null;
  const eventTotal=totalValue;
  if(contractPaymentUsesPixEntryBalance(paymentId)){
    const entryVal=Math.round(Number(document.getElementById('contractEntryValue')?.value||0)*100)/100;
    const remainingRaw=document.getElementById('contractRemainingValue')?.value;
    const remainingVal=Math.round(Number(remainingRaw!==''?remainingRaw:(eventTotal-entryVal))*100)/100;
    const entryDue=(document.getElementById('contractEntryDue')?.value||'').trim();
    const remainingDue=(document.getElementById('contractRemainingDue')?.value||'').trim();

    if(entryVal<=0||remainingVal<=0){
      toast('Informe valores válidos para entrada e restante.','err');
      return false;
    }
    if(!entryDue||!remainingDue){
      toast('Informe as datas de pagamento da entrada e do restante.','err');
      return false;
    }
    if(eventTotal>0){
      const diff=Math.abs((entryVal+remainingVal)-eventTotal);
      if(diff>0.01){
        toast(`Entrada + restante deve fechar o valor do evento (${fmtVal(eventTotal)}).`,'err');
        return false;
      }
    }
    paymentPlan={
      mode:'pix-entry-balance',
      parcels:[
        {label:'Entrada PIX',value:entryVal,due:entryDue},
        {label:'Restante PIX',value:remainingVal,due:remainingDue},
      ],
    };
  }else if(signalPct>0){
    if(!signalDue){
      toast('Informe a data do sinal.','err');
      return false;
    }
    if(signalValue<=0||finalValue<0){
      toast('Valores de sinal/parcela final inválidos.','err');
      return false;
    }
    const diff=Math.abs((signalValue+finalValue)-eventTotal);
    if(diff>0.01){
      toast('Sinal + parcela final deve fechar o valor total.','err');
      return false;
    }
    paymentPlan={
      mode:'signal-final',
      parcels:[
        {label:`Sinal ${Math.round(signalPct)}%`,value:signalValue,due:signalDue},
        {label:'Parcela final',value:finalValue,due:eventDate},
      ],
    };
  }
  
  const contract={
    id:nextId(DB.contracts),
    eventId:eid,
    clientId:cl?cl.id:null,
    clientName:clientName,
    clientDoc:cl?.doc||'',
    clientAddr,
    services,
    duration,
    payment:pm?pm.name:'',
    paymentId:pm?pm.id:null,
    paymentPlan,
    totalValue,
    signalPct,
    expenses,
    equipmentPricing,
    penalty:10,
    notes,
    createdAt:new Date().toISOString().slice(0,10),
    empresa_id:Number(S.companyId||1),
  };

  DB.contracts.push(contract);
  saveDB();
  
  // Gerar contrato em PDF
  generateContractPDF(ev,contract,cl);
  
  S.contractPrefillEventId=null;
  toast('Contrato gerado com sucesso! 📑');
  render();
  return true;
}

function generateContractReceivables(contract,ev){
  if(!contract||!ev)return{created:0,total:0};

  const existing=DB.finance.rec.filter(r=>r.type==='contract-revenue'&&r.contractId===contract.id);
  if(existing.length)return{created:0,total:existing.length};

  const totalValue=Number(contract.totalValue||ev.value||0);
  if(totalValue<=0)return{created:0,total:0};

  const pm=DB.paymentMethods.find(m=>m.id===Number(contract.paymentId));
  const planText=`${contract.payment||''} ${pm?.description||''}`.toLowerCase();
  const eventDue=ev.date||new Date().toISOString().slice(0,10);
  const creationDue=contract.createdAt||new Date().toISOString().slice(0,10);

  const parcels=[];
  if(Array.isArray(contract?.paymentPlan?.parcels)&&contract.paymentPlan.parcels.length){
    contract.paymentPlan.parcels.forEach((p)=>{
      const value=Math.round(Number(p.value||0)*100)/100;
      if(value<=0)return;
      parcels.push({
        label:String(p.label||'Parcela'),
        value,
        due:String(p.due||eventDue),
      });
    });
  }else if(/50\s*%/.test(planText)&&/sinal|entrada/.test(planText)){
    const first=Math.round(totalValue*0.5*100)/100;
    const second=Math.round((totalValue-first)*100)/100;
    parcels.push({label:'Sinal 50%',value:first,due:creationDue});
    parcels.push({label:'Saldo 50%',value:second,due:eventDue});
  }else if(/integral/.test(planText)&&(/24h|24\s*horas/.test(planText))){
    parcels.push({label:'Integral (24h antes)',value:Math.round(totalValue*100)/100,due:shiftISODate(eventDue,-1)});
  }else if(/integral/.test(planText)){
    parcels.push({label:'Integral',value:Math.round(totalValue*100)/100,due:eventDue});
  }else if(/pix/.test(planText)){
    parcels.push({label:'Pagamento via Pix',value:Math.round(totalValue*100)/100,due:creationDue});
  }else{
    parcels.push({label:'Recebimento do contrato',value:Math.round(totalValue*100)/100,due:eventDue});
  }

  parcels.forEach((p,idx)=>{
    DB.finance.rec.push({
      id:nextId(DB.finance.rec),
      desc:`${ev.name} — ${p.label}`,
      eid:ev.id,
      val:p.value,
      due:p.due,
      data_vencimento:p.due,
      status:'a_receber',
      type:'contract-revenue',
      contractId:contract.id,
      paymentMethodId:contract.paymentId||null,
      installment:idx+1,
      installments:parcels.length,
    });
  });

  return{created:parcels.length,total:parcels.length};
}

function generateConsumablePayable(ev){
  if(!ev)return 0;
  const consumablesPlan=Array.isArray(ev.consumables)?ev.consumables:[];
  if(!consumablesPlan.length)return 0;
  const totalCost=consumablesPlan.reduce((a,b)=>a+Number(b.totalCost||0),0);
  if(totalCost<=0)return 0;
  const alreadyExists=(DB.finance?.pay||[]).some(p=>
    p.type==='consumables-pay'&&Number(p.eid)===Number(ev.id)
  );
  if(alreadyExists)return 0;
  DB.finance.pay.push({
    id:nextId(DB.finance.pay),
    desc:`Consumíveis do evento ${ev.name}`,
    eid:Number(ev.id),
    val:totalCost,
    due:ev.date||new Date().toISOString().slice(0,10),
    data_vencimento:ev.date||new Date().toISOString().slice(0,10),
    status:'a_pagar',
    type:'consumables-pay',
    empresa_id:Number(ev.empresa_id||S.companyId||1),
  });
  return 1;
}

function generateTempRentalPayable(ev){
  if(!ev)return 0;
  const plan=getEventLoadPlan(ev.id);
  const tempItems=plan
    .map(row=>{const eq=DB.equipment.find(e=>Number(e.id)===Number(row.eqId));return eq&&eq.temporary?{eq,qty:Math.max(1,Number(row.qty||1))}:null;})
    .filter(Boolean);
  if(!tempItems.length)return 0;
  let created=0;
  tempItems.forEach(({eq,qty})=>{
    const alreadyExists=(DB.finance?.pay||[]).some(p=>
      p.type==='temp-rental'&&Number(p.eid)===Number(ev.id)&&Number(p.equipId)===Number(eq.id)
    );
    if(alreadyExists)return;
    const rentalCost=Math.max(0,Number(eq.rentalCost||0));
    if(rentalCost<=0)return;
    DB.finance.pay.push({
      id:nextId(DB.finance.pay),
      desc:`Aluguel terceiro — ${eq.name} (${qty}x) · ${ev.name}`,
      eid:Number(ev.id),
      val:rentalCost*qty,
      due:ev.date||new Date().toISOString().slice(0,10),
      data_vencimento:ev.date||new Date().toISOString().slice(0,10),
      status:'a_pagar',
      type:'temp-rental',
      equipId:Number(eq.id),
      empresa_id:Number(ev.empresa_id||S.companyId||1),
    });
    created++;
  });
  return created;
}

function updateRecStatus(recId,status){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem alterar recebimentos.'))return;
  const rec=DB.finance.rec.find(r=>r.id===recId);
  if(!rec)return;
  const next=status==='recebido'?'recebido':'a_receber';
  rec.status=next;
  if(next==='recebido'){
    rec.received_at=new Date().toISOString().slice(0,10);
  }else{
    delete rec.received_at;
  }
  saveDB();
  render();
}

  return (DB.finance?.pay||[])
    .filter(item=>item.type==='event-extra-cost'&&Number(item.eid)===Number(eventId))
    .sort((a,b)=>(Number(a.id)||0)-(Number(b.id)||0));

function buildEventExtraCostRowHtml(prefix,rowKey,draft){
  const data=draft||{};
  const category=String(data.category||'funcionarios').toLowerCase();
  const desc=String(data.desc||'');
  const val=Number(data.val||0);
  const due=String(data.due||data.data_vencimento||isoToday()).slice(0,10);
  const status=data.status==='pago'?'pago':'a_pagar';
  const existingId=Number(data.id||0);
  return `<div id="${prefix}CostRow-${rowKey}" data-event-cost-row="${prefix}" data-row-key="${rowKey}" style="border:1px solid var(--border);border-radius:10px;padding:10px;display:grid;gap:8px;">
    <input id="${prefix}CostId-${rowKey}" type="hidden" value="${existingId||''}">
    <div class="grid g2">
      <div class="fg"><label class="fl">Categoria</label><select id="${prefix}CostCategory-${rowKey}" class="fc">${getEventExtraCostCategoryOptions(category)}</select></div>
      <div class="fg"><label class="fl">Descrição</label><input id="${prefix}CostDesc-${rowKey}" class="fc" placeholder="Ex: Equipe extra, gasolina, almoço da equipe" value="${esc(desc)}"></div>
    </div>
    <div class="grid g3">
      <div class="fg"><label class="fl">Valor (R$)</label><input id="${prefix}CostVal-${rowKey}" type="number" min="0" step="0.01" class="fc" value="${val>0?val:''}"></div>
      <div class="fg"><label class="fl">Vencimento</label><input id="${prefix}CostDue-${rowKey}" type="date" class="fc" value="${esc(due)}"></div>
      <div class="fg"><label class="fl">Status</label><select id="${prefix}CostStatus-${rowKey}" class="fc"><option value="a_pagar" ${status==='a_pagar'?'selected':''}>a_pagar</option><option value="pago" ${status==='pago'?'selected':''}>pago</option></select></div>
    </div>
    <div style="display:flex;justify-content:flex-end;"><button type="button" class="btn btn-ghost btn-sm" style="color:var(--red);border-color:rgba(255,74,74,.2);" onclick="removeEventExtraCostRow('${prefix}','${rowKey}')">Remover custo</button></div>
  </div>`;
}

function renderEventExtraCostEditor(prefix,ev){
  const rows=getEventExtraCostPayables(ev.id);
  const list=rows.length
    ?rows.map(item=>buildEventExtraCostRowHtml(prefix,item.id,item)).join('')
    :buildEventExtraCostRowHtml(prefix,`new-${Date.now()}`,{category:'funcionarios',due:ev.date||isoToday()});
  return `<div id="${prefix}CostList" style="display:flex;flex-direction:column;gap:8px;">${list}</div>`;
}

function addEventExtraCostRow(prefix){
  const wrap=document.getElementById(`${prefix}CostList`);
  if(!wrap)return;
  const rowKey=`new-${Date.now()}-${Math.floor(Math.random()*1000)}`;
  wrap.insertAdjacentHTML('beforeend',buildEventExtraCostRowHtml(prefix,rowKey,{category:'funcionarios',due:isoToday()}));
}

function removeEventExtraCostRow(prefix,rowKey){
  const row=document.getElementById(`${prefix}CostRow-${rowKey}`);
  if(row)row.remove();
}

function collectEventExtraCosts(prefix){
  const rows=Array.from(document.querySelectorAll(`[data-event-cost-row="${prefix}"]`));
  const costs=[];
  for(const row of rows){
    const rowKey=row.dataset.rowKey;
    const category=document.getElementById(`${prefix}CostCategory-${rowKey}`)?.value||'outro';
    const desc=document.getElementById(`${prefix}CostDesc-${rowKey}`)?.value.trim()||'';
    const val=Number(document.getElementById(`${prefix}CostVal-${rowKey}`)?.value||0);
    const due=document.getElementById(`${prefix}CostDue-${rowKey}`)?.value||'';
    const status=document.getElementById(`${prefix}CostStatus-${rowKey}`)?.value==='pago'?'pago':'a_pagar';
    const blank=!desc&&val<=0;
    if(blank)continue;
    if(val<=0)return {error:'Informe um valor válido para os custos extras do evento.'};
    if(!due)return {error:'Informe a data de vencimento dos custos extras do evento.'};
    costs.push({

function normalizeRecurringFrequency(freq){
  const v=String(freq||'mensal').toLowerCase();
  if(['semanal','quinzenal','mensal','bimestral','trimestral','semestral','anual'].includes(v))return v;
  return 'mensal';
}

function addMonthsISO(isoDate,months){
  const [y,m,d]=String(isoDate||'').split('-').map(Number);
  if(!y||!m||!d)return isoToday();
  const totalMonths=(m-1)+Number(months||0);
  const nextY=y+Math.floor(totalMonths/12);
  const nextM=(totalMonths%12+12)%12+1;
  const maxDay=new Date(nextY,nextM,0).getDate();
  const nextD=Math.min(d,maxDay);
  return `${nextY}-${String(nextM).padStart(2,'0')}-${String(nextD).padStart(2,'0')}`;
}

function getNextRecurringDueDate(due,freq){
  const frequency=normalizeRecurringFrequency(freq);
  if(frequency==='semanal')return shiftISODate(due,7);
  if(frequency==='quinzenal')return shiftISODate(due,14);
  if(frequency==='bimestral')return addMonthsISO(due,2);
  if(frequency==='trimestral')return addMonthsISO(due,3);
  if(frequency==='semestral')return addMonthsISO(due,6);
  if(frequency==='anual')return addMonthsISO(due,12);
  return addMonthsISO(due,1);
}

function createRecurringPayableEntry(expense,dueDate){
  DB.finance.pay.push({
    id:nextId(DB.finance.pay),
    desc:`${expense.name} (Recorrente)`,
    eid:null,
    val:Number(expense.val||0),
    due:dueDate,
    data_vencimento:dueDate,
    status:'a_pagar',
    type:'recurring-pay',
    recurringId:Number(expense.id),
    recurrenceDue:dueDate,
    frequency:normalizeRecurringFrequency(expense.frequency),
  });
}

function ensureRecurringPayables(untilDate){
  const recurring=(DB.recurringExpenses||[])
    .filter(item=>(item.status||'ativo')==='ativo')
    .map(item=>({
      ...item,
      frequency:normalizeRecurringFrequency(item.frequency),
      due:String(item.due||'').slice(0,10),
      val:Number(item.val||0),
    }))
    .filter(item=>item.name&&item.val>0&&/^\d{4}-\d{2}-\d{2}$/.test(item.due));

  if(!recurring.length)return 0;
  const endDate=String(untilDate||isoToday()).slice(0,10);
  let created=0;

  recurring.forEach(item=>{
    let cursor=item.due;
    let guard=0;
    while(cursor<=endDate&&guard<1000){
      const alreadyExists=(DB.finance.pay||[]).some(pay=>
        pay.type==='recurring-pay'&&
        Number(pay.recurringId)===Number(item.id)&&
        String(pay.recurrenceDue||pay.due||'').slice(0,10)===cursor
      );
      if(!alreadyExists){
        createRecurringPayableEntry(item,cursor);
        created+=1;
      }
      cursor=getNextRecurringDueDate(cursor,item.frequency);
      guard+=1;
    }
  });

  return created;
}

function addMaintenanceRecord(){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem registrar manutenção.'))return false;
  const companyId=Number(S.companyId||1);
  const equipId=Number(document.getElementById('mEquip')?.value||0);
  const service=document.getElementById('mService')?.value.trim();
  const parts=document.getElementById('mParts')?.value.trim();
  const provider=document.getElementById('mProvider')?.value.trim();
  const qty=Math.max(1,Number(document.getElementById('mQty')?.value||1));
  const rawCost=document.getElementById('mCost')?.value;
  const cost=Number(rawCost||0);
  const date=document.getElementById('mDate')?.value||new Date().toISOString().slice(0,10);
  const eq=DB.equipment.find(e=>e.id===equipId);

  if(!eq){toast('Selecione um equipamento válido.','err');return false;}
  if(Number(eq.empresa_id||companyId)!==companyId){toast('Equipamento inválido para a empresa atual.','err');return false;}
  if(eq.temporary){toast('Somente equipamentos permanentes podem ir para manutenção.','err');return false;}
  if(!service||!parts||!provider){toast('Preencha serviço, peças e prestador.','err');return false;}
  if(cost<0){toast('Custo não pode ser negativo.','err');return false;}

  const activeQty=DB.maintenance
    .filter(m=>Number(m.equipId)===equipId&&(m.status||'pendente')!=='feito')
    .reduce((acc,m)=>acc+Math.max(1,Number(m.qty||1)),0);
  const maxAdd=Math.max(0,Number(eq.qty||0)-activeQty);
  if(maxAdd<=0){toast('Não há quantidade disponível para nova manutenção neste equipamento.','err');return false;}
  if(qty>maxAdd){toast(`Quantidade em manutenção excede o disponível (${maxAdd}).`,'err');return false;}

  const maintenanceId=nextId(DB.maintenance);
  DB.maintenance.push({id:maintenanceId,equipId,equipEmpresaId:companyId,service,parts,provider,qty,cost,date,status:'pendente',empresa_id:companyId});

  eq.lastMaintenance=date;
  recalcEquipmentMaintenanceState(equipId);
  syncRentalCostInFinance(eq);

  toast('Manutenção registrada com status pendente. 🔧');
  saveDB();
  render();
  return true;
}

function updateMaintenanceStatus(maintenanceId,newStatus){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem atualizar manutenção.'))return;
  const allowed=['pendente','aprovado','feito'];
  if(!allowed.includes(newStatus)){toast('Status de manutenção inválido.','err');return;}

  const m=DB.maintenance.find(i=>i.id===Number(maintenanceId));
  if(!m){toast('Registro de manutenção não encontrado.','err');return;}
  const eq=DB.equipment.find(e=>e.id===Number(m.equipId));

  m.status=newStatus;

  if(eq){
    if(newStatus==='feito')eq.lastMaintenance=m.date||new Date().toISOString().slice(0,10);
    recalcEquipmentMaintenanceState(eq.id);
    syncRentalCostInFinance(eq);
  }

  if(newStatus==='aprovado'){
    const maintenanceCost=Number(m.cost||0);
    const hasPayable=DB.finance.pay.some(p=>p.type==='maintenance'&&Number(p.maintenanceId)===Number(m.id));
    if(maintenanceCost>0&&!hasPayable){
      DB.finance.pay.push({
        id:nextId(DB.finance.pay),
        desc:`Manutenção equipamento — ${eq?.name||'Equipamento'}`,
        eid:null,
        val:maintenanceCost,
        due:m.date||new Date().toISOString().slice(0,10),
        data_vencimento:m.date||new Date().toISOString().slice(0,10),
        status:'a_pagar',
        type:'maintenance',
        maintenanceId:m.id,
        empresa_id:Number(S.companyId||1),
      });
      toast('Status aprovado: conta a pagar criada no financeiro. 💸');
    }else if(maintenanceCost<=0){
      toast('Status aprovado sem custo informado: nenhuma conta criada.');
    }else{
      toast('Status aprovado. Conta da manutenção já existia no financeiro.');
    }
  }else if(newStatus==='feito'){
    S.tabs.manutencao='historico';
    toast('Status feito: equipamento marcado como disponível. ✅');
  }else{
    toast('Status de manutenção atualizado.');
  }

  saveDB();
  render();
}

function pushChecklistItems(bucketKey,tasks){
  if(!clists[bucketKey])clists[bucketKey]=[];
  let next=nextId(clists[bucketKey]);
  (Array.isArray(tasks)?tasks:[]).forEach(task=>{
    clists[bucketKey].push({
      id:next++,
      task:task.task,
      done:false,
      type:task.type,
      ts:null,
      empresa_id:Number(S.companyId||1),
      equipmentId:task.equipmentId||null,
      consumableId:task.consumableId||null,
      maintenanceId:task.maintenanceId||null,
      linkedKind:task.linkedKind||null,
    });
  });
  return Math.max(0,next-nextId(clists[bucketKey]));
}

function addTaskHandler(){
  const desc=(document.getElementById('addTaskDesc')?.value||'').trim();
  const type=(document.getElementById('addTaskType')?.value||'saida').trim();
  const linkKind=(document.getElementById('addTaskLinkKind')?.value||'none').trim();
  const stockRef=(document.getElementById('addTaskStock')?.value||'').trim();
  const maintenanceId=Number(document.getElementById('addTaskMaintenance')?.value||0);
  const qty=Math.max(1,Number(document.getElementById('addTaskQty')?.value||1));
  const eid=Number(S.selEv||0);
  const allowed=['operacional','saida','montagem','desmontagem','entrega'];

  if(!allowed.includes(type)){toast('Tipo de tarefa inválido.','err');return false;}
  const bucketKey=type==='operacional'?'__operacional':eid;
  if(type!=='operacional'&&(!eid||!DB.events.find(e=>e.id===eid))){toast('Selecione um evento válido.','err');return false;}

  let tasksToCreate=[];
  if(linkKind==='stock'&&type!=='operacional'){
    if(!stockRef){toast('Selecione um item do estoque para vincular.','err');return false;}
    const [source,idRaw]=stockRef.split(':');
    const stockId=Number(idRaw||0);
    if(source==='equipment'){
      const eq=DB.equipment.find(item=>Number(item.id)===stockId);

      const eventRef=DB.events.find(e=>Number(e.id)===eid);

      const proposal=findProposalForEvent(eventRef);

      if(qty>availForEvent){
        toast(`Disponibilidade insuficiente para ${eq.name} no período do evento.`, 'err');
        return false;
      }

      const currentExtras=Array.isArray(eventRef.extraEquipPlan)?eventRef.extraEquipPlan:[];
      eventRef.extraEquipPlan=mergeEquipmentPlans([...currentExtras,{eqId:eq.id,qty}]);

      const marker=`[Checklist Equipamento ${eq.id}]`;
      const noteLine=`${marker} ${qty}x ${eq.name}`;
      const lines=String(eventRef.notes||'').split('\n').map(line=>line.trim()).filter(Boolean);
      const existingIdx=lines.findIndex(line=>line.startsWith(marker));
      if(existingIdx>=0)lines[existingIdx]=noteLine;
      else lines.push(noteLine);
      eventRef.notes=lines.join('\n');

      tasksToCreate=buildLinkedEquipmentChecklistTasks(eq,qty);
    }else if(source==='consumable'){
      const consumable=DB.consumables.find(item=>Number(item.id)===stockId);
      if(!consumable){toast('Consumível não encontrado.','err');return false;}
      tasksToCreate=buildLinkedConsumableChecklistTasks(consumable,qty);
    }else{
      toast('Item do estoque inválido.','err');return false;
    }
  }else if(linkKind==='maintenance'&&type==='operacional'){
    const maintenance=DB.maintenance.find(item=>Number(item.id)===maintenanceId&&String(item.status||'pendente')!=='feito');
    if(!maintenance){toast('Selecione uma manutenção pendente/aprovada.','err');return false;}
    tasksToCreate=buildMaintenanceChecklistTasks(maintenance);
  }else{
    if(!desc){toast('Informe a descrição da tarefa.','err');return false;}
    tasksToCreate=[{task:desc,type}];
  }

  pushChecklistItems(bucketKey,tasksToCreate);

  saveDB();
  render();
  toast(`${tasksToCreate.length} tarefa(s) adicionada(s)! ✅`);
  return true;
}

const DEFAULT_EQUIPMENT_CATEGORIES=['Som','Iluminação','Estrutura','Painel de LED','Gerador','Vídeo'];

function categoryKey(v){
  return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toLowerCase();
}

function getEquipmentCategories(){
  const raw=Array.isArray(DB.company?.equipmentCategories)?DB.company.equipmentCategories:DEFAULT_EQUIPMENT_CATEGORIES;
  const seen=new Set();
  const categories=[];
  raw.forEach(item=>{
    const label=String(item||'').trim();
    const key=categoryKey(label);
    if(!label||seen.has(key))return;
    seen.add(key);
    categories.push(label);
  });
  DEFAULT_EQUIPMENT_CATEGORIES.forEach(item=>{
    const key=categoryKey(item);
    if(seen.has(key))return;
    seen.add(key);
    categories.push(item);
  });
  return categories;
}

function formatEquipmentIdentity(eq){
  const category=normalizeEquipmentCategory(eq?.cat,eq?.name);
  const brand=String(eq?.brand||'-').trim()||'-';
