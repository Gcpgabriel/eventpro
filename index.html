      <div class="fg"><label class="fl">Endereço (Opcional)</label><input id="editClientAddress" class="fc" value="${esc(c.address||'')}" placeholder="Rua, número, bairro, cidade/UF"></div>
      <p style="font-size:10.5px;color:var(--text3);line-height:1.5;">Privacidade: CPF/CNPJ e data de nascimento são exibidos de forma mascarada na listagem para reduzir exposição.</p>`;
    },
    ok:editClient,
  },
  viewClient:{
    title:'Perfil do Cliente',
    body:()=>{
      const c=DB.clients.find(i=>i.id===Number(S.viewClientId));
      if(!c)return '<div class="empty"><div class="empty-ico">⚠️</div><div>Cliente não encontrado.</div></div>';
      const summary=getClientSummary(c);
      const history=summary.events;
      const statusClass={confirmado:'b-green',proposta:'b-amber',finalizado:'b-gray'};

      const historyHtml=history.length
        ?`<div class="tw"><table><tr><th>Evento</th><th>Data</th><th>Local</th><th>Status</th><th>Valor</th></tr>${history.map(ev=>`<tr><td style="font-weight:500">${ev.name}</td><td>${fmtDateBR(ev.date)} ${ev.time||''}</td><td>${ev.venue||'-'}</td><td><span class="badge ${statusClass[ev.status]||'b-blue'}">${ev.status||'sem status'}</span></td><td style="font-weight:700;color:var(--green)">${fmtVal(Number(ev.value||0))}</td></tr>`).join('')}</table></div>`
        :'<div class="empty" style="padding:16px 8px;"><div class="empty-ico">📭</div><div>Nenhum evento encontrado para este cliente.</div></div>';

      return `<div style="display:grid;gap:10px;"><div class="grid g3"><div class="stat"><div class="stat-val">${summary.eventCount}</div><div class="stat-lbl">Eventos</div></div><div class="stat"><div class="stat-val" style="font-size:20px;color:var(--green)">${fmtVal(summary.totalValue)}</div><div class="stat-lbl">Faturamento</div></div><div class="stat"><div class="stat-val" style="font-size:16px;">${summary.lastEventDate==='-'?'-':fmtDateBR(summary.lastEventDate)}</div><div class="stat-lbl">Último Evento</div></div></div><div class="card"><div class="card-body" style="padding:12px;display:grid;gap:6px;"><div><strong>Nome:</strong> ${c.name}</div><div><strong>Tipo:</strong> ${c.type||'PF'}</div><div><strong>Documento:</strong> ${maskDocument(c.doc,c.type||'PF')}</div><div><strong>Email:</strong> ${c.email||'-'}</div><div><strong>Telefone:</strong> ${c.phone||'-'}</div><div><strong>Endereço:</strong> ${c.address||'-'}</div><div><strong>Nascimento:</strong> ${c.type==='PF'&&c.birth?fmtDateBR(c.birth):'-'}</div></div></div><div class="card"><div class="card-header"><span class="card-title">Histórico de Eventos</span></div><div class="card-body" style="padding-top:6px;">${historyHtml}</div></div></div>`;
    },
    ok:()=>true,
  },
  auditTrail:{
    title:'Trilha de Auditoria',
    body:()=>{
      const logs=[...DB.auditLogs].sort((a,b)=>b.id-a.id);
      if(!logs.length)return '<div class="empty"><div class="empty-ico">🧾</div><div>Nenhum registro de auditoria ainda.</div></div>';
      return `<div class="tw"><table><tr><th>Data/Hora</th><th>Usuário</th><th>Ação</th><th>Entidade</th><th>Detalhes</th></tr>${logs.map(l=>`<tr><td>${new Date(l.ts).toLocaleString('pt-BR')}</td><td>${l.user}</td><td>${l.action}</td><td>${l.entity}</td><td style="max-width:240px;word-break:break-word;">${Object.entries(l.meta||{}).map(([k,v])=>`${k}: ${v}`).join(' · ')||'-'}</td></tr>`).join('')}</table></div>`;
    },
    ok:()=>true,
  },
  addMember:{title:'Convidar Membro',body:`
    <div class="fg"><label class="fl">Nome Completo <span style="color:var(--red)">*</span></label><input id="suNome" class="fc" placeholder="Ex: Maria Souza"></div>
    <div class="fg"><label class="fl">Email de Trabalho <span style="color:var(--red)">*</span></label><input id="suEmail" type="email" class="fc" placeholder="nome@empresa.com"></div>
    <div class="grid g2"><div class="fg"><label class="fl">Cargo</label><select id="suRole" class="fc"><option value="manager">Manager</option><option value="employee" selected>Employee</option></select></div><div class="fg"><label class="fl">Senha <span style="color:var(--red)">*</span></label><input id="suSenha" type="password" class="fc" placeholder="Mínimo 8 caracteres + senha forte" oninput="updatePasswordStrengthDisplay('suSenha','addMemberSenhaStrength')"></div></div>
    <div id="addMemberSenhaStrength" style="margin-top:-4px;margin-bottom:4px;font-size:11px;color:var(--text2);"></div>
    <div class="fg"><label class="fl">Confirmar senha <span style="color:var(--red)">*</span></label><input id="suSenha2" type="password" class="fc" placeholder="Repita a senha"></div>
    <p style="font-size:11.5px;color:var(--text2);margin-top:6px;">O membro será criado com login ativo nesta empresa, seguindo a mesma política de senha forte do restante do site.</p>`,
    ok:addSystemUser},
  newProposal:{title:'+ Nova Proposta Comercial',body:()=>`
    <div class="fg"><label class="fl">Cliente</label><select id="proposalClient" class="fc">${DB.clients.map(c=>`<option>${c.name}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Evento</label><input id="proposalEvent" class="fc" placeholder="Nome ou tipo do evento"></div>
    <div class="grid g2"><div class="fg"><label class="fl">Data Inicial</label><input id="proposalDate" type="date" class="fc" onchange="updateProposalAvailabilityPreview()"></div><div class="fg"><label class="fl">Data Final</label><input id="proposalEndDate" type="date" class="fc" onchange="updateProposalAvailabilityPreview()"></div></div>
    <div class="grid g3"><div class="fg"><label class="fl">Hora Inicial</label><input id="proposalTime" type="time" class="fc" value="19:00" onchange="updateProposalAvailabilityPreview()"></div><div class="fg"><label class="fl">Valor Total (R$)</label><input id="proposalValue" type="number" class="fc" placeholder="0"></div><div class="fg"><label class="fl">Tempo de validade do orçamento</label><select id="proposalValidityDays" class="fc"><option value="3">3 dias</option><option value="7" selected>7 dias</option><option value="15">15 dias</option><option value="30">30 dias</option></select></div></div>
    <div class="fg"><label class="fl">Categorias de Serviços</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;">
        ${['Som','Iluminação','Estrutura','Painel de LED','Gerador','Vídeo','DJ'].map(cat=>`<label style="display:flex;align-items:center;gap:5px;font-size:12.5px;cursor:pointer;"><input type="checkbox" name="proposalService" value="${cat}"> ${cat}</label>`).join('')}
      </div>
    </div>
    <div class="fg"><label class="fl">Itens do Orçamento (permanentes, terceiros e consumíveis)</label><div id="proposalEquipList" style="display:flex;flex-direction:column;gap:6px;">
      <div style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:2px 0 4px;">Permanentes</div>
      ${DB.equipment.filter(e=>!e.temporary).map(eq=>{const meta=formatEquipmentIdentity(eq);return `<label style="display:flex;align-items:center;gap:8px;font-size:12.5px;cursor:pointer;"><input id="proposalEq-${eq.id}" data-eq-check="1" type="checkbox" value="${eq.id}" onchange="toggleProposalQtyInput(${eq.id})"><span style="flex:1;min-width:0;"><div style="font-weight:500;">${eq.name}</div><div style="font-size:10.5px;color:var(--text2);">${meta.label}</div></span><span style="margin-left:auto;display:flex;align-items:center;gap:6px;">Qtd.<input id="proposalQty-${eq.id}" type="number" min="1" step="1" value="1" class="fc" style="width:72px;padding:4px 6px;font-size:11.5px;" disabled onchange="updateProposalAvailabilityPreview()"></span></label>`;}).join('')}
      <div style="height:1px;background:var(--border);margin:4px 0;"></div>
      <div style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:2px 0 4px;">Terceiros (Aluguel)</div>
      ${DB.equipment.filter(e=>e.temporary).map(eq=>{const meta=formatEquipmentIdentity(eq);const rentalCost=Math.max(0,Number(eq.rentalCost||0));return `<label style="display:flex;align-items:center;gap:8px;font-size:12.5px;cursor:pointer;"><input id="proposalEq-${eq.id}" data-eq-check="1" type="checkbox" value="${eq.id}" onchange="toggleProposalQtyInput(${eq.id})"><span style="flex:1;min-width:0;"><div style="font-weight:500;">${eq.name} <span class="badge b-purple" style="font-size:9px;vertical-align:middle;">Terceiro</span></div><div style="font-size:10.5px;color:var(--text2);">${meta.label} · Aluguel: <strong style="color:var(--red)">${fmtVal(rentalCost)}/evento</strong></div></span><span style="margin-left:auto;display:flex;align-items:center;gap:6px;">Qtd.<input id="proposalQty-${eq.id}" type="number" min="1" step="1" value="1" class="fc" style="width:72px;padding:4px 6px;font-size:11.5px;" disabled onchange="updateProposalAvailabilityPreview()"></span></label>`;}).join('')||'<div style="font-size:11.5px;color:var(--text2);">Nenhum equipamento de terceiros cadastrado.</div>'}
      <div style="height:1px;background:var(--border);margin:4px 0;"></div>
      <div style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:2px 0 4px;">Consumíveis (opcional)</div>
      ${DB.consumables.map(item=>`<label style="display:flex;align-items:center;gap:8px;font-size:12.5px;cursor:pointer;"><input id="proposalCons-${item.id}" data-cons-check="1" type="checkbox" value="${item.id}" onchange="toggleProposalConsQtyInput(${item.id})"><span style="flex:1;min-width:0;"><div style="font-weight:500;">${esc(item.name)}</div><div style="font-size:10.5px;color:var(--text2);">${Math.max(0,Number(item.qtyStock||0))} ${esc(item.unit||'unidade')} em estoque</div></span><span style="margin-left:auto;display:flex;align-items:center;gap:6px;">Qtd.<input id="proposalConsQty-${item.id}" type="number" min="1" step="1" value="1" class="fc" style="width:72px;padding:4px 6px;font-size:11.5px;" disabled></span></label>`).join('')}
    </div></div>
    <div class="fg"><label class="fl">Disponibilidade na data</label><div id="proposalAvailPreview" style="max-height:180px;overflow:auto;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px;"></div></div>
    <div class="fg"><label class="fl">Observações</label><textarea class="fc" placeholder="Condições, formas de pagamento..."></textarea></div>`,
    ok:createProposal},
  reviseProposal:{title:'Revisar Orçamento (nova versão)',body:()=>{
    const source=DB.proposals.find(p=>Number(p.id)===Number(S.editProposalId||0)&&!p.deletedAt);
    if(!source)return '<div class="empty"><div class="empty-ico">⚠️</div><div>Orçamento base não encontrado.</div></div>';
    const cats=['Som','Iluminação','Estrutura','Painel de LED','Gerador','Vídeo','DJ'];
    const preSelected=new Set(Array.isArray(source.serviceCategories)?source.serviceCategories:[]);
    return `
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:10px;font-size:11.5px;">
      Revisão será criada como <strong>novo orçamento</strong>. O anterior será mantido no histórico.
    </div>
    <div class="fg"><label class="fl">Cliente</label><select id="revProposalClient" class="fc">${DB.clients.map(c=>`<option ${c.name===source.client?'selected':''}>${c.name}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Evento</label><input id="revProposalEvent" class="fc" value="${esc(source.event||'')}"></div>
    <div class="grid g2"><div class="fg"><label class="fl">Data Inicial</label><input id="revProposalDate" type="date" class="fc" value="${esc(source.date||'')}"></div><div class="fg"><label class="fl">Data Final</label><input id="revProposalEndDate" type="date" class="fc" value="${esc(source.endDate||source.date||'')}"></div></div>
    <div class="grid g3"><div class="fg"><label class="fl">Hora Inicial</label><input id="revProposalTime" type="time" class="fc" value="${esc(source.time||'19:00')}"></div><div class="fg"><label class="fl">Valor Total (R$)</label><input id="revProposalValue" type="number" class="fc" value="${Number(source.val||0)}"></div><div class="fg"><label class="fl">Tempo de validade</label><select id="revProposalValidityDays" class="fc"><option value="3" ${Number(source.validityDays||7)===3?'selected':''}>3 dias</option><option value="7" ${Number(source.validityDays||7)===7?'selected':''}>7 dias</option><option value="15" ${Number(source.validityDays||7)===15?'selected':''}>15 dias</option><option value="30" ${Number(source.validityDays||7)===30?'selected':''}>30 dias</option></select></div></div>
    <div class="fg"><label class="fl">Categorias de Serviços</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;">
        ${cats.map(cat=>`<label style="display:flex;align-items:center;gap:5px;font-size:12.5px;cursor:pointer;"><input type="checkbox" name="revProposalService" value="${cat}" ${preSelected.has(cat)?'checked':''}> ${cat}</label>`).join('')}
      </div>
    </div>
    <div class="fg"><label class="fl">Itens herdados do orçamento anterior</label><div style="font-size:11.5px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px;">${(source.items||[]).length?(source.items||[]).map(i=>`• ${esc(i)}`).join('<br>'):'Nenhum item'}</div></div>`;
  },
    ok:createProposalRevision},
  newContract:{title:'Gerar Contrato',body:()=>{
    const eid=S.contractPrefillEventId;
    const ev=eid?DB.events.find(e=>e.id===eid):null;
    const cl=ev?DB.clients.find(c=>c.name===ev.client):null;
    const linkedProposal=ev?findProposalForEvent(ev):null;
    const preSelectedServices=new Set(Array.isArray(linkedProposal?.serviceCategories)?linkedProposal.serviceCategories:[]);
    const eventOpts=DB.events.filter(e=>e.status==='confirmado').map(e=>`<option value="${e.id}" ${eid===e.id?'selected':''}>${e.name}</option>`).join('');
    const cats=['Som','Iluminação','Estrutura','Painel de LED','Gerador','Vídeo','DJ'];
    const eventPlan=ev?getEventLoadPlan(ev.id):[];
    const equipmentRows=eventPlan.map(row=>{
      const eq=DB.equipment.find(item=>Number(item.id)===Number(row.eqId));
      if(!eq)return '';
      const qty=Math.max(1,Number(row.qty||1));
      const unitDefault=eq.temporary?Math.max(0,Number(eq.rentalCost||0)):0;
      return `<tr><td>${esc(eq.name)}</td><td>${qty}</td><td><input type="number" min="0" step="0.01" class="fc" style="width:120px;padding:5px 8px;font-size:11.5px;" data-contract-eq-id="${eq.id}" data-contract-eq-qty="${qty}" id="contractEqUnitValue-${eq.id}" value="${unitDefault.toFixed(2)}"></td></tr>`;
    }).join('');
    
    return`
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
      <span id="contractStepBadge1" class="badge b-blue">🟦 Passo 1 — Dados do Evento</span>
      <span id="contractStepBadge2" class="badge b-purple">Passo 2 — Serviços Prestados</span>
      <span id="contractStepBadge3" class="badge b-amber">Passo 3 — Despesas + Pagamento</span>
    </div>

    <div id="contractStep1">
      <div class="fg"><label class="fl">Evento</label><select id="newContractEvent" class="fc" onchange="resetContractPrefillEvent(this.value)">${eventOpts}</select></div>
      <div class="grid g2">
        <div class="fg"><label class="fl">Nome do evento</label><input id="contractEventName" class="fc" value="${esc(ev?.name||'')}"></div>
        <div class="fg"><label class="fl">Cliente</label><input id="contractClientName" class="fc" value="${esc(ev?.client||'')}"></div>
      </div>
      <div class="grid g2">
        <div class="fg"><label class="fl">Data</label><input id="contractEventDate" type="date" class="fc" value="${esc(ev?.date||'')}"></div>
        <div class="fg"><label class="fl">Local</label><input id="contractEventVenue" class="fc" value="${esc(ev?.venue||'')}"></div>
      </div>
      <div class="grid g2">
        <div class="fg"><label class="fl">Horário início</label><input id="contractEventTime" type="time" class="fc" value="${esc(ev?.time||'19:00')}"></div>
        <div class="fg"><label class="fl">Horário fim</label><input id="contractEventEndTime" type="time" class="fc" value="${esc(ev?.endTime||'23:00')}"></div>
      </div>
      ${cl?`<div class="fg"><label class="fl">Dados do Cliente</label><div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px;font-size:10.5px;"><strong>${cl.name}</strong> (${cl.type})<br>${cl.type==='PJ'?`CNPJ: ${cl.doc}`:`CPF: ${cl.doc}`}<br>Email: ${cl.email}<br>Endereço: ${cl.address||'—'}</div></div>`:''}
      <div class="fg"><label class="fl">Endereço do Contratante</label><input id="contractClientAddr" class="fc" placeholder="Endereço do cliente" value="${esc(cl?.address||'')}"></div>
      <div class="fg"><label class="fl">Observações</label><textarea id="contractNotes" class="fc" placeholder="Observações do evento e do contrato..."></textarea></div>
      <div style="display:flex;justify-content:flex-end;"><button type="button" class="btn btn-primary" onclick="contractWizardNextStep()">Continuar →</button></div>
    </div>

    <div id="contractStep2" style="display:none;">
      <div class="fg"><label class="fl">Categorias</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;">
          ${cats.map(cat=>`<label style="display:flex;align-items:center;gap:5px;font-size:12.5px;cursor:pointer;"><input type="checkbox" name="contractService" value="${cat}" ${preSelectedServices.has(cat)?'checked':''}> ${cat}</label>`).join('')}
        </div>

        <div class="grid g3"><div class="fg"><label class="fl">Sinal (%)</label><input id="contractSignalPct" type="number" min="0" max="100" step="1" class="fc" value="0" oninput="updateContractSignalPreview()"></div><div class="fg"><label class="fl">Data sinal</label><input id="contractSignalDue" type="date" class="fc" value="${new Date().toISOString().slice(0,10)}"></div><div class="fg"><label class="fl">Valor do sinal (R$)</label><input id="contractSignalValue" type="number" class="fc" readonly></div></div>

  addPaymentMethod:{title:'+ Nova Forma de Pagamento / Recebimento',body:`

    <div class="fg"><label class="fl">Descrição</label><input id="pmDescription" class="fc" placeholder="Ex: Transferência instantânea via Pix"></div>

  addObjectivePurchase:{title:'+ Novo Objetivo de Compra',body:`
    <div class="fg"><label class="fl">Item Desejado</label><input id="objItemName" class="fc" placeholder="Ex: Mesa digital, painel, kit cabos..."></div>
    <div class="grid g2"><div class="fg"><label class="fl">Prioridade</label><select id="objItemPriority" class="fc"><option value="alta">alta</option><option value="media" selected>media</option><option value="baixa">baixa</option></select></div><div class="fg"><label class="fl">Qtd. Alvo</label><input id="objItemQty" type="number" min="1" step="1" class="fc" value="1"></div></div>
    <div class="fg"><label class="fl">Observações</label><textarea id="objItemNotes" class="fc" placeholder="Justificativa, fornecedor, prazo, etc."></textarea></div>`,

  addRec:{title:'+ Conta a Receber',body:()=>`

    <div class="fg"><label class="fl">Valor (R$)</label><input id="addRecVal" type="number" class="fc"></div>
    <div class="fg"><label class="fl">Data de Vencimento <span style="color:var(--red)">*</span></label><input id="addRecDue" type="date" class="fc" required></div>
    <div class="fg"><label class="fl">Vincular a Evento</label><select id="addRecEvent" class="fc"><option value="">— Nenhum —</option>${DB.events.map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}</select></div>`,
    ok:addFinanceRec},
  addPay:{title:'+ Conta a Pagar',body:`
    <div class="fg"><label class="fl">Descrição</label><input id="addPayDesc" class="fc" placeholder="Ex: Aluguel, manutenção..."></div>
    <div class="fg"><label class="fl">Valor (R$)</label><input id="addPayVal" type="number" class="fc"></div>
    <div class="fg"><label class="fl">Data de Vencimento <span style="color:var(--red)">*</span></label><input id="addPayDue" type="date" class="fc" required></div>
    <div class="fg"><label class="fl">Status</label><select id="addPayStatus" class="fc"><option value="a_pagar" selected>a_pagar</option><option value="pago">pago</option></select></div>`,
    ok:addFinancePay},
  addRecurringExpense:{title:'+ Despesa Recorrente',body:`
    <div class="fg"><label class="fl">Nome</label><input id="addRecurringName" class="fc" placeholder="Ex: Aluguel do galpão"></div>
    <div class="fg"><label class="fl">Valor (R$)</label><input id="addRecurringVal" type="number" min="0" step="0.01" class="fc"></div>
    <div class="fg"><label class="fl">Frequência</label><select id="addRecurringFrequency" class="fc"><option value="semanal">semanal</option><option value="quinzenal">quinzenal</option><option value="mensal" selected>mensal</option><option value="bimestral">bimestral</option><option value="trimestral">trimestral</option><option value="semestral">semestral</option><option value="anual">anual</option></select></div>
    <div class="fg"><label class="fl">Data de Vencimento Inicial</label><input id="addRecurringDue" type="date" class="fc" required></div>

  `,
    ok:addRecurringExpense},
  addConsumablePayable:{
    title:'Gerar Custo de Consumíveis',
    body:()=>{
      const d=S.consumableExpenseDraft;
      if(!d)return '<div class="empty"><div class="empty-ico">⚠️</div><div>Nenhum custo pendente de consumíveis.</div></div>';
      return `

      <div class="fg"><label class="fl">Valor (R$)</label><input id="consVal" type="number" min="0" step="0.01" class="fc" value="${Number(d.amount||0)}"></div>
      <div class="fg"><label class="fl">Para quem pagar <span style="color:var(--red)">*</span></label><input id="consPayee" class="fc" placeholder="Ex: Fornecedor X, Mercado Y"></div>
      <div class="fg"><label class="fl">Quando pagar (vencimento) <span style="color:var(--red)">*</span></label><input id="consDue" type="date" class="fc" value="${esc(d.due||new Date().toISOString().slice(0,10))}"></div>
      <p style="font-size:11px;color:var(--text2);line-height:1.5;">Ao salvar, a despesa será lançada em <strong>Contas a Pagar</strong> no financeiro.</p>`;
    },

  },
  companyOnboarding:{
    title:'Complete o Perfil da Empresa',
    body:()=>{
      ensureCompanyOnboardingState();
      const draft=S.companyOnboarding.draft||getCompanyOnboardingDraft();
      const step=Number(S.companyOnboarding.step||1);
      const stepMeta=[
        {n:1,label:'Dados fiscais'},
        {n:2,label:'Dados comerciais'},
        {n:3,label:'Conclusão'},
      ];
      const stepChips=stepMeta.map(item=>`<div style="flex:1;min-width:0;padding:8px 10px;border-radius:10px;border:1px solid ${item.n===step?'var(--accent2)':'var(--border)'};background:${item.n===step?'rgba(74,163,255,.08)':'var(--bg2)'};font-size:11px;color:${item.n===step?'var(--accent2)':'var(--text2)'};font-weight:${item.n===step?'700':'500'};text-align:center;">${item.n}. ${item.label}</div>`).join('');
      const logoPreview=draft.logo?`<img src="${draft.logo}" alt="Logo da empresa" style="max-height:110px;max-width:260px;display:block;border-radius:8px;border:1px solid var(--border);margin-top:8px;">`:'<div style="color:var(--muted);font-size:12px;margin-top:8px;">Logo opcional. Você pode adicionar agora ou depois em Configurações.</div>';
      let fields='';
      if(step===1){
        fields=`<div class="grid g2"><div class="fg"><label class="fl">CNPJ</label><input id="onb-cnpj" class="fc" value="${esc(draft.cnpj||'')}" placeholder="00.000.000/0001-00"></div><div class="fg"><label class="fl">Telefone</label><input id="onb-phone" class="fc" value="${esc(draft.phone||'')}" placeholder="(00) 00000-0000"></div></div>`;
      }else if(step===2){
        fields=`<div class="fg"><label class="fl">E-mail Comercial <span style="color:var(--red)">*</span></label><input id="onb-email" type="email" class="fc" value="${esc(draft.email||'')}" placeholder="contato@suaempresa.com"></div>
        <div class="fg"><label class="fl">Cidade/UF <span style="color:var(--red)">*</span></label><input id="onb-city" class="fc" value="${esc(draft.city||'')}" placeholder="Ex: Anápolis/GO"></div>
        <div class="fg"><label class="fl">Endereço <span style="color:var(--red)">*</span></label><input id="onb-address" class="fc" value="${esc(draft.address||'')}" placeholder="Rua, número, cidade e UF"></div>
        <div class="fg"><label class="fl">Especialidades <span style="color:var(--red)">*</span></label><input id="onb-specialties" class="fc" value="${esc(draft.specialties||'')}" placeholder="Som, Iluminação, Estrutura..."></div>`;
      }else{
        fields=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;display:grid;gap:8px;font-size:12px;">
          <div><strong>CNPJ:</strong> ${esc(draft.cnpj||'—')}</div>
          <div><strong>Telefone:</strong> ${esc(draft.phone||'—')}</div>
          <div><strong>E-mail Comercial:</strong> ${esc(draft.email||'—')}</div>
          <div><strong>Cidade/UF:</strong> ${esc(draft.city||'—')}</div>
          <div><strong>Endereço:</strong> ${esc(draft.address||'—')}</div>
          <div><strong>Especialidades:</strong> ${esc(draft.specialties||'—')}</div>
        </div>
        <div class="fg" style="margin-top:10px;"><label class="fl">Logo da Empresa <span style="color:var(--text3);font-size:11px;">(opcional)</span></label>${logoPreview}<div style="display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap;"><label class="btn btn-secondary" style="cursor:pointer;">📁 Selecionar imagem<input type="file" id="onb-logo-input" accept="image/*" style="display:none;" onchange="handleOnboardingLogoUpload(event)"></label>${draft.logo?`<button type="button" class="btn btn-ghost" onclick="S.companyOnboarding.draft.logo='';render()">🗑 Remover logo</button>`:''}</div></div>`;
      }
      return `
        <div style="background:var(--bg2);border-left:3px solid var(--accent2);padding:10px 12px;border-radius:8px;margin-bottom:12px;font-size:12px;color:var(--text2);">Para concluir o primeiro acesso, informe os dados essenciais da empresa. Depois você pode editar tudo em Configurações.</div>
        <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">${stepChips}</div>
        ${fields}`;
    },
    ok:completeCompanyOnboarding,
  },
};

function renderModal(){
  if(!S.modal)return'';
  const m=MODS[S.modal];
  if(!m)return'';
  const title=typeof m.title==='function'?m.title():m.title;
  const body=typeof m.body==='function'?m.body():m.body;
  const locked=S.modal==='companyOnboarding'&&shouldForceCompanyOnboarding();
  const onboardingStep=Number(S.companyOnboarding?.step||1);
  const onboardingFooter=locked?`${onboardingStep>1?`<button class="btn btn-ghost" onclick="goCompanyOnboardingStep(${onboardingStep-1})">Voltar</button>`:'<span style="font-size:11px;color:var(--text3);">Etapa ${onboardingStep} de 3</span>'}<button class="btn btn-primary" onclick="${onboardingStep<3?`goCompanyOnboardingStep(${onboardingStep+1})`:`if(MODS['companyOnboarding'].ok()!==false)closeM()`}">${onboardingStep<3?'Continuar':'Concluir'}</button>`:'';
  const contractWizardFooter=S.modal==='newContract'
    ?`<button class="btn btn-ghost" onclick="closeM()">Cancelar</button><button id="contractWizardBack" class="btn btn-ghost" onclick="contractWizardPrevStep()" style="display:none;">Voltar</button><button id="contractWizardNext" class="btn btn-primary" onclick="contractWizardNextStep()">Avançar</button><button id="contractWizardFinish" class="btn btn-primary" onclick="if(MODS['newContract'].ok()!==false)closeM()" style="display:none;">Finalizar</button>`
    :'';
  if(S.modal==='newProposal')setTimeout(updateProposalAvailabilityPreview,0);
  if(S.modal==='addClient')setTimeout(onClientTypeChange,0);
  if(S.modal==='editClient')setTimeout(onEditClientTypeChange,0);
  if(S.modal==='addTask')setTimeout(onAddTaskTypeChange,0);
  return`<div class="modal-ov open" onclick="if(!${locked?'true':'false'}&&event.target===this)closeM()">
  <div class="modal">
    <div class="modal-hd"><span class="modal-title">${title}</span>${locked?'':`<button class="btn btn-ghost btn-icon" onclick="closeM()" style="font-size:19px;border:none;line-height:1;">×</button>`}</div>
    <div class="modal-bd">${body}</div>
    <div class="modal-ft">${locked?onboardingFooter:(S.modal==='newContract'?contractWizardFooter:`<button class="btn btn-ghost" onclick="closeM()">Cancelar</button><button class="btn btn-primary" onclick="if(MODS['${S.modal}'].ok()!==false)closeM()">Salvar</button>`)}</div>
  </div></div>`;
}

function renderLogin(){
  if(S.authSyncing){

  if(S.loginView==='reset-password'){
    const loading=S.authRecovery.resetLoading;

      ?`<div style="background:var(--gbg);border:1px solid var(--green);color:var(--green);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;">${esc(S.authRecovery.resetMessage)}</div>`
      :(S.authRecovery.resetError
        ?`<div style="background:var(--rbg);border:1px solid var(--red);color:var(--red);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;">${esc(S.authRecovery.resetError)}</div>`
        :'');
    return`<div class="login-wrap"><div class="login-card">
  <div class="login-logo">
    <div class="login-ico">EP</div>
    <div style="font-family:var(--fh);font-size:22px;font-weight:800;">Redefinir Senha</div>
    <div style="color:var(--text2);font-size:13px;margin-top:4px;">Crie uma nova senha para sua conta</div>
  </div>
  ${helper}
  ${!canReset?`<div style="background:var(--abg);border:1px solid var(--amber);color:var(--amber);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;">Abra esta página pelo link enviado no e-mail de recuperação.</div>`:''}

  <div class="fg"><label class="fl">Confirmar nova senha</label><input class="fc" type="password" id="reset-password-confirm" placeholder="Repita a senha" ${loading||!canReset?'disabled':''}></div>
  <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;font-size:14px;" onclick="updatePasswordFromRecovery()" ${loading||!canReset?'disabled':''}>${loading?'Atualizando...':'Atualizar senha'}</button>

  </div></div>`;
  }

  if(S.loginView==='register'){
    return`<div class="login-wrap"><div class="login-card" style="max-width:420px;">
  <div class="login-logo">
    <div class="login-ico">EP</div>
    <div style="font-family:var(--fh);font-size:22px;font-weight:800;">EventPro</div>
    <div style="color:var(--text2);font-size:13px;margin-top:4px;">Criar conta gratuita</div>
  </div>
  <div style="background:var(--bg2);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--text2);border-left:3px solid var(--accent2);">

  </div>

async function doLogin(){
  const email=(document.getElementById('lemail')?.value||'').trim().toLowerCase();
  const pass=(document.getElementById('lpass')?.value||'').trim();
  if(!email||!pass){toast('Informe email e senha.','err');return;}

  if(!Array.isArray(DB_ALL?.users)||!DB_ALL.users.length){
    loadDB();
  }

  let candidate=(DB_ALL?.users||[]).find(u=>String(u.email).toLowerCase()===email);
  S.authSyncing=true;
  render();

  try{
    // Fallback cloud-first: em navegador novo pode não existir usuário local ainda.
    if(!candidate&&window.EventProSupabase){
      const remoteLogin=await window.EventProSupabase.signInWithPassword(email,pass);
      if(remoteLogin?.error){
        toast('Usuário ou senha inválidos.','err');
        return;
      }

      let hydrated=false;
      let cloudPullFailed=false;
      if(window.EventProSupabase.pullSnapshotByUserEmail){
        const byEmail=await window.EventProSupabase.pullSnapshotByUserEmail(email);
        if(byEmail?.error){
          console.warn('Fallback cloud pull por e-mail falhou:',byEmail.error);
          cloudPullFailed=true;
        }else if(byEmail?.data?.db){
          DB_ALL=normalizeMultiTenantStore(byEmail.data.db);
          if(byEmail?.data?.clists){
            CLISTS_ALL=normalizeClistsStore(byEmail.data.clists);
          }
          localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
          localStorage.setItem('eventpro_clists_all',JSON.stringify(CLISTS_ALL));
          setLocalDataTs(Number(byEmail?.data?.ts||Date.now()));
          hydrated=true;
        }
      }

      if(!hydrated&&window.EventProSupabase.pullSnapshot){
        const fallbackCompanyId=Number(remoteLogin?.data?.user?.user_metadata?.company_id||0);
        if(fallbackCompanyId>0){
          const snap=await window.EventProSupabase.pullSnapshot(fallbackCompanyId);
          if(snap?.error){
            console.warn('Fallback cloud pull por company_id falhou:',snap.error);
            cloudPullFailed=true;
          }else if(snap?.data?.db){
            DB_ALL=normalizeMultiTenantStore(snap.data.db);
            if(snap?.data?.clists){
              CLISTS_ALL=normalizeClistsStore(snap.data.clists);
            }
            localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
            localStorage.setItem('eventpro_clists_all',JSON.stringify(CLISTS_ALL));
            setLocalDataTs(Number(snap?.data?.ts||Date.now()));
            hydrated=true;
          }
        }
      }

      candidate=(DB_ALL?.users||[]).find(u=>String(u.email).toLowerCase()===email);
      if(!candidate){
        if(cloudPullFailed){
          toast('Login na nuvem confirmado, mas houve falha ao sincronizar os dados da empresa. Tente novamente em instantes.','err');
          return;
        }

        const authUser=remoteLogin?.data?.user||null;
        const meta=authUser?.user_metadata||{};
        const fallbackCompanyId=Number(meta?.company_id||authUser?.app_metadata?.company_id||0);
        if(!fallbackCompanyId){
          toast('Login na nuvem confirmado, mas seu usuário não possui company_id no Supabase. Atualize o metadata e tente novamente.','err');
          return;
        }

        DB_ALL=normalizeMultiTenantStore(DB_ALL||deepClone(DB));
        DB_ALL.companies=DB_ALL.companies||[];
        DB_ALL.users=DB_ALL.users||[];

        let company=(DB_ALL.companies||[]).find(c=>Number(c.id)===fallbackCompanyId);
        if(!company){
          company={
            id:fallbackCompanyId,
            name:String(meta?.company_name||'Minha Empresa').trim()||'Minha Empresa',
            owner:String(meta?.full_name||authUser?.email||'Admin').trim(),
            cnpj:'',
            city:'',
            address:'',
            phone:'',
            email:String(authUser?.email||'').trim().toLowerCase(),
            specialties:'',
          };
          DB_ALL.companies.push(company);
        }

        const role=roleNorm(meta?.role||'admin');
        const existing=(DB_ALL.users||[]).find(u=>String(u.email||'').toLowerCase()===email&&Number(u.empresa_id||0)===fallbackCompanyId);
        if(existing){
          candidate=existing;
        }else{
          const newUser={
            id:nextId(DB_ALL.users||[{id:0}]),
            name:String(meta?.full_name||authUser?.email||email).trim(),
            email,
            role,
            empresa_id:fallbackCompanyId,
            initials:initialsFromName(String(meta?.full_name||authUser?.email||email)),
            passwordHash:await hashPassword(pass),
            mustResetPassword:false,
          };
          DB_ALL.users.push(newUser);
          candidate=newUser;
        }

        MT_TABLES.forEach(t=>{DB_ALL[t]=DB_ALL[t]||[];});
        if(!DB_ALL.finance)DB_ALL.finance={rec:[],pay:[]};
        ensureDefaultEndClientForCompanyInStore(DB_ALL,fallbackCompanyId);
        CLISTS_ALL=normalizeClistsStore(CLISTS_ALL||{});
        CLISTS_ALL[String(fallbackCompanyId)]=CLISTS_ALL[String(fallbackCompanyId)]||{};

        localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
        localStorage.setItem('eventpro_clists_all',JSON.stringify(CLISTS_ALL));
        toast('Login na nuvem confirmado. Dados base da empresa foram inicializados neste dispositivo.','ok');
      }
    }

    if(!candidate){toast('Usuário ou senha inválidos.','err');return;}

    const ok=await verifyPassword(pass,candidate.passwordHash||candidate.password||'');
    if(!ok&&window.EventProSupabase){
      const remoteLogin=await window.EventProSupabase.signInWithPassword(email,pass);
      if(remoteLogin?.error){
        toast('Usuário ou senha inválidos.','err');
        return;
      }
      // Se a senha foi alterada em outro dispositivo, atualiza o hash local.
      candidate.passwordHash=await hashPassword(pass);
      candidate.password='';
      localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
    }else if(!ok){
      toast('Usuário ou senha inválidos.','err');
      return;
    }

    if(candidate.mustResetPassword){
      if(window.EventProSupabase){
        const ensured=await ensureSupabaseAuthForLocalUser(candidate,pass);
        if(ensured?.error)console.warn('Provisionamento/login Supabase no primeiro acesso falhou:',ensured.error);
      }
      S.in=false;
      S.page='login';
      S.loginView='reset-password';
      S.authRecovery.canReset=true;
      S.authRecovery.localUserId=Number(candidate.id);
      S.authRecovery.resetError='';
      S.authRecovery.resetMessage='Primeiro acesso detectado. Defina uma nova senha para continuar.';
      render();
      return;
    }

    let cloudSessionReady=false;
    if(window.EventProSupabase){
      const ensured=await ensureSupabaseAuthForLocalUser(candidate,pass);
      if(ensured?.error||!ensured?.session){
        console.warn('Login/provisionamento Supabase falhou (seguindo com dados locais):',ensured?.error||'sem sessão');
        toast('Sincronização com a nuvem indisponível. Login com dados locais.','warn');
        // Não bloqueia login — segue com dados locais
      }else{
        cloudSessionReady=true;
        if(ensured?.created){
          toast('Login na nuvem criado automaticamente para este usuário.','ok');
        }
      }
      // Garante que company_id está no user_metadata do JWT (corrige usuários antigos)
      if(cloudSessionReady&&window.EventProSupabase.updateUserMetadata&&candidate.empresa_id){
        const session=await window.EventProSupabase.refreshSession();
        const jwtMeta=session?.user?.user_metadata||{};
        const jwtCompanyId=Number(jwtMeta?.company_id||session?.user?.app_metadata?.company_id||0);
        if(!jwtCompanyId||jwtCompanyId!==Number(candidate.empresa_id)){
          await window.EventProSupabase.updateUserMetadata({ company_id:Number(candidate.empresa_id) });
          console.log('[Auth] company_id gravado no user_metadata:',candidate.empresa_id);
        }
      }
    }

    let activeUser=candidate;
    if(cloudSessionReady&&window.EventProSupabase?.pullSnapshot){
      const firstPull=await window.EventProSupabase.pullSnapshot(activeUser.empresa_id);
      if(firstPull?.error){
        console.warn('Primeiro cloud pull no login falhou (seguindo com dados locais):',firstPull.error);
        toast('Não foi possível sincronizar com a nuvem. Usando dados locais.','warn');
        // Não bloqueia login
      }else

      if(!firstPull?.data?.db){
        // Sem snapshot na nuvem: semeia com os dados locais atuais.
        if(window.EventProSupabase?.pushSnapshot){
          const seed=await window.EventProSupabase.pushSnapshot(activeUser.empresa_id,DB_ALL,CLISTS_ALL);
          if(seed?.error){
            console.warn('Cloud sync seed no login falhou:',seed.error);
            toast('Login concluído, mas não foi possível publicar o snapshot inicial.','warn');
          }
        }
      }else{
        try{
          const cloudDBCandidate=normalizeMultiTenantStore(firstPull.data.db);
          const cloudClistsCandidate=firstPull.data.clists?normalizeClistsStore(firstPull.data.clists):null;
          const localCount=countTenantRecords(DB_ALL,CLISTS_ALL,activeUser.empresa_id);
          const cloudCount=countTenantRecords(cloudDBCandidate,cloudClistsCandidate?{[String(activeUser.empresa_id)]:cloudClistsCandidate[String(activeUser.empresa_id)]||{}}:{},activeUser.empresa_id);
          const localTs=getLocalDataTs();
          const cloudTs=getCloudSnapshotTs(firstPull);
          const shouldKeepLocal=(localTs>0&&localCount>0&&(cloudTs===0||cloudTs<localTs))||(localCount>0&&cloudCount===0);
          if(shouldKeepLocal){
            if(window.EventProSupabase?.pushSnapshot){
              const keepLocalPush=await window.EventProSupabase.pushSnapshot(activeUser.empresa_id,DB_ALL,CLISTS_ALL);
              if(keepLocalPush?.error){
                console.warn('Cloud push para preservar local mais novo falhou:',keepLocalPush.error);
              }
            }
            if(cloudCount===0&&localCount>0){
              toastSyncWarn('Snapshot da nuvem veio vazio; mantivemos seus dados locais.');
            }
          }else{
          const cloudDB=cloudDBCandidate;
          const localUsers=deepClone(DB_ALL.users||[]);
          DB_ALL=cloudDB;
          // Preserva senhas/flags locais — nunca sobrescrever com dado da nuvem.
          DB_ALL.users=DB_ALL.users.map(function(cu){
            const lu=localUsers.find(function(u){ return Number(u.id)===Number(cu.id); });
            return lu?Object.assign({},cu,{
              passwordHash:lu.passwordHash||cu.passwordHash,
              password:lu.password||cu.password,
              mustResetPassword:lu.mustResetPassword!=null?lu.mustResetPassword:cu.mustResetPassword,
            }):cu;
          });
          if(firstPull.data.clists){
            CLISTS_ALL=normalizeClistsStore(firstPull.data.clists);
            localStorage.setItem('eventpro_clists_all',JSON.stringify(CLISTS_ALL));
          }
          localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
          setLocalDataTs(cloudTs||Date.now());
          activeUser=DB_ALL.users.find(function(u){ return Number(u.id)===Number(candidate.id); })||candidate;
          console.log('Primeiro sync do login concluído com sucesso.');
          }
        }catch(syncErr){
          console.warn('Erro ao aplicar snapshot da nuvem no primeiro login (seguindo com dados locais):',syncErr);
          toast('Não foi possível aplicar os dados da nuvem. Usando dados locais.','warn');
          // Não bloqueia login
        }
      }
    }

    applyTenantScope(activeUser);
    S.in=true;
    S.page='dashboard';
    localStorage.setItem('eventpro_session_user',String(activeUser.id));
    toast(`Bem-vindo ao EventPro, ${activeUser.name.split(' ')[0]}! 👋`);
    render();
  }catch(err){
    console.error('Erro no login:',err);
    toast('Falha ao entrar. Os dados locais foram restaurados; tente novamente.','err');
    resetToDefaultStores();
    localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
    localStorage.setItem('eventpro_clists_all',JSON.stringify(CLISTS_ALL));
    localStorage.removeItem('eventpro_session_user');
    S.in=false;
    S.page='login';
    render();
  }finally{
    S.authSyncing=false;
    if(S.in)startRealtimeSync();
    if(!S.in)render();
  }
}

async function registerEmpresa(){
  const nomeEmpresa=(document.getElementById('rEmpresa')?.value||'').trim();
  const nomeAdmin=(document.getElementById('rNome')?.value||'').trim();
  const email=(document.getElementById('rEmail')?.value||'').trim().toLowerCase();
  const senha=(document.getElementById('rSenha')?.value||'').trim();
  const senha2=(document.getElementById('rSenha2')?.value||'').trim();
  const lgpd=document.getElementById('rLGPD')?.checked;

  if(!nomeEmpresa){toast('Informe o nome da empresa.','err');return;}
  if(!nomeAdmin){toast('Informe seu nome completo.','err');return;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('Informe um email válido.','err');return;}
  const passwordValidation=validatePasswordPolicy(senha,senha2);
  if(!passwordValidation.ok){toast(passwordValidation.message,'err');return;}
  if(!lgpd){toast('Aceite os termos de uso de dados (LGPD) para continuar.','err');return;}

  if((DB_ALL?.users||[]).some(u=>String(u.email).toLowerCase()===email)){
    toast('Este email já está em uso.','err');return;
  }

  if(window.EventProSupabase){
    const remoteSignup = await window.EventProSupabase.signUp(email,senha,{ full_name:nomeAdmin, company_name:nomeEmpresa });
    if(remoteSignup?.error){
      console.error('Falha ao criar login no Supabase:',remoteSignup.error);
      const authMsg=String(remoteSignup.error?.message||'').trim();
      const hint=authMsg?` Motivo: ${authMsg}`:'';
      toast(`Não foi possível criar o login no Supabase.${hint}`,'err');
      if(window.EventProSupabase.healthCheck){
        const diag=await window.EventProSupabase.healthCheck();
        if(!diag?.ok){
          const diagMsg=String(diag?.error?.message||'').trim();
          if(diagMsg)toast(`Diagnóstico Supabase: ${diagMsg}`,'warn');
        }
      }
      return;
    }

    let cloudSession=await window.EventProSupabase.refreshSession();
    if(!cloudSession&&window.EventProSupabase.signInWithPassword){
      const remoteLogin=await window.EventProSupabase.signInWithPassword(email,senha);
      if(remoteLogin?.error){
        console.warn('Login Supabase após cadastro falhou:',remoteLogin.error);
      }
      cloudSession=await window.EventProSupabase.refreshSession();
    }
    if(!cloudSession){
      toast('Conta ainda sem sessão Supabase ativa. Confirme o e-mail da conta (Auth) e tente novamente.','err');
      return;
    }
  }

  const newEmpresaId=nextId(DB_ALL.companies||[{id:0}]);
  const newUserId=nextId(DB_ALL.users||[{id:0}]);
  const pwdHash=await hashPassword(senha);

  const newEmpresa={
    id:newEmpresaId,
    name:nomeEmpresa,
    owner:nomeAdmin,
    cnpj:'',
    city:'',
    address:'',
    phone:'',
    email:'',
    specialties:'',
  };
  const newAdmin={id:newUserId,name:nomeAdmin,email,role:'admin',empresa_id:newEmpresaId,initials:initialsFromName(nomeAdmin),passwordHash:pwdHash};

  DB_ALL.companies=DB_ALL.companies||[];
  DB_ALL.companies.push(newEmpresa);
  DB_ALL.users=DB_ALL.users||[];
  DB_ALL.users.push(newAdmin);

  // init empty tenant tables
  MT_TABLES.forEach(t=>{DB_ALL[t]=DB_ALL[t]||[];});
  ensureDefaultEndClientForCompanyInStore(DB_ALL,newEmpresaId);
  if(!DB_ALL.finance){DB_ALL.finance={rec:[],pay:[]};}

  CLISTS_ALL[String(newEmpresaId)]={};

  localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
  localStorage.setItem('eventpro_clists_all',JSON.stringify(CLISTS_ALL));

  applyTenantScope(newAdmin);
  saveDB();

  if(window.EventProSupabase){
    // 1. Grava company_id no user_metadata do JWT para que RLS funcione
    if(window.EventProSupabase.updateUserMetadata){
      const metaRes=await window.EventProSupabase.updateUserMetadata({ company_id:newEmpresaId });
      if(metaRes?.error){
        console.warn('Falha ao gravar company_id no metadata Supabase:',metaRes.error);
        toast('Conta criada, mas não foi possível vincular company_id ao login. Sync pode falhar.','warn');
      }
    }
    // 2. Envia snapshot inicial agora que JWT tem company_id
    if(window.EventProSupabase.pushSnapshot){
      const seed=await window.EventProSupabase.pushSnapshot(newEmpresaId,DB_ALL,CLISTS_ALL);
      if(seed?.error){
        console.warn('Falha ao semear snapshot da nova empresa:',seed.error);
        toast('Conta criada, mas o sync em nuvem falhou neste momento.','warn');
      }
    }
  }

  S.in=true;
  S.page='dashboard';
  S.loginView='login';
  localStorage.setItem('eventpro_session_user',String(newAdmin.id));
  toast(`Bem-vindo ao EventPro, ${nomeAdmin.split(' ')[0]}! Empresa criada com sucesso 🎉`);
  render();
}

// PWA Service Worker
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='eventpro-v1';
const ASSETS=['/'];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/')))));
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}

function startRealtimeSync(){
  if(!S.in||!S.companyId)return;
  if(!window.EventProSupabase?.subscribeToSnapshot)return;
  window.EventProSupabase.subscribeToSnapshot(S.companyId,async function(payload){
    // Ignora eventos que vieram do próprio dispositivo (mesmo updated_at que acabamos de enviar)
    if(PULL_REFRESH.running||S.syncStatus.pending)return;
    console.log('[Realtime] snapshot atualizado por outro dispositivo — verificando timestamp...');
    // Não usa force: respeita timestamp para não sobrescrever edit local concorrente
    const result=await syncCloudSnapshotOnBoot({force:false});
    if(result?.updated){
      toast('☁️ Dados atualizados por outro dispositivo','ok');
    }
  });
}

(async function initApp(){
  loadDB();
  syncAuthRecoveryRouteFromLocation();
  render();
  installPullToRefreshGesture();
  await bootstrapSupabaseBridge();
  await syncCloudSnapshotOnBoot();
  startRealtimeSync();
})();
