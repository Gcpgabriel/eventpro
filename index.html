<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0f1a">
<meta name="description" content="EventPro — Sistema de Gestão Profissional de Eventos">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EventPro">
<title>EventPro — Gestão de Eventos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');
:root{--bg:#0b0f1a;--bg2:#111827;--bg3:#1a2233;--surface:#1e2d3d;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#eef2ff;--text2:#94a3b8;--text3:#475569;--accent:#6366f1;--accent2:#a5b4fc;--glow:rgba(99,102,241,0.15);--green:#10b981;--gbg:rgba(16,185,129,0.12);--amber:#f59e0b;--abg:rgba(245,158,11,0.12);--red:#ef4444;--rbg:rgba(239,68,68,0.12);--blue:#3b82f6;--bbg:rgba(59,130,246,0.12);--purple:#8b5cf6;--pbg:rgba(139,92,246,0.12);--cyan:#06b6d4;--cbg:rgba(6,182,212,0.12);--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--r:10px;--r2:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* LAYOUT */
#app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:228px;min-width:228px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .3s;}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:14px;color:#fff;flex-shrink:0;}
.logo-name{font-family:var(--fh);font-weight:700;font-size:15px;}
.logo-pro{font-size:9px;background:var(--accent);color:#fff;padding:2px 5px;border-radius:4px;font-weight:700;margin-left:auto;}
.sb-nav{flex:1;overflow-y:auto;padding:8px 8px;}
.nav-sec{margin-bottom:4px;}
.nav-sec-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:8px 10px 4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;position:relative;user-select:none;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--glow);color:var(--accent2);font-weight:500;}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--accent);border-radius:0 3px 3px 0;}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;font-size:10px;padding:1px 5px;border-radius:10px;font-weight:700;}
.nb-red{background:var(--red);color:#fff;}
.nb-amber{background:var(--amber);color:#000;}
.nb-green{background:var(--green);color:#fff;}
.sb-footer{padding:10px 8px;border-top:1px solid var(--border);}
.user-row{display:flex;align-items:center;gap:9px;padding:8px;border-radius:var(--r);cursor:pointer;transition:background .15s;}
.user-row:hover{background:var(--bg3);}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.user-name{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-size:10.5px;color:var(--text3);}

/* MAIN */
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
#topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;}
.topbar-title{font-family:var(--fh);font-size:16px;font-weight:600;flex:1;}
.search-box{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:5px 11px;font-size:12.5px;color:var(--text3);width:190px;}
#content{flex:1;overflow-y:auto;padding:18px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);cursor:pointer;font-size:12.5px;font-weight:500;border:none;font-family:var(--fb);transition:all .15s;line-height:1;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#4f46e5;transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--bg3);color:var(--text);}
.btn-sm{padding:5px 10px;font-size:11.5px;}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;border-radius:8px;}
.btn-danger{background:var(--rbg);color:var(--red);border:1px solid var(--red);}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:border-color .2s;}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.card-title{font-family:var(--fh);font-size:13.5px;font-weight:600;flex:1;}
.card-body{padding:14px 16px;}

/* GRID */
.grid{display:grid;gap:14px;}
.g2{grid-template-columns:1fr 1fr;}
.g3{grid-template-columns:1fr 1fr 1fr;}
.g4{grid-template-columns:repeat(4,1fr);}

/* STAT CARDS */
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;cursor:pointer;transition:border-color .2s;}
.stat:hover{border-color:var(--border2);}
.stat-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.stat-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.stat-chg{font-size:10.5px;padding:2px 6px;border-radius:20px;font-weight:700;}
.up{background:var(--gbg);color:var(--green);}
.dn{background:var(--rbg);color:var(--red);}
.stat-val{font-family:var(--fh);font-size:24px;font-weight:700;line-height:1;margin-bottom:3px;}
.stat-lbl{font-size:11.5px;color:var(--text2);}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700;}
.b-green{background:var(--gbg);color:var(--green);}
.b-amber{background:var(--abg);color:var(--amber);}
.b-red{background:var(--rbg);color:var(--red);}
.b-blue{background:var(--bbg);color:var(--blue);}
.b-purple{background:var(--pbg);color:var(--purple);}
.b-cyan{background:var(--cbg);color:var(--cyan);}
.b-gray{background:rgba(255,255,255,0.06);color:var(--text2);}

/* TABLE */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:9px 13px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:11px 13px;border-bottom:1px solid var(--border);font-size:12.5px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.015);}

/* FORM */
.fg{margin-bottom:13px;}
.fl{display:block;font-size:11.5px;font-weight:600;color:var(--text2);margin-bottom:5px;}
.fc{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:8px 11px;color:var(--text);font-size:13px;font-family:var(--fb);outline:none;transition:border-color .15s;}
.fc:focus{border-color:var(--accent);}
textarea.fc{resize:vertical;min-height:72px;}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-ov.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;transform:translateY(16px);transition:transform .2s;}
.modal-ov.open .modal{transform:translateY(0);}
.modal-hd{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.modal-title{font-family:var(--fh);font-size:15px;font-weight:600;flex:1;}
.modal-bd{padding:18px;}
.modal-ft{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}

/* PROGRESS */
.prog{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.prog-bar{height:100%;border-radius:3px;transition:width .5s;}

/* TABS */
.tabs{display:flex;gap:2px;padding:3px;background:var(--bg3);border-radius:var(--r);width:fit-content;}
.tab{padding:5px 12px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--text2);transition:all .15s;}
.tab.active{background:var(--bg2);color:var(--text);font-weight:500;}

/* LIST */
.li{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--border);}
.li:last-child{border-bottom:none;}
.li-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.li-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-sub{font-size:11.5px;color:var(--text2);margin-top:2px;}

/* CHECKLIST */
.ci{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.ci:last-child{border-bottom:none;}
.cb{width:17px;height:17px;border-radius:5px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.cb.on{background:var(--green);border-color:var(--green);}

/* NPS */
.nps-row{display:flex;gap:5px;flex-wrap:wrap;}
.nps-d{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .15s;background:var(--bg3);color:var(--text2);}
.nps-d:hover,.nps-d.sel{border-color:var(--accent);color:var(--accent2);background:var(--glow);}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:38px;width:370px;}
.login-logo{text-align:center;margin-bottom:26px;}
.login-ico{width:50px;height:50px;background:var(--accent);border-radius:13px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:20px;color:#fff;margin-bottom:10px;}

/* NOTIF */
#notifs{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:7px;}
.notif{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 14px;font-size:12.5px;display:flex;align-items:center;gap:9px;transform:translateX(120%);transition:transform .3s;pointer-events:all;max-width:280px;}
.notif.show{transform:translateX(0);}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-d{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:3px 2px;border-radius:var(--r);font-size:11px;cursor:pointer;transition:background .15s;position:relative;}
.cal-d:hover{background:var(--bg3);}
.cal-d.today{background:var(--glow);color:var(--accent2);font-weight:700;}
.cal-d.has-ev::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:2px;}
.cal-d.other{color:var(--text3);}
.cal-d.sel-day{outline:1px solid var(--accent);background:var(--glow);color:var(--accent2);font-weight:700;}

/* AGENDA DIA */
.day-nav{display:flex;align-items:center;gap:8px;margin:10px 0 12px;}
.day-strip{display:flex;gap:8px;overflow-x:auto;scroll-snap-type:x mandatory;padding:2px 0;flex:1;}
.day-pill{min-width:88px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);cursor:pointer;scroll-snap-align:start;transition:all .15s;text-align:center;}
.day-pill:hover{border-color:var(--border2);}
.day-pill.active{background:var(--glow);border-color:var(--accent);}
.day-pill-dow{font-size:10px;color:var(--text2);line-height:1.2;}
.day-pill-date{font-size:12px;font-weight:600;}
.agenda-day-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;cursor:pointer;transition:border-color .2s,transform .15s;}
.agenda-day-card:hover{border-color:var(--accent);transform:translateY(-1px);}

/* EVENT DRAWER */
.drawer-ov{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:140;opacity:0;pointer-events:none;transition:opacity .2s;}
.drawer-ov.open{opacity:1;pointer-events:all;}
.drawer{position:absolute;right:0;top:0;height:100%;width:min(92vw,440px);background:var(--bg2);border-left:1px solid var(--border2);padding:16px;overflow-y:auto;transform:translateX(100%);transition:transform .2s;}
.drawer-ov.open .drawer{transform:translateX(0);}

/* DIVIDER */
.div{height:1px;background:var(--border);margin:14px 0;}

/* EMPTY */
.empty{text-align:center;padding:36px 20px;color:var(--text3);}
.empty-ico{font-size:34px;margin-bottom:10px;}

/* EVENT CARD */
.ev-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;cursor:pointer;transition:border-color .2s,transform .15s;flex:1;min-width:260px;}
.ev-card:hover{border-color:var(--accent);transform:translateY(-1px);}

/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{width:54px;min-width:54px;}
  .logo-name,.logo-pro,.nav-item span:not(.nav-icon),.nav-badge,.user-name,.user-role,.nav-sec-label{display:none;}
  .nav-item{justify-content:center;padding:10px;}
  .sb-logo{justify-content:center;padding:14px 10px;}
  #content{padding:12px;}
  .g4,.g3{grid-template-columns:1fr 1fr;}
  .g2{grid-template-columns:1fr;}
  .topbar-title{font-size:14px;}
  .search-box{display:none;}
}
</style>
</head>
<body>
<div id="notifs"></div>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./eventpro-supabase.js"></script>
<script>
function pgConfig(){
  const co=DB.company;
  const isAdmin=currentRole()==='admin';
  const logoPreview=co.logo?`<img src="${co.logo}" alt="Logo da empresa" style="max-height:120px;max-width:300px;display:block;border-radius:8px;border:1px solid var(--border);margin-top:8px;">`:'<div style="color:var(--muted);font-size:13px;margin-top:8px;">Nenhuma logo carregada</div>';
  const editFields=isAdmin?`
    <div class="form-row"><div class="form-group"><label>Nome da Empresa</label><input id="cfg-name" class="input" value="${esc(co.name||'')}"></div><div class="form-group"><label>Responsável</label><input id="cfg-owner" class="input" value="${esc(co.owner||'')}"></div></div>
    <div class="form-row"><div class="form-group"><label>CNPJ</label><input id="cfg-cnpj" class="input" value="${esc(co.cnpj||'')}"></div><div class="form-group"><label>Telefone</label><input id="cfg-phone" class="input" value="${esc(co.phone||'')}"></div></div>
    <div class="form-group"><label>E-mail</label><input id="cfg-email" class="input" value="${esc(co.email||'')}"></div>
    <div class="form-group"><label>Endereço</label><input id="cfg-address" class="input" value="${esc(co.address||'')}"></div>
    <div class="form-group"><label>Especialidades</label><input id="cfg-specialties" class="input" value="${esc(co.specialties||'')}"></div>
    <div class="form-group"><label>Logo da Empresa <span style="color:var(--muted);font-size:12px;">(JPEG, PNG ou GIF — máx 2 MB)</span></label>${logoPreview}<div style="display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap;"><label class="btn btn-secondary" style="cursor:pointer;">📁 Selecionar imagem<input type="file" id="cfg-logo-input" accept="image/*" style="display:none;" onchange="handleLogoUpload(event)"></label>${co.logo?`<button class="btn btn-ghost" onclick="removeLogo()">🗑 Remover logo</button>`:''}</div><div id="cfg-logo-error" style="color:var(--danger);font-size:13px;margin-top:4px;display:none;"></div></div>
    <div style="margin-top:20px;"><button class="btn btn-primary" onclick="saveConfig()">💾 Salvar configurações</button></div>
  `:`
    <div class="form-row"><div class="form-group"><label>Nome da Empresa</label><div class="input" style="background:var(--bg-alt);color:var(--muted);">${esc(co.name||'—')}</div></div><div class="form-group"><label>Responsável</label><div class="input" style="background:var(--bg-alt);color:var(--muted);">${esc(co.owner||'—')}</div></div></div>
    <div class="form-row"><div class="form-group"><label>CNPJ</label><div class="input" style="background:var(--bg-alt);color:var(--muted);">${esc(co.cnpj||'—')}</div></div><div class="form-group"><label>Telefone</label><div class="input" style="background:var(--bg-alt);color:var(--muted);">${esc(co.phone||'—')}</div></div></div>
    <div class="form-group"><label>E-mail</label><div class="input" style="background:var(--bg-alt);color:var(--muted);">${esc(co.email||'—')}</div></div>
    <div class="form-group"><label>Endereço</label><div class="input" style="background:var(--bg-alt);color:var(--muted);">${esc(co.address||'—')}</div></div>
    <div class="form-group"><label>Especialidades</label><div class="input" style="background:var(--bg-alt);color:var(--muted);">${esc(co.specialties||'—')}</div></div>
    <div class="form-group"><label>Logo da Empresa</label>${logoPreview}</div><p style="color:var(--muted);font-size:13px;margin-top:12px;">Apenas administradores podem editar as configurações da empresa.</p>
  `;
  return `<div class="page-content"><div class="card"><div class="card-header"><span class="card-title">🏢 Perfil da Empresa</span></div><div style="padding:20px 24px;">${editFields}</div></div></div>`;
}

function handleLogoUpload(e){
  const file=e.target.files[0];
  if(!file)return;
  const errEl=document.getElementById('cfg-logo-error');
  if(file.size>2*1024*1024){
    errEl.textContent='Arquivo muito grande. O tamanho máximo é 2 MB.';
    errEl.style.display='block';
    e.target.value='';
    return;
  }
  errEl.style.display='none';
  const reader=new FileReader();
  reader.onload=ev=>{
    DB.company.logo=ev.target.result;
    const idx=DB_ALL.companies.findIndex(c=>c.id===Number(S.companyId||1));
    if(idx>=0)DB_ALL.companies[idx].logo=ev.target.result;
    saveDB();
    render();
  };
  reader.readAsDataURL(file);
}

function removeLogo(){
  DB.company.logo='';
  const idx=DB_ALL.companies.findIndex(c=>c.id===Number(S.companyId||1));
  if(idx>=0)DB_ALL.companies[idx].logo='';
  saveDB();
  render();
}

function saveConfig(){
  DB.company.name=document.getElementById('cfg-name').value.trim();
  DB.company.owner=document.getElementById('cfg-owner').value.trim();
  DB.company.cnpj=document.getElementById('cfg-cnpj').value.trim();
  DB.company.phone=document.getElementById('cfg-phone').value.trim();
  DB.company.email=document.getElementById('cfg-email').value.trim();
  DB.company.address=document.getElementById('cfg-address').value.trim();
  DB.company.specialties=document.getElementById('cfg-specialties').value.trim();
  const idx=DB_ALL.companies.findIndex(c=>c.id===Number(S.companyId||1));
  if(idx>=0)Object.assign(DB_ALL.companies[idx],{
    name:DB.company.name,owner:DB.company.owner,cnpj:DB.company.cnpj,
    phone:DB.company.phone,email:DB.company.email,address:DB.company.address,
    specialties:DB.company.specialties,
  });
  saveDB();
  toast('Configurações salvas com sucesso ✅');
  render();
}

function deepClone(v){
  return JSON.parse(JSON.stringify(v));
}

function roleNorm(role){
  return String(role||'employee').toLowerCase();
}

function roleLabel(role){
  const r=roleNorm(role);
  if(r==='admin')return'Admin';
  if(r==='manager')return'Manager';
  return'Employee';
}

function initialsFromName(name){
  const parts=String(name||'U').trim().split(/\s+/).filter(Boolean);
  if(!parts.length)return'UP';
  return (parts[0][0]+(parts[1]?.[0]||parts[0][1]||'')).toUpperCase();
}

function ensureEmpresaId(rows,empresaId){
  if(!Array.isArray(rows))return[];
  return rows.map(r=>({empresa_id:empresaId,...r,empresa_id:Number(r?.empresa_id||empresaId)}));
}

function normalizeFinanceEntry(entry,type){
  const r={...entry};
  const due=r.data_vencimento||r.due||new Date().toISOString().slice(0,10);
  r.data_vencimento=due;
  r.due=due;

  if(type==='rec'){
    if(r.status==='pendente')r.status='a_receber';
    if(r.status==='pago')r.status='recebido';
    if(r.status!=='a_receber'&&r.status!=='recebido')r.status='a_receber';
  }else{
    if(r.status==='pendente')r.status='a_pagar';
    if(r.status!=='a_pagar'&&r.status!=='pago')r.status='a_pagar';
  }

  return r;
}

function normalizeClistsStore(raw){
  if(!raw||typeof raw!=='object')return{'1':{}};
  const keys=Object.keys(raw);
  const nested=keys.length&&keys.every(k=>raw[k]&&typeof raw[k]==='object'&&!Array.isArray(raw[k]));
  if(nested&&keys.some(k=>raw[k]&&raw[k][1]!==undefined))return raw;
  return{'1':raw};
}

function normalizeMultiTenantStore(data){
  const store=data&&typeof data==='object'?data:{};

  if(!Array.isArray(store.companies)||!store.companies.length){
    const c=store.company||{};
    store.companies=[{
      id:1,
      name:c.name||'Empresa 1',
      owner:c.owner||'',
      cnpj:c.cnpj||'',
      address:c.address||'',
      phone:c.phone||'',
      email:c.email||'',
      specialties:c.specialties||'',
      logo:c.logo||'',
    }];
  }

  const defaultUser=store.user||{name:'Rafael Moura',email:'rafael@eventpro.com',initials:'RM'};
  if(!Array.isArray(store.users)||!store.users.length){
    store.users=[
      {id:1,name:defaultUser.name||'Rafael Moura',email:defaultUser.email||'rafael@eventpro.com',role:'admin',empresa_id:1,initials:defaultUser.initials||initialsFromName(defaultUser.name),password:'123456'},
      {id:2,name:'Carlos Freitas',email:'carlos@eventpro.com',role:'manager',empresa_id:1,initials:'CF',password:'123456'},
      {id:3,name:'Bia Rodrigues',email:'bia@eventpro.com',role:'employee',empresa_id:1,initials:'BR',password:'123456'},
    ];
  }

  store.users=store.users.map((u,idx)=>({
    id:Number(u.id||idx+1),
    name:u.name||`Usuário ${idx+1}`,
    email:(u.email||`user${idx+1}@eventpro.com`).toLowerCase(),
    role:roleNorm(u.role),
    empresa_id:Number(u.empresa_id||1),
    initials:u.initials||initialsFromName(u.name),
    password:u.password||'123456',
  }));

  MT_TABLES.forEach(t=>{store[t]=ensureEmpresaId(store[t],1);});
  if(!store.finance)store.finance={rec:[],pay:[]};
  store.finance.rec=ensureEmpresaId(store.finance.rec,1).map(r=>normalizeFinanceEntry(r,'rec'));
  store.finance.pay=ensureEmpresaId(store.finance.pay,1).map(r=>normalizeFinanceEntry(r,'pay'));

  store.companies=store.companies.map((c,idx)=>({id:Number(c.id||idx+1),...c}));
  return store;
}

function applyTenantScope(user){
  if(!user)return;
  const empresaId=Number(user.empresa_id||1);
  const company=DB_ALL.companies.find(c=>Number(c.id)===empresaId)||DB_ALL.companies[0];
  S.companyId=empresaId;
  S.currentUser={...user,role:roleNorm(user.role)};

  DB.company={...company};
  DB.user={name:user.name,email:user.email,role:roleLabel(user.role),initials:user.initials||initialsFromName(user.name)};

  MT_TABLES.forEach(t=>{
    DB[t]=deepClone((DB_ALL[t]||[]).filter(r=>Number(r.empresa_id)===empresaId));
  });
  DB.finance={
    rec:deepClone((DB_ALL.finance?.rec||[]).filter(r=>Number(r.empresa_id)===empresaId)),
    pay:deepClone((DB_ALL.finance?.pay||[]).filter(r=>Number(r.empresa_id)===empresaId)),
  };

  const tenantClists=deepClone(CLISTS_ALL[String(empresaId)]||{});
  Object.keys(tenantClists).forEach(eid=>{
    tenantClists[eid]=(tenantClists[eid]||[]).map(t=>({empresa_id:empresaId,...t,empresa_id:Number(t?.empresa_id||empresaId)}));
  });
  clists=tenantClists;
  if(!DB.events.find(e=>e.id===S.selEv))S.selEv=DB.events[0]?.id||null;
}

async function hashPassword(pass){
  const enc=new TextEncoder();
  const buf=await crypto.subtle.digest('SHA-256',enc.encode(String(pass)));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function isHashed(p){return typeof p==='string'&&p.length===64&&/^[0-9a-f]+$/.test(p);}
async function verifyPassword(plain,stored){
  if(!stored)return false;
  if(isHashed(stored))return(await hashPassword(plain))===stored;
  return String(plain)===String(stored); // legacy plain-text backward compat
}

    MT_TABLES.forEach(t=>{

}

function toast(msg,t='ok'){
  const el=document.createElement('div');
  el.className='notif';
  const ico=t==='ok'?'✓':t==='err'?'✕':'ℹ';
  el.innerHTML=`<span style="color:${t==='ok'?'var(--green)':t==='err'?'var(--red)':'var(--blue)'};font-weight:700;font-size:15px;">${ico}</span><span>${msg}</span>`;
  document.getElementById('notifs').appendChild(el);
  setTimeout(()=>el.classList.add('show'),10);
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),400);},3000);
}

function nextId(arr){return arr.length?Math.max(...arr.map(i=>i.id))+1:1;}
function esc(v){
  return String(v??'').replace(/[&<>"']/g,m=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}
function fmtDateBR(iso){
  if(!iso)return'';
  const [y,m,d]=String(iso).split('-');
  return y&&m&&d?`${d}/${m}/${y}`:iso;
}

function fmtRelativeDayLabel(iso){
  if(!iso)return 'sem data';
  const ref=new Date(`${isoToday()}T12:00:00`);
  const dt=new Date(`${iso}T12:00:00`);
  if(Number.isNaN(dt.getTime()))return 'sem data';
  const diff=Math.round((dt-ref)/86400000);
  if(diff===0)return 'hoje';
  if(diff===1)return 'amanhã';
  if(diff===-1)return 'ontem';
  if(diff>1)return `em ${diff} dias`;
  return `${Math.abs(diff)} dias atrás`;
}

function isoToday(){
  const d=new Date();
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function shiftISODate(iso,deltaDays){
  const base=String(iso||isoToday()).split('-').map(Number);
  const dt=new Date(base[0]||new Date().getFullYear(),(base[1]||1)-1,base[2]||1);
  dt.setDate(dt.getDate()+Number(deltaDays||0));
  const y=dt.getFullYear();
  const m=String(dt.getMonth()+1).padStart(2,'0');
  const d=String(dt.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function startTsOfEvent(e){
  const t=e?.time||'00:00';
  return new Date(`${e?.date||isoToday()}T${t}:00`).getTime();
}

function getTenantEvents(){
  const compId=Number(S.companyId||1);
  return (DB.events||[]).filter(e=>Number(e?.empresa_id||compId)===compId);
}

function getClientEventsByName(clientName){
  const key=String(clientName||'').trim().toLowerCase();
  return getTenantEvents()
    .filter(e=>String(e?.client||'').trim().toLowerCase()===key)
    .sort((a,b)=>startTsOfEvent(b)-startTsOfEvent(a));
}

function getClientSummary(client){
  const events=getClientEventsByName(client?.name);
  const totalValue=events.reduce((a,b)=>a+Number(b.value||0),0);
  return {
    events,
    eventCount:events.length,
    totalValue,
    lastEventDate:events[0]?.date||client?.last||'-',
  };
}

function ensureAgendaDay(){
  const tenantEvents=getTenantEvents().sort((a,b)=>startTsOfEvent(a)-startTsOfEvent(b));
  if(S.agendaDay&&/^\d{4}-\d{2}-\d{2}$/.test(S.agendaDay))return;
  const today=isoToday();
  const next=tenantEvents.find(e=>String(e.date)>=today);
  S.agendaDay=next?.date||tenantEvents[0]?.date||today;
}

function agendaSetDay(iso){
  S.agendaDay=String(iso||isoToday());
  render();
}

function agendaMoveDay(delta){
  ensureAgendaDay();
  S.agendaDay=shiftISODate(S.agendaDay,delta);
  render();
}

function onlyDigits(v){
  return String(v||'').replace(/\D/g,'');
}

function isValidCPF(cpf){
  const d=onlyDigits(cpf);
  if(d.length!==11)return false;
  if(/^(\d)\1{10}$/.test(d))return false;
  const calc=(base,factor)=>{
    let sum=0;
    for(let i=0;i<base.length;i++)sum+=Number(base[i])*(factor-i);
    const r=(sum*10)%11;
    return r===10?0:r;
  };
  const d1=calc(d.slice(0,9),10);
  const d2=calc(d.slice(0,10),11);
  return d1===Number(d[9])&&d2===Number(d[10]);
}

function formatCPF(cpf){
  const d=onlyDigits(cpf).slice(0,11);
  return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');
}

function formatCNPJ(cnpj){
  const d=onlyDigits(cnpj).slice(0,14);
  return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
}

function maskDocument(doc,type){
  const d=onlyDigits(doc);
  if(type==='PF'&&d.length===11)return `***.${d.slice(3,6)}.${d.slice(6,9)}-**`;
  if(type==='PJ'&&d.length===14)return `**.${d.slice(2,5)}.${d.slice(5,8)}/****-**`;
  return '***';
}

function maskBirthDate(birth){
  if(!birth)return '-';
  const [y,m]=String(birth).split('-');
  return y&&m?`${m}/${y}`:'-';
}

function toCSVField(v){
  const s=String(v??'');
  if(/[",\n;]/.test(s))return `"${s.replace(/"/g,'""')}"`;
  return s;
}

function valorPorExtenso(valor){
  if(!valor||isNaN(valor))return'zero reais';
  const n=Math.round(Number(valor)*100);
  const reais=Math.floor(n/100);
  const centavos=n%100;
  const u=['','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
  const d=['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
  const c=['','cem','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
  function centenas(n){
    if(n===0)return'';
    if(n===100)return'cem';
    const r=[];
    if(Math.floor(n/100))r.push(c[Math.floor(n/100)]);
    const resto=n%100;
    if(resto<20&&resto>0)r.push(u[resto]);
    else{if(Math.floor(resto/10))r.push(d[Math.floor(resto/10)]);if(resto%10)r.push(u[resto%10]);}
    return r.join(' e ');
  }
  function milhar(n){
    if(n===0)return'';
    const r=[];
    if(Math.floor(n/1000000)){const m=Math.floor(n/1000000);r.push(centenas(m)+(m===1?' milhão':' milhões'));n=n%1000000;}
    if(Math.floor(n/1000)){const m=Math.floor(n/1000);r.push(m===1?'mil':centenas(m)+' mil');n=n%1000;}
    if(n>0)r.push(centenas(n));
    return r.join(' e ');
  }
  const parteReais=milhar(reais)||(centavos>0?'':'zero');
  const sufReais=reais===1?'real':'reais';
  if(centavos===0)return`${parteReais} ${sufReais}`;
  const parteCents=centavos<20?u[centavos]:(d[Math.floor(centavos/10)]+(centavos%10?' e '+u[centavos%10]:''));
  const sufCents=centavos===1?'centavo':'centavos';
  return`${parteReais} ${sufReais} e ${parteCents} ${sufCents}`;
}

function downloadTextFile(fileName,content,type='text/plain;charset=utf-8'){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=fileName;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),300);
}

function createContract(){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem gerar contratos.'))return false;
  const eid=Number(document.getElementById('newContractEvent')?.value||S.contractPrefillEventId||0);
  const ev=DB.events.find(e=>e.id===eid);
  if(!ev){toast('Selecione um evento válido.','err');return false;}

  const cl=DB.clients.find(c=>c.name===ev.client);
  const duration=Number(document.getElementById('contractDuration')?.value||6);
  const paymentId=Number(document.getElementById('contractPayment')?.value||1);
  const pm=DB.paymentMethods.find(p=>p.id===paymentId)||DB.paymentMethods[0];
  const notes=document.getElementById('contractNotes')?.value.trim()||'';
  const clientAddr=document.getElementById('contractClientAddr')?.value.trim()||cl?.address||'';
  const checkedServices=Array.from(document.querySelectorAll('[name="contractService"]:checked')).map(el=>el.value);
  const customServices=document.getElementById('contractServicesCustom')?.value.trim();
  if(customServices)checkedServices.push(customServices);
  const services=checkedServices.join(', ')||'Som e Iluminação';

  if(!services){toast('Selecione pelo menos uma categoria de serviços.','err');return false;}
  
  const contract={
    id:nextId(DB.contracts),
    eventId:eid,
    clientId:cl?cl.id:null,
    clientName:ev.client,
    clientDoc:cl?.doc||'',
    clientAddr,
    services,
    duration,
    payment:pm?pm.name:'',
    paymentId:pm?pm.id:null,
    penalty:10,
    notes,
    createdAt:new Date().toISOString().slice(0,10),
    empresa_id:Number(S.companyId||1),
  };

  DB.contracts.push(contract);
  saveDB();
  
  // Gerar contrato em PDF
  generateContractPDF(ev,contract,cl);
  
  S.contractPrefillEventId=null;
  toast('Contrato gerado com sucesso! 📑');
  render();
  return true;
}

function toISODate(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function shiftISODate(iso,days){
  if(!iso)return new Date().toISOString().slice(0,10);
  const dt=new Date(`${iso}T12:00:00`);
  if(Number.isNaN(dt.getTime()))return new Date().toISOString().slice(0,10);
  dt.setDate(dt.getDate()+days);
  return toISODate(dt);
}

function generateContractReceivables(contract,ev){
  if(!contract||!ev)return{created:0,total:0};

  const existing=DB.finance.rec.filter(r=>r.type==='contract-revenue'&&r.contractId===contract.id);
  if(existing.length)return{created:0,total:existing.length};

  const totalValue=Number(ev.value||0);
  if(totalValue<=0)return{created:0,total:0};

  const pm=DB.paymentMethods.find(m=>m.id===Number(contract.paymentId));
  const planText=`${contract.payment||''} ${pm?.description||''}`.toLowerCase();
  const eventDue=ev.date||new Date().toISOString().slice(0,10);
  const creationDue=contract.createdAt||new Date().toISOString().slice(0,10);

  const parcels=[];
  if(/50\s*%/.test(planText)&&/sinal|entrada/.test(planText)){
    const first=Math.round(totalValue*0.5*100)/100;
    const second=Math.round((totalValue-first)*100)/100;
    parcels.push({label:'Sinal 50%',value:first,due:creationDue});
    parcels.push({label:'Saldo 50%',value:second,due:eventDue});
  }else if(/integral/.test(planText)&&(/24h|24\s*horas/.test(planText))){
    parcels.push({label:'Integral (24h antes)',value:Math.round(totalValue*100)/100,due:shiftISODate(eventDue,-1)});
  }else if(/integral/.test(planText)){
    parcels.push({label:'Integral',value:Math.round(totalValue*100)/100,due:eventDue});
  }else if(/pix/.test(planText)){
    parcels.push({label:'Pagamento via Pix',value:Math.round(totalValue*100)/100,due:creationDue});
  }else{
    parcels.push({label:'Recebimento do contrato',value:Math.round(totalValue*100)/100,due:eventDue});
  }

  parcels.forEach((p,idx)=>{
    DB.finance.rec.push({
      id:nextId(DB.finance.rec),
      desc:`${ev.name} — ${p.label}`,
      eid:ev.id,
      val:p.value,
      due:p.due,
      data_vencimento:p.due,
      status:'a_receber',
      type:'contract-revenue',
      contractId:contract.id,
      paymentMethodId:contract.paymentId||null,
      installment:idx+1,
      installments:parcels.length,
    });
  });

  return{created:parcels.length,total:parcels.length};
}

  if(!requireRole(['admin','manager'],'Apenas admin/manager podem alterar recebimentos.'))return;
  const rec=DB.finance.rec.find(r=>r.id===recId);
  if(!rec)return;
  const next=status==='recebido'?'recebido':'a_receber';
  rec.status=next;

  }

  render();
}

function normalizeRecurringFrequency(freq){
  const v=String(freq||'mensal').toLowerCase();
  if(['semanal','quinzenal','mensal','bimestral','trimestral','semestral','anual'].includes(v))return v;
  return 'mensal';
}

function addMonthsISO(isoDate,months){
  const [y,m,d]=String(isoDate||'').split('-').map(Number);
  if(!y||!m||!d)return isoToday();
  const totalMonths=(m-1)+Number(months||0);
  const nextY=y+Math.floor(totalMonths/12);
  const nextM=(totalMonths%12+12)%12+1;
  const maxDay=new Date(nextY,nextM,0).getDate();
  const nextD=Math.min(d,maxDay);
  return `${nextY}-${String(nextM).padStart(2,'0')}-${String(nextD).padStart(2,'0')}`;
}

function getNextRecurringDueDate(due,freq){
  const frequency=normalizeRecurringFrequency(freq);
  if(frequency==='semanal')return shiftISODate(due,7);
  if(frequency==='quinzenal')return shiftISODate(due,14);
  if(frequency==='bimestral')return addMonthsISO(due,2);
  if(frequency==='trimestral')return addMonthsISO(due,3);
  if(frequency==='semestral')return addMonthsISO(due,6);
  if(frequency==='anual')return addMonthsISO(due,12);
  return addMonthsISO(due,1);
}

  });
}

function ensureRecurringPayables(untilDate){
  const recurring=(DB.recurringExpenses||[])
    .filter(item=>(item.status||'ativo')==='ativo')
    .map(item=>({
      ...item,
      frequency:normalizeRecurringFrequency(item.frequency),
      due:String(item.due||'').slice(0,10),
      val:Number(item.val||0),
    }))
    .filter(item=>item.name&&item.val>0&&/^\d{4}-\d{2}-\d{2}$/.test(item.due));

  if(!recurring.length)return 0;
  const endDate=String(untilDate||isoToday()).slice(0,10);
  let created=0;

  recurring.forEach(item=>{
    let cursor=item.due;
    let guard=0;
    while(cursor<=endDate&&guard<1000){
      const alreadyExists=(DB.finance.pay||[]).some(pay=>
        pay.type==='recurring-pay'&&
        Number(pay.recurringId)===Number(item.id)&&
        String(pay.recurrenceDue||pay.due||'').slice(0,10)===cursor
      );
      if(!alreadyExists){
        createRecurringPayableEntry(item,cursor);
        created+=1;
      }
      cursor=getNextRecurringDueDate(cursor,item.frequency);
      guard+=1;
    }
  });

  return created;
}

          :`Contrato aprovado! ${recRes.created} receita(s) lançada(s) no financeiro. ✅`);

          ?'Contrato aprovado! Checklist criado/atualizado com itens do orçamento. ✅'
          :'Contrato aprovado! Checklist já estava completo. ✅');

  saveDB();
  render();
}

const DEFAULT_EQUIPMENT_CATEGORIES=['Som','Iluminação','Estrutura','Painel de LED','Gerador','Vídeo'];

function categoryKey(v){
  return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toLowerCase();
}

function getEquipmentCategories(){
  const raw=Array.isArray(DB.company?.equipmentCategories)?DB.company.equipmentCategories:DEFAULT_EQUIPMENT_CATEGORIES;
  const seen=new Set();
  const categories=[];
  raw.forEach(item=>{
    const label=String(item||'').trim();
    const key=categoryKey(label);
    if(!label||seen.has(key))return;
    seen.add(key);
    categories.push(label);
  });
  DEFAULT_EQUIPMENT_CATEGORIES.forEach(item=>{
    const key=categoryKey(item);
    if(seen.has(key))return;
    seen.add(key);
    categories.push(item);
  });
  return categories;
}

}

function formatEquipmentIdentity(eq){

  const brand=String(eq?.brand||'-').trim()||'-';

}

function normalizeEquipmentCategory(rawCategory,name=''){
  const raw=String(rawCategory||'').trim().toLowerCase();
  const label=String(name||'').trim().toLowerCase();
  const customMatch=getEquipmentCategories().find(item=>categoryKey(item)===categoryKey(rawCategory));
  if(customMatch)return customMatch;
  if(raw==='som'||raw==='áudio'||raw==='audio'||raw==='dj')return 'Som';
  if(raw==='iluminação'||raw==='iluminacao'||raw==='luz')return 'Iluminação';
  if(raw==='estrutura'||raw==='rigging'||raw==='geral')return 'Estrutura';
  if(raw==='painel de led'||raw==='painel led'||raw==='led')return 'Painel de LED';
  if(raw==='gerador'||raw==='energia')return 'Gerador';
  if(raw==='vídeo'||raw==='video'||raw==='projeção'||raw==='projecao')return 'Vídeo';
  if(/som|subwoofer|caixa|line array|monitor|mixer|dj|cdj|microfone|mesa/.test(label))return 'Som';
  if(/luz|moving|beam|wash|par|spot|dmx|ilumina/.test(label))return 'Iluminação';
  if(/painel|led/.test(label))return 'Painel de LED';
  if(/gerador|energia/.test(label))return 'Gerador';
  if(/video|vídeo|projetor|projecao|projeção|tv|tel[aã]/.test(label))return 'Vídeo';
  return 'Estrutura';
}

function updateEquipAvailability(eq){
  const qty=Math.max(1,Number(eq.qty||1));
  const fallbackOccupied=Math.max(0,qty-Number(eq.avail||0));
  let occupied=Number.isFinite(Number(eq.occupied))?Number(eq.occupied):fallbackOccupied;
  occupied=Math.max(0,Math.min(qty,occupied));

  if(eq.status==='locado'||eq.status==='indisponível') occupied=qty;

  eq.qty=qty;
  eq.occupied=occupied;
  eq.avail=qty-occupied;
}

function recalcEquipmentMaintenanceState(equipId){
  const eq=DB.equipment.find(e=>Number(e.id)===Number(equipId));
  if(!eq)return;

  const qtyTotal=Math.max(1,Number(eq.qty||1));
  const maintenanceQty=DB.maintenance
    .filter(m=>Number(m.equipId)===Number(eq.id)&&(m.status||'pendente')!=='feito')
    .reduce((acc,m)=>acc+Math.max(1,Number(m.qty||1)),0);
  const clamped=Math.max(0,Math.min(qtyTotal,maintenanceQty));

  if(clamped>0){
    eq.status='manutenção';
    eq.occupied=clamped;
  }else if(eq.status==='manutenção'){
    eq.status='disponível';
    eq.occupied=0;
  }

  updateEquipAvailability(eq);
}

function getReservedQtyForDate(eqId,date){
  if(!date)return 0;
  return DB.proposals
    .filter(p=>p.date===date&&p.status==='aprovado')
    .reduce((acc,p)=>{
      if(Array.isArray(p.equipPlan)&&p.equipPlan.length){
        const found=p.equipPlan.find(i=>i.eqId===eqId);
        return acc+(found?Number(found.qty||0):0);
      }
      if(Array.isArray(p.equipIds)&&p.equipIds.includes(eqId))return acc+1;
      return acc;
    },0);
}

function getReservedQtyForDateRange(eqId,startDate,endDate){
  if(!startDate||!endDate)return 0;
  const s=new Date(startDate).getTime();
  const e=new Date(endDate).getTime();
  return DB.proposals
    .filter(p=>{
      const pStart=new Date(p.date).getTime();
      const pEnd=new Date(p.endDate||p.date).getTime();
      return (pStart<=e&&pEnd>=s)&&p.status==='aprovado';
    })
    .reduce((acc,p)=>{
      if(Array.isArray(p.equipPlan)&&p.equipPlan.length){
        const found=p.equipPlan.find(i=>i.eqId===eqId);
        return acc+(found?Number(found.qty||0):0);
      }
      if(Array.isArray(p.equipIds)&&p.equipIds.includes(eqId))return acc+1;
      return acc;
    },0);
}

function getAvailableQtyForDate(eq,date){
  const currentAvail=Math.max(0,Number(eq.avail||0));
  const reserved=getReservedQtyForDate(eq.id,date);
  return Math.max(0,currentAvail-reserved);
}

function getAvailableQtyForDateRange(eq,startDate,endDate){
  const currentAvail=Math.max(0,Number(eq.avail||0));
  const reserved=getReservedQtyForDateRange(eq.id,startDate,endDate);
  return Math.max(0,currentAvail-reserved);
}

function getProposalPlannedQty(proposal,eqId){
  if(!proposal)return 0;
  if(Array.isArray(proposal.equipPlan)&&proposal.equipPlan.length){
    const found=proposal.equipPlan.find(i=>Number(i.eqId)===Number(eqId));
    return found?Math.max(0,Number(found.qty||0)):0;
  }
  if(Array.isArray(proposal.equipIds)&&proposal.equipIds.length){
    return proposal.equipIds.filter(id=>Number(id)===Number(eqId)).length;
  }
  return 0;
}

function getAvailableQtyForEvent(eq,ev,proposal){
  if(!eq||!ev)return Math.max(0,Number(eq?.avail||0));
  const currentAvail=Math.max(0,Number(eq.avail||0));
  const start=ev.date;
  const end=ev.endDate||ev.date;
  if(!start||!end)return currentAvail;

  const s=new Date(start).getTime();
  const e=new Date(end).getTime();
  const reservedOther=DB.proposals
    .filter(p=>{
      if(p.status!=='aprovado')return false;
      if(proposal&&p.id===proposal.id)return false;
      const pStart=new Date(p.date).getTime();
      const pEnd=new Date(p.endDate||p.date).getTime();
      return pStart<=e&&pEnd>=s;
    })
    .reduce((acc,p)=>acc+getProposalPlannedQty(p,eq.id),0);

  return Math.max(0,currentAvail-reservedOther);
}

function updateProposalAvailabilityPreview(){
  const date=document.getElementById('proposalDate')?.value;
  const endDate=document.getElementById('proposalEndDate')?.value||date;
  const rows=DB.equipment.map(eq=>{

    const availAtual=Math.max(0,Number(eq.avail||0));
    const reservadoPeriodo=getReservedQtyForDateRange(eq.id,date,endDate);
    const disponivelProjetado=Math.max(0,availAtual-reservadoPeriodo);

    const requested=selected?Math.max(1,Number(document.getElementById(`proposalQty-${eq.id}`)?.value||1)):0;
    const shortage=selected&&disponivelProjetado<requested;
    const cls=shortage?'b-amber':'b-green';
    const reqTxt=selected?` · Solicitado: ${requested}`:'';
    const hint=shortage?' · Pode faltar após aprovação do contrato':'';
    return `<div class="li" style="padding:6px 0;"><div style="flex:1;min-width:0;"><div class="li-title">${eq.name}</div><div class="li-sub">${meta.label} · Atual: ${availAtual} · Reservado no período: ${reservadoPeriodo}${reqTxt}${hint}</div></div><span class="badge ${cls}">Proj.: ${disponivelProjetado}</span></div>`;
  }).join('');
  const target=document.getElementById('proposalAvailPreview');
  if(target)target.innerHTML=rows;
}

  const newEvent={

    name,

    date,

    endDate,

    equip:[],
    extraEquipPlan:[],

    empresa_id:Number(S.companyId||1),
  };

function editEventHandler(){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem editar eventos.'))return false;
  const ev=DB.events.find(e=>e.id===Number(S.selEv));
  if(!ev){toast('Evento não encontrado.','err');return false;}

  const name=document.getElementById('editEventName')?.value.trim();
  const date=document.getElementById('editEventDate')?.value;
  const time=document.getElementById('editEventTime')?.value||'19:00';
  const endDate=document.getElementById('editEventEndDate')?.value||date;
  const endTime=document.getElementById('editEventEndTime')?.value||'23:00';
  const client=document.getElementById('editEventClient')?.value;
  const venue=document.getElementById('editEventVenue')?.value.trim();
  const cat=document.getElementById('editEventCat')?.value;
  const status=document.getElementById('editEventStatus')?.value||'confirmado';
  const val=Number(document.getElementById('editEventVal')?.value||0);
  const notes=document.getElementById('editEventNotes')?.value.trim();
  const selectedConsumables=collectEventConsumableSelection('editEvent');
  const selectedExtraEquipment=collectEventEquipmentSelection('editEvent');

  if(!name||!date||!endDate||!client||!venue){toast('Preencha nome, datas, cliente e local.','err');return false;}
  if(val<0){toast('Valor não pode ser negativo.','err');return false;}

  const previousLoadPlan=getEventLoadPlan(ev.id);
  const previousExtraPlan=Array.isArray(ev.extraEquipPlan)?deepClone(ev.extraEquipPlan):[];
  const extraEquipBuild=buildEventExtraEquipmentPlan(ev,selectedExtraEquipment);
  if(extraEquipBuild.error){toast(extraEquipBuild.error,'err');return false;}

  const consumablesBuild=buildEventConsumablesPlan(selectedConsumables);
  if(consumablesBuild.error){toast(consumablesBuild.error,'err');return false;}
  const nextConsumablesPlan=consumablesBuild.plan;
  const previousConsumablesPlan=Array.isArray(ev.consumables)?deepClone(ev.consumables):[];
  const stockApply=applyEventConsumableStockDelta(previousConsumablesPlan,nextConsumablesPlan);
  if(!stockApply.ok){toast(stockApply.error,'err');return false;}

  ev.name=name;
  ev.date=date;
  ev.time=time;
  ev.endDate=endDate;
  ev.endTime=endTime;
  ev.client=client;
  ev.venue=venue;
  ev.cat=cat;
  ev.status=status;
  ev.value=val;
  ev.notes=notes;
  ev.extraEquipPlan=extraEquipBuild.plan;
  ev.consumables=nextConsumablesPlan;
  ev.consumablesTotalCost=nextConsumablesPlan.reduce((a,b)=>a+Number(b.totalCost||0),0);

  const nextLoadPlan=getEventLoadPlan(ev.id);
  const equipmentStockApply=applyEventEquipmentReservationDelta(ev.id,previousLoadPlan,nextLoadPlan);
  if(!equipmentStockApply.ok){
    ev.extraEquipPlan=previousExtraPlan;
    applyEventConsumableStockDelta(nextConsumablesPlan,previousConsumablesPlan);
    toast(equipmentStockApply.error,'err');
    return false;
  }

  removeChecklistTasks(ev.id,buildConsumableChecklistTasks(previousConsumablesPlan));
  ensureChecklistForEvent(ev,findProposalForEvent(ev)||{});
  syncEventFinalizationFromChecklist(ev.id);

  saveDB();
  toast('Evento atualizado com equipamentos extras, consumíveis e checklist revisados. ✏️');
  render();
  return true;
}

function deleteEvent(eventId){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem excluir eventos.'))return false;
  const eid=Number(eventId);
  const ev=DB.events.find(item=>Number(item.id)===eid);
  if(!ev){toast('Evento não encontrado.','err');return false;}

  const ok=window.confirm(`Excluir o evento "${ev.name}"? Esta ação também removerá receitas e despesas vinculadas.`);
  if(!ok)return false;

  // Devolve estoque reservado em saída já concluída.
  (clists[eid]||[])
    .filter(task=>task.type==='saida'&&task.done&&Array.isArray(task.reserveBatch)&&task.reserveBatch.length)
    .forEach(task=>{
      task.reserveBatch.forEach(row=>{
        const eq=DB.equipment.find(item=>Number(item.id)===Number(row.eqId));
        if(!eq)return;
        eq.occupied=Math.max(0,Number(eq.occupied||0)-Math.max(0,Number(row.qty||0)));
        updateEquipAvailability(eq);
      });
      task.reserveBatch=[];
    });

  // Devolve consumíveis baixados no evento.
  const eventConsumables=Array.isArray(ev.consumables)?ev.consumables:[];
  if(eventConsumables.length)applyEventConsumableStockDelta(eventConsumables,[]);

  const contractsToRemove=(DB.contracts||[])
    .filter(c=>Number(c.eventId)===eid)
    .map(c=>Number(c.id));

  const recBefore=(DB.finance?.rec||[]).length;
  const payBefore=(DB.finance?.pay||[]).length;

  DB.finance.rec=(DB.finance.rec||[]).filter(r=>
    Number(r.eid)!==eid&&
    !(r.type==='contract-revenue'&&contractsToRemove.includes(Number(r.contractId)))
  );
  DB.finance.pay=(DB.finance.pay||[]).filter(p=>Number(p.eid)!==eid);

  DB.contracts=(DB.contracts||[]).filter(c=>Number(c.eventId)!==eid);
  DB.events=(DB.events||[]).filter(item=>Number(item.id)!==eid);

  (DB.proposals||[]).forEach(p=>{
    if(Number(p.linkedEventId)===eid)delete p.linkedEventId;
  });

  delete clists[eid];

  if(Number(S.selEv)===eid)S.selEv=(DB.events[0]?.id||null);
  if(Number(S.agendaEventDetailId)===eid)S.agendaEventDetailId=null;

  const recRemoved=Math.max(0,recBefore-(DB.finance.rec||[]).length);
  const payRemoved=Math.max(0,payBefore-(DB.finance.pay||[]).length);

  saveDB();
  closeM();
  toast(`Evento excluído. Receitas removidas: ${recRemoved} | Despesas removidas: ${payRemoved}.`);
  render();
  return true;
}

function ensureEventForProposal(p){
  let ev=DB.events.find(e=>e.id===p.linkedEventId)||DB.events.find(e=>e.proposalId===p.id);
  if(ev){p.linkedEventId=ev.id;return ev;}

  const expanded=[];
  const plan=Array.isArray(p.equipPlan)&&p.equipPlan.length
    ?p.equipPlan
    :Array.isArray(p.equipIds)?p.equipIds.map(eqId=>({eqId,qty:1})):[];

  plan.forEach(i=>{
    const qty=Math.max(1,Number(i.qty||1));
    for(let n=0;n<qty;n++)expanded.push(Number(i.eqId));
  });

  ev={
    id:nextId(DB.events),
    name:p.event,
    client:p.client,
    date:p.date,
    time:p.time||'19:00',
    endDate:p.endDate||p.date,
    endTime:p.endTime||'23:00',
    venue:'A definir',
    status:'confirmado',
    value:Number(p.val||0),
    cat:'Corporativo',
    equip:expanded,
    extraEquipPlan:[],
    notes:'Gerado automaticamente via orçamento aprovado',
    proposalId:p.id,
  };
  DB.events.push(ev);
  p.linkedEventId=ev.id;
  return ev;
}

function ensureChecklistForEvent(ev,p){
  const proposal=p||{};
  const current=Array.isArray(clists[ev.id])?[...clists[ev.id]]:[];
  const plan=getEventLoadPlan(ev.id);

  const desired=[];
  plan.forEach(item=>{
    const eq=DB.equipment.find(e=>e.id===Number(item.eqId));
    const name=eq?eq.name:`Equipamento ${item.eqId}`;
    const qty=Math.max(1,Number(item.qty||1));
    desired.push({task:`Separar ${qty}x ${name} para carga`,type:'saida'});
    desired.push({task:`Montar ${qty}x ${name} no local`,type:'montagem'});
    desired.push({task:`Desmontar ${qty}x ${name} após evento`,type:'desmontagem'});
    desired.push({task:`Entregar/conferir ${qty}x ${name}`,type:'entrega'});
  });

  if(!desired.length&&Array.isArray(proposal.items)&&proposal.items.length){
    proposal.items
      .map(item=>typeof item==='string'?item:(item?.name||''))
      .map(v=>String(v||'').trim())
      .filter(Boolean)
      .forEach(name=>{
        desired.push({task:`Separar item do orçamento: ${name}`,type:'saida'});
        desired.push({task:`Montar item do orçamento: ${name}`,type:'montagem'});
        desired.push({task:`Desmontar item do orçamento: ${name}`,type:'desmontagem'});
        desired.push({task:`Entregar/conferir item do orçamento: ${name}`,type:'entrega'});
      });
  }

  if(!desired.length){
    desired.push({task:'Checklist automático do evento',type:'saida'});
    desired.push({task:'Montagem geral do evento',type:'montagem'});
    desired.push({task:'Desmontagem geral do evento',type:'desmontagem'});
    desired.push({task:'Entrega e conferência final',type:'entrega'});
  }

  desired.push(...buildConsumableChecklistTasks(ev.consumables));

  const existingKeys=new Set(current.map(t=>`${t.type}|${t.task}`));
  let id=current.length?Math.max(...current.map(t=>Number(t.id)||0))+1:1;
  desired.forEach(d=>{
    const key=`${d.type}|${d.task}`;
    if(existingKeys.has(key))return;
    current.push({id:id++,task:d.task,done:false,type:d.type,ts:null,empresa_id:Number(S.companyId||1)});
    existingKeys.add(key);
  });

  clists[ev.id]=current;
}

function findProposalForEvent(ev){
  if(!ev)return null;
  if(ev.proposalId){
    const linked=DB.proposals.find(p=>p.id===ev.proposalId&&!p.deletedAt);
    if(linked)return linked;
  }
  const related=DB.proposals
    .filter(p=>!p.deletedAt&&p.client===ev.client&&p.event===ev.name&&p.date===ev.date&&p.status!=='rejeitado')
    .sort((a,b)=>{
      const pri={aprovado:3,pendente:2,alterar:1,rejeitado:0};
      return (pri[b.status]||0)-(pri[a.status]||0)||b.id-a.id;
    });
  return related[0]||null;
}

function updateProposalStatus(pid,newStatus){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem alterar status do orçamento.'))return;
  const p=DB.proposals.find(x=>x.id===pid&&!x.deletedAt);
  if(!p)return;
  const prev=p.status;
  p.status=newStatus;

  if(newStatus==='aprovado'&&prev!=='aprovado'){
    const ev=ensureEventForProposal(p);
    ensureChecklistForEvent(ev,p);
    toast('Orçamento aprovado! Evento adicionado à agenda. ✅');
    saveDB();

    const goContract=window.confirm('Orçamento aprovado. Gerar contrato agora?');
    if(goContract){
      S.contractPrefillEventId=ev.id;
      nav('contratos');
      openM('newContract');
      return;
    }
    nav('agenda');
  }else{
    toast('Status do orçamento atualizado.');
  }
  saveDB();
  render();
}

function mergeEquipmentPlans(...plans){
  const qtyByEqId={};
  plans.forEach(plan=>{
    (Array.isArray(plan)?plan:[]).forEach(item=>{
      const eqId=Number(item.eqId);
      const qty=Math.max(0,Number(item.qty||0));
      if(!eqId||qty<=0)return;
      qtyByEqId[eqId]=(qtyByEqId[eqId]||0)+qty;
    });
  });
  return Object.keys(qtyByEqId).map(eqId=>({eqId:Number(eqId),qty:Math.max(1,Number(qtyByEqId[eqId]||0))}));
}

function getEventBaseLoadPlan(ev,proposal){
  if(!ev)return [];
  if(proposal&&Array.isArray(proposal.equipPlan)&&proposal.equipPlan.length){
    return proposal.equipPlan.map(i=>({eqId:Number(i.eqId),qty:Math.max(1,Number(i.qty||1))}));
  }

  if(proposal&&Array.isArray(proposal.equipIds)&&proposal.equipIds.length){
    return proposal.equipIds.map(eqId=>({eqId:Number(eqId),qty:1}));
  }

  const counts={};
  (ev.equip||[]).forEach(id=>{counts[id]=(counts[id]||0)+1;});
  return Object.keys(counts).map(id=>({eqId:Number(id),qty:counts[id]}));
}

function getEventLoadPlan(eid){
  const ev=DB.events.find(e=>e.id===eid);
  if(!ev)return[];

  const proposal=findProposalForEvent(ev);
  const basePlan=getEventBaseLoadPlan(ev,proposal);
  const extraPlan=Array.isArray(ev.extraEquipPlan)?ev.extraEquipPlan:[];
  return mergeEquipmentPlans(basePlan,extraPlan);
}

function applyEventEquipmentReservationDelta(eid,previousPlan,nextPlan){
  const doneOutTask=(clists[eid]||[]).find(task=>task.type==='saida'&&task.done&&Array.isArray(task.reserveBatch));
  if(!doneOutTask)return {ok:true};

  const prevByEq={};
  const nextByEq={};
  (Array.isArray(previousPlan)?previousPlan:[]).forEach(item=>{
    const eqId=Number(item.eqId);
    prevByEq[eqId]=(prevByEq[eqId]||0)+Math.max(0,Number(item.qty||0));
  });
  (Array.isArray(nextPlan)?nextPlan:[]).forEach(item=>{
    const eqId=Number(item.eqId);
    nextByEq[eqId]=(nextByEq[eqId]||0)+Math.max(0,Number(item.qty||0));
  });

  const eqIds=Array.from(new Set([...Object.keys(prevByEq),...Object.keys(nextByEq)])).map(Number);
  for(const eqId of eqIds){
    const prevQty=Math.max(0,Number(prevByEq[eqId]||0));
    const nextQty=Math.max(0,Number(nextByEq[eqId]||0));
    const delta=nextQty-prevQty;
    if(delta<=0)continue;
    const eq=DB.equipment.find(item=>item.id===eqId);
    if(!eq)return {ok:false,error:'Equipamento vinculado não encontrado.'};
    updateEquipAvailability(eq);
    if(Number(eq.avail||0)<delta){
      return {ok:false,error:`Sem disponibilidade para ajustar ${eq.name}. Faltam ${delta-Number(eq.avail||0)} unidade(s).`};
    }
  }

  eqIds.forEach(eqId=>{
    const prevQty=Math.max(0,Number(prevByEq[eqId]||0));
    const nextQty=Math.max(0,Number(nextByEq[eqId]||0));
    const delta=nextQty-prevQty;
    if(delta===0)return;
    const eq=DB.equipment.find(item=>item.id===eqId);
    if(!eq)return;
    eq.occupied=Math.max(0,Number(eq.occupied||0)+delta);
    updateEquipAvailability(eq);
  });

  doneOutTask.reserveBatch=(Array.isArray(nextPlan)?nextPlan:[])
    .filter(item=>Math.max(0,Number(item.qty||0))>0)
    .map(item=>({eqId:Number(item.eqId),qty:Math.max(1,Number(item.qty||1))}));

  return {ok:true};
}

    .toLowerCase()

function filterEventItemSelector(prefix,kind){
  const input=document.getElementById(`${prefix}${kind}Search`);
  const query=normalizeSelectorSearchText(input?.value||'');
  const rows=Array.from(document.querySelectorAll(`[data-event-item="${prefix}-${kind}"]`));
  let visible=0;

  rows.forEach(row=>{

    const show=!query||haystack.includes(query);
    row.style.display=show?'flex':'none';

  if(!c){toast('Consumível não encontrado.','err');return false;}

  const entryQty=Math.max(0,Number(document.getElementById('entryConsQty')?.value||0));
  const newCostRaw=document.getElementById('entryConsCost')?.value;
  const hasNewCost=String(newCostRaw||'').trim()!=='';
  const newCost=Number(newCostRaw||0);
  const useAvg=Boolean(document.getElementById('entryConsAvg')?.checked);

  if(entryQty<=0){toast('Informe uma quantidade de entrada válida.','err');return false;}
  if(hasNewCost&&newCost<0){toast('Novo custo não pode ser negativo.','err');return false;}

  const oldQty=Math.max(0,Number(c.qtyStock||0));
  const oldCost=Math.max(0,Number(c.unitCost||0));

  c.qtyStock=oldQty+entryQty;

  if(hasNewCost){
    if(useAvg&&c.qtyStock>0){
      c.unitCost=((oldQty*oldCost)+(entryQty*newCost))/c.qtyStock;
    }else{
      c.unitCost=newCost;
    }
  }

  saveDB();
  toast('Entrada de estoque registrada.');
  render();
  return true;
}

function parseISODateSafe(iso){
  if(!iso)return null;
  const d=new Date(`${iso}T12:00:00`);
  return Number.isNaN(d.getTime())?null:d;
}

function getConsumableChecklistProfile(item){
  const explicit=item?.checklistProfile;
  if(explicit==='reutilizavel'||explicit==='consumivel')return explicit;
  const name=String(item?.name||'').toLowerCase();
  if(/cabo|cabos|adaptador|extensao|extensão/.test(name))return 'reutilizavel';
  return 'consumivel';
}

const DEFAULT_CONSUMABLE_CATEGORIES=['Fitas','Fixação','Pilhas e Baterias','Cabos e Adaptadores','Limpeza','Outros'];

function getConsumableCategories(){
  const raw=Array.isArray(DB.company?.consumableCategories)?DB.company.consumableCategories:DEFAULT_CONSUMABLE_CATEGORIES;
  const seen=new Set();
  const categories=[];
  raw.forEach(item=>{
    const label=String(item||'').trim();
    const key=categoryKey(label);
    if(!label||seen.has(key))return;
    seen.add(key);
    categories.push(label);
  });
  DEFAULT_CONSUMABLE_CATEGORIES.forEach(item=>{
    const key=categoryKey(item);
    if(seen.has(key))return;
    seen.add(key);
    categories.push(item);
  });
  return categories;
}

function normalizeConsumableCategory(rawCategory,name=''){
  const customMatch=getConsumableCategories().find(item=>categoryKey(item)===categoryKey(rawCategory));
  if(customMatch)return customMatch;
  const raw=String(rawCategory||'').trim().toLowerCase();
  const label=String(name||'').trim().toLowerCase();
  if(raw==='fitas'||raw==='fita')return 'Fitas';
  if(raw==='fixacao'||raw==='fixação'||raw==='abracadeira'||raw==='abraçadeira')return 'Fixação';
  if(raw==='pilhas'||raw==='pilhas e baterias'||raw==='baterias')return 'Pilhas e Baterias';
  if(raw==='cabos'||raw==='cabos e adaptadores'||raw==='adaptadores')return 'Cabos e Adaptadores';
  if(raw==='limpeza')return 'Limpeza';
  if(/fita/.test(label))return 'Fitas';
  if(/abrac|abraç|fixa/.test(label))return 'Fixação';
  if(/pilha|bateria/.test(label))return 'Pilhas e Baterias';
  if(/cabo|adaptador|extensao|extensão/.test(label))return 'Cabos e Adaptadores';
  if(/limpeza|alcool|álcool|pano|detergente/.test(label))return 'Limpeza';
  return 'Outros';
}

function getConsumableProfileMeta(item){
  const profile=getConsumableChecklistProfile(item);
  if(profile==='reutilizavel'){
    return {

function buildConsumableChecklistTasks(consumables){
  const eventConsumables=Array.isArray(consumables)?consumables:[];
  const desired=[];
  eventConsumables.forEach(item=>{
    const qty=Math.max(1,Number(item.qty||0)||1);
    const unit=String(item.unit||'unidade').trim();
    const baseName=String(item.name||`Item ${item.consumableId||''}`).trim();
    const label=`${qty} ${unit}${qty>1&&unit!=='unidade'?'s':''} de ${baseName}`;

    desired.push({task:`Separar ${label} para carga`,type:'saida'});
    desired.push({task:`Usar/aplicar ${label} na montagem`,type:'montagem'});

    if(getConsumableChecklistProfile(item)==='reutilizavel'){
      desired.push({task:`Recolher ${label} na desmontagem`,type:'desmontagem'});
      desired.push({task:`Conferir retorno de ${label}`,type:'entrega'});
    }
  });
  return desired;
}

function removeChecklistTasks(eid,tasksToRemove){
  const current=Array.isArray(clists[eid])?clists[eid]:[];
  if(!current.length)return;
  const keys=new Set((tasksToRemove||[]).map(t=>`${t.type}|${t.task}`));
  if(!keys.size)return;
  clists[eid]=current.filter(item=>!keys.has(`${item.type}|${item.task}`));
}

function buildEventExtraEquipmentPlan(ev,selectedEquipment){
  const proposal=findProposalForEvent(ev);
  const basePlan=getEventBaseLoadPlan(ev,proposal);
  const nextExtras=mergeEquipmentPlans(selectedEquipment||[]);
  const previousFullPlan=getEventLoadPlan(ev.id);
  const fullPlan=mergeEquipmentPlans(basePlan,nextExtras);
  const previousByEq=previousFullPlan.reduce((acc,item)=>{
    const eqId=Number(item.eqId);
    acc[eqId]=(acc[eqId]||0)+Math.max(0,Number(item.qty||0));
    return acc;
  },{});

  for(const item of fullPlan){
    const eq=DB.equipment.find(row=>row.id===Number(item.eqId));
    if(!eq)return {error:'Equipamento selecionado não encontrado.'};
    const prevQty=Math.max(0,Number(previousByEq[Number(item.eqId)]||0));
    const nextQty=Math.max(1,Number(item.qty||1));
    if(nextQty<=prevQty)continue;
    const availForEvent=getAvailableQtyForEvent(eq,ev,proposal);
    if(nextQty>availForEvent){
      return {error:`Disponibilidade insuficiente para ${eq.name} no período do evento.`};
    }
  }

  return {plan:nextExtras,fullPlan};
}

function buildEventConsumablesPlan(selectedConsumables){
  const consumablesPlan=[];
  for(const row of selectedConsumables){
    const c=DB.consumables.find(i=>i.id===Number(row.consumableId));
    if(!c)return {error:'Consumível selecionado não encontrado.'};
    const qty=Math.max(1,Number(row.qty||1));
    const unitCost=Math.max(0,Number(c.unitCost||0));
    consumablesPlan.push({
      consumableId:c.id,
      name:c.name,
      unit:c.unit||'unidade',
      qty,
      unitCost,
      checklistProfile:getConsumableChecklistProfile(c),
      totalCost:qty*unitCost,
    });
  }
  return {plan:consumablesPlan};
}

function applyEventConsumableStockDelta(previousPlan,nextPlan){
  const deltaByConsumable=new Map();
  (Array.isArray(previousPlan)?previousPlan:[]).forEach(item=>{
    const id=Number(item.consumableId);
    deltaByConsumable.set(id,(deltaByConsumable.get(id)||0)+Math.max(0,Number(item.qty||0)));
  });
  (Array.isArray(nextPlan)?nextPlan:[]).forEach(item=>{
    const id=Number(item.consumableId);
    deltaByConsumable.set(id,(deltaByConsumable.get(id)||0)-Math.max(0,Number(item.qty||0)));
  });

  for(const [consumableId,deltaToStock] of deltaByConsumable.entries()){
    const c=DB.consumables.find(item=>item.id===Number(consumableId));
    if(!c)return {ok:false,error:'Consumível selecionado não encontrado.'};
    const stock=Math.max(0,Number(c.qtyStock||0));
    if(deltaToStock<0&&stock<Math.abs(deltaToStock)){
      return {ok:false,error:`Estoque insuficiente para ${c.name}. Disponível: ${stock}.`};
    }
  }

  for(const [consumableId,deltaToStock] of deltaByConsumable.entries()){
    const c=DB.consumables.find(item=>item.id===Number(consumableId));
    c.qtyStock=Math.max(0,Number(c.qtyStock||0)+deltaToStock);
  }

  return {ok:true};
}

function getNotifications(){
  const notifications=[];
  const tenantEvents=getTenantEvents().slice().sort((a,b)=>startTsOfEvent(a)-startTsOfEvent(b));

  tenantEvents.forEach(ev=>{

    const started=tasks.some(t=>t.done);
    if(pendingReturns.length&&started){
      notifications.push({

        t:`${pendingReturns.length} retorno${pendingReturns.length===1?'':'s'} pendente${pendingReturns.length===1?'':'s'}`,
        s:`${ev.name} · marcar devolução na etapa de entrega`,

        tm:fmtRelativeDayLabel(ev.endDate||ev.date),

      c:String(ev.date||'')===todayISO?'b-blue':'b-amber',

function syncEventFinalizationFromChecklist(eid){
  const eventId=Number(eid);
  if(!Number.isFinite(eventId))return false;

  const ev=(DB.events||[]).find(e=>Number(e.id)===eventId);
  if(!ev)return false;

  const tasks=(clists[eventId]||[]);
  const total=tasks.length;
  const done=tasks.filter(t=>Boolean(t.done)).length;
  const completed=total>0&&done===total;

  if(completed&&ev.status!=='finalizado'){
    ev.prevStatusBeforeFinalized=ev.status||'confirmado';
    ev.status='finalizado';
    S.tabs.agendaFilter='finalizados';
    toast('Checklist em 100%: evento movido para Finalizados. ✅');
    return true;
  }

  if(!completed&&ev.status==='finalizado'&&ev.prevStatusBeforeFinalized){
    ev.status=ev.prevStatusBeforeFinalized;
    delete ev.prevStatusBeforeFinalized;
    return true;
  }

  return false;
}

function getDashboardMetrics(){
  const today=new Date();
  const events=(DB.events||[]);
  const activeEvents=events.filter(e=>e.status!=='finalizado');
  const upcomingCandidates=activeEvents
    .map(e=>({event:e,date:parseISODateSafe(e.date)}))
    .filter(x=>x.date)
    .sort((a,b)=>a.date-b.date);

  let upcoming=upcomingCandidates.filter(x=>x.date>=new Date(today.getFullYear(),today.getMonth(),today.getDate())).map(x=>x.event);
  if(!upcoming.length)upcoming=upcomingCandidates.map(x=>x.event);
  upcoming=upcoming.slice(0,3);

  const rec=(DB.finance?.rec||[]).map(r=>normalizeFinanceEntry(r,'rec'));
  const pay=(DB.finance?.pay||[]).map(p=>normalizeFinanceEntry(p,'pay'));
  const tRec=rec.filter(f=>f.status==='a_receber').reduce((a,b)=>a+Number(b.val||0),0);
  const tPay=pay.filter(f=>f.status==='a_pagar').reduce((a,b)=>a+Number(b.val||0),0);

  const paidReceivables=rec.filter(f=>f.status==='recebido');
  const anchorDate=paidReceivables
    .map(f=>parseISODateSafe(f.received_at||f.data_vencimento||f.due))
    .filter(Boolean)
    .sort((a,b)=>b-a)[0]||today;

  const monthKeys=[];
  for(let i=5;i>=0;i--){
    const d=new Date(anchorDate.getFullYear(),anchorDate.getMonth()-i,1);
    monthKeys.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }

  const revenueByMonth={};
  monthKeys.forEach(k=>{revenueByMonth[k]=0;});
  paidReceivables.forEach(f=>{
    const d=parseISODateSafe(f.received_at||f.data_vencimento||f.due);
    if(!d)return;
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(revenueByMonth[k]===undefined)return;
    revenueByMonth[k]+=Number(f.val||0);
  });

  const revs=monthKeys.map(k=>revenueByMonth[k]||0);
  const ms=monthKeys.map(k=>{
    const [y,m]=k.split('-').map(Number);
    const lbl=new Date(y,m-1,1).toLocaleDateString('pt-BR',{month:'short'}).replace('.','');
    return lbl.charAt(0).toUpperCase()+lbl.slice(1,3);
  });

  const pendingTasks=Object.entries(clists||{}).flatMap(([eid,list])=>
    (list||[])
      .filter(t=>!t.done)
      .map(t=>({eid:Number(eid),id:t.id,task:t.task,type:t.type,ts:t.ts}))
  );

  const maintenanceEquipments=(DB.equipment||[]).filter(eq=>eq.status==='manutenção').length;

  const npsVals=(DB.nps||[]).map(n=>Number(n.score)).filter(n=>Number.isFinite(n));
  const npsAvg=npsVals.length?(npsVals.reduce((a,b)=>a+b,0)/npsVals.length):null;

  const tRecReal=rec.filter(f=>f.status==='recebido').reduce((a,b)=>a+Number(b.val||0),0);
  const tPayReal=pay.filter(f=>f.status==='pago').reduce((a,b)=>a+Number(b.val||0),0);

  return{
    activeEventsCount:activeEvents.length,
    upcoming,
    tRec,
    tPay,
    revs,
    months:ms,
    pendingTasks,
    maintenanceEquipments,
    npsAvg,
    tRecReal,
    tPayReal,
  };
}

  S.tabs.checklistType='operacional';

  });

    <div class="card-body" style="padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);">
      <div class="tab${checklistType==='operacional'?' active':''}" onclick="S.tabs.checklistType='operacional';render()" style="cursor:pointer;padding:6px 12px;border-radius:var(--r);background:${checklistType==='operacional'?'var(--glow)':'var(--bg3)'};font-size:11.5px;transition:.2s;">🛠 Operacional</div>

    </div>

  <div class="card" style="margin-bottom:14px;"><div class="card-body" style="padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <span style="font-size:11.5px;color:var(--text2);">Filtro:</span>
    <select class="fc" style="width:220px;padding:7px 10px;font-size:12px;" onchange="S.tabs.checklistEventFilter=this.value;render()">${eventFilterOptions.map(opt=>`<option value="${opt.id}" ${activeEventFilter===opt.id?'selected':''}>${opt.label} (${eventFilterCounts[opt.id]||0})</option>`).join('')}</select>
    <span style="font-size:11.5px;color:var(--text2);">Evento:</span>
    ${filteredEventStats.length?filteredEventStats.map(({event:e,total,done:doneTasks})=>`<div onclick="S.selEv=${e.id};render()" style="padding:5px 10px;border-radius:var(--r);font-size:11.5px;cursor:pointer;background:${S.selEv===e.id?'var(--glow)':'var(--bg3)'};color:${S.selEv===e.id?'var(--accent2)':'var(--text2)'};border:1px solid ${S.selEv===e.id?'var(--accent)':'var(--border)'};">${e.name} <span style="opacity:.75;">(${total?`${doneTasks}/${total}`:'0/0'})</span></div>`).join(''):'<span style="font-size:11.5px;color:var(--text3);">Nenhum evento neste filtro.</span>'}
  </div></div>

    <div class="card"><div class="card-header"><span style="font-size:15px">✅</span><div style="flex:1;"><div class="card-title">${ev?.name||'Sem evento selecionado'}</div><div style="font-size:10.5px;color:var(--text2)">${done}/${filtered.length} tarefas · ${pct}%</div></div><button class="btn btn-primary btn-sm" onclick="openM('addTask')">+ Tarefa</button></div>
    <div class="card-body" style="padding-top:6px;">
      <div class="tabs" style="margin-bottom:14px;">${types.map(t=>`<div class="tab${at===t?' active':''}" onclick="S.tabs.clType='${t}';render()">${tl[t]}</div>`).join('')}</div>

      }).join('')}
      <div style="margin-top:16px;padding:13px;background:var(--glow);border-radius:var(--r);text-align:center;">
        <div style="font-size:10.5px;color:var(--text2);margin-bottom:3px;">Progresso Total</div>
        <div style="font-family:var(--fh);font-size:30px;font-weight:700;color:var(--accent2);">${items.length?Math.round((items.filter(i=>i.done).length/items.length)*100):0}%</div>
      </div>
    </div></div>
  </div>`;
}
function toggleTask(eid,iid){
  if(!clists[eid])return;
  const item=clists[eid].find(c=>c.id===iid);
  if(!item)return;

  if(!item.done&&item.type==='saida'){
    const existingBatch=(clists[eid]||[]).find(t=>t.type==='saida'&&t.done&&Array.isArray(t.reserveBatch)&&t.reserveBatch.length);
    if(!existingBatch){
      const plan=getEventLoadPlan(eid);
      if(plan.length===0){toast('Sem planejamento de equipamentos no orçamento/contrato para esse evento.','err');return;}

      const approvedContract=DB.contracts.find(c=>c.eventId===eid&&c.status==='aprovado');
      if(!approvedContract){
        item.done=!item.done;
        item.ts=item.done?new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):null;
        toast('Contrato ainda não aprovado: tarefa marcada sem reservar estoque.');
        saveDB();
        render();
        return;
      }

      const insufficient=plan.find(p=>{
        const eq=DB.equipment.find(e=>e.id===p.eqId);
        if(!eq)return true;
        updateEquipAvailability(eq);
        return Number(eq.avail||0)<Number(p.qty||1);
      });
      if(insufficient){toast('Quantidade indisponível no estoque atual para realizar a saída.','err');return;}

      item.reserveBatch=[];
      plan.forEach(p=>{
        const eq=DB.equipment.find(e=>e.id===p.eqId);
        const qty=Math.max(1,Number(p.qty||1));
        eq.occupied=Math.max(0,Number(eq.occupied||0))+qty;
        updateEquipAvailability(eq);
        item.reserveBatch.push({eqId:eq.id,qty});
      });
    }
  }

  if(item.done&&item.type==='saida'&&Array.isArray(item.reserveBatch)&&item.reserveBatch.length){
    item.reserveBatch.forEach(r=>{
      const eq=DB.equipment.find(e=>e.id===r.eqId);
      if(eq){
        eq.occupied=Math.max(0,Number(eq.occupied||0)-Number(r.qty||1));
        updateEquipAvailability(eq);
      }
    });
    item.reserveBatch=[];
  }

  item.done=!item.done;
  item.ts=item.done?new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):null;
  syncEventFinalizationFromChecklist(eid);
  toast(item.done?'Tarefa concluída! ✅':'Tarefa reaberta');
  saveDB();
  render();
}

      <option value="todos" ${activeCategory==='todos'?'selected':''}>Todas (${categoryCounts.todos})</option>

function addObjectivePurchase(){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem cadastrar objetivos de compra.'))return false;
  const name=document.getElementById('objItemName')?.value.trim();
  const priority=document.getElementById('objItemPriority')?.value||'media';
  const targetQty=Math.max(1,Number(document.getElementById('objItemQty')?.value||1));
  const notes=document.getElementById('objItemNotes')?.value.trim()||'';

  if(!name){toast('Informe o item desejado.','err');return false;}

  DB.objectivesPurchases.push({
    id:nextId(DB.objectivesPurchases),
    name,
    priority,
    targetQty,
    status:'planejado',
    notes,
    createdAt:new Date().toISOString().slice(0,10),
    boughtAt:'',
    empresa_id:Number(S.companyId||1),
  });

  S.tabs.objCompras='planejado';
  saveDB();
  toast('Objetivo de compra adicionado. 🎯');
  render();
  return true;
}

function updateObjectivePurchasePriority(itemId,newPriority){
  const allowed=['alta','media','baixa'];
  if(!allowed.includes(newPriority))return;
  const item=(DB.objectivesPurchases||[]).find(i=>i.id===Number(itemId));
  if(!item)return;
  item.priority=newPriority;
  saveDB();
  render();
}

function updateObjectivePurchaseStatus(itemId,newStatus){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem atualizar status de compras.'))return;
  const allowed=['planejado','comprado'];
  if(!allowed.includes(newStatus)){toast('Status inválido.','err');return;}
  const item=(DB.objectivesPurchases||[]).find(i=>i.id===Number(itemId));
  if(!item)return;

  item.status=newStatus;
  if(newStatus==='comprado'){
    item.boughtAt=new Date().toISOString().slice(0,10);
    S.tabs.objCompras='historico';
    toast('Item marcado como comprado e enviado para o histórico. ✅');
  }else{
    item.boughtAt='';
    S.tabs.objCompras='planejado';
    toast('Item retornou para planejamento.');
  }

  saveDB();
  render();
}
