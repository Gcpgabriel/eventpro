function pgFinanceiro(){
  const generated=ensureRecurringPayables(isoToday());
  if(generated>0)saveDB();

  const rec=(DB.finance.rec||[]).map(r=>normalizeFinanceEntry(r,'rec'));
  const pay=(DB.finance.pay||[]).map(p=>normalizeFinanceEntry(p,'pay'));
  const recurring=(DB.recurringExpenses||[]).map(item=>({
    ...item,
    frequency:normalizeRecurringFrequency(item.frequency),
    status:(item.status||'ativo')==='pausado'?'pausado':'ativo',
  }));
  const recTab=S.tabs.finRec==='recebido'?'recebido':'a_receber';
  const payTab=S.tabs.finPay==='pago'?'pago':'a_pagar';

  const tRecPaid=rec.filter(f=>f.status==='recebido').reduce((a,b)=>a+b.val,0);
  const tRecPend=rec.filter(f=>f.status==='a_receber').reduce((a,b)=>a+b.val,0);
  const tPayPend=pay.filter(f=>f.status==='a_pagar').reduce((a,b)=>a+b.val,0);
  const tPayPaid=pay.filter(f=>f.status==='pago').reduce((a,b)=>a+b.val,0);

  const recRows=rec.filter(f=>f.status===recTab);
  const payRows=pay.filter(f=>f.status===payTab);

  const recurringRows=recurring.map(item=>{
    let nextDue=String(item.due||'').slice(0,10);
    let guard=0;
    const today=isoToday();
    while(nextDue&&nextDue<today&&guard<1000){
      nextDue=getNextRecurringDueDate(nextDue,item.frequency);
      guard+=1;
    }
    const pendingCount=(DB.finance.pay||[]).filter(pay=>
      pay.type==='recurring-pay'&&
      Number(pay.recurringId)===Number(item.id)&&
      pay.status==='a_pagar'
    ).length;
    return `<tr>
      <td style="font-weight:500">${esc(item.name)}</td>
      <td style="font-weight:600;color:var(--red)">${fmtVal(Number(item.val||0))}</td>
      <td>${esc(item.frequency)}</td>
      <td>${fmtDateBR(item.due)}</td>
      <td>${nextDue?fmtDateBR(nextDue):'-'}</td>
      <td><span class="badge ${item.status==='ativo'?'b-green':'b-gray'}">${item.status}</span> <span style="font-size:11px;color:var(--text2);margin-left:6px;">pendentes: ${pendingCount}</span></td>
      <td><div style="display:flex;gap:6px;"><button class="btn btn-ghost btn-sm" onclick="toggleRecurringExpenseStatus(${item.id})">${item.status==='ativo'?'⏸':'▶️'}</button><button class="btn btn-ghost btn-sm" onclick="deleteRecurringExpense(${item.id})">🗑</button></div></td>
    </tr>`;
  }).join('');

  return`
  <div class="grid g4" style="margin-bottom:14px;">
    <div class="stat"><div class="stat-top"><div class="stat-ico" style="background:var(--gbg)">💚</div></div><div class="stat-val" style="color:var(--green)">${fmtVal(tRecPaid)}</div><div class="stat-lbl">Recebido</div></div>
    <div class="stat"><div class="stat-top"><div class="stat-ico" style="background:var(--abg)">⏳</div></div><div class="stat-val" style="color:var(--amber)">${fmtVal(tRecPend)}</div><div class="stat-lbl">A Receber</div></div>
    <div class="stat"><div class="stat-top"><div class="stat-ico" style="background:var(--rbg)">📤</div></div><div class="stat-val" style="color:var(--red)">${fmtVal(tPayPend)}</div><div class="stat-lbl">A Pagar</div></div>
    <div class="stat"><div class="stat-top"><div class="stat-ico" style="background:var(--glow)">📊</div></div><div class="stat-val">${fmtVal(tRecPaid+tRecPend-(tPayPend+tPayPaid))}</div><div class="stat-lbl">Lucro Projetado</div></div>
  </div>
  <div class="grid g2">
    <div class="card"><div class="card-header"><span style="color:var(--green);font-size:16px;">↑</span><span class="card-title">Contas a Receber</span><button class="btn btn-primary btn-sm" onclick="openM('addRec')">+ Novo</button></div>
    <div style="display:flex;gap:8px;padding:12px 14px 0;">
      <button class="btn ${recTab==='a_receber'?'btn-primary':'btn-ghost'} btn-sm" onclick="S.tabs.finRec='a_receber';render()">A Receber</button>
      <button class="btn ${recTab==='recebido'?'btn-primary':'btn-ghost'} btn-sm" onclick="S.tabs.finRec='recebido';render()">Pagamentos Recebidos</button>
    </div>
    <div class="tw"><table><tr><th>Descrição</th><th>Valor</th><th>Vencimento</th><th>Status</th></tr>
    ${recRows.length?recRows.map(f=>{
      const due=f.data_vencimento||f.due||'';
      return`<tr><td>${f.desc}</td><td style="font-weight:600;color:var(--green)">${fmtVal(f.val)}</td><td><input type="date" class="fc" style="width:148px;padding:5px 7px;font-size:11.5px;" value="${due}" onchange="updateRecDue(${f.id},this.value)"></td><td><div style="display:flex;align-items:center;gap:6px;"><span class="badge ${f.status==='recebido'?'b-green':'b-amber'}">${f.status}</span><select class="fc" style="width:118px;padding:5px 7px;font-size:11.5px;" onchange="updateRecStatus(${f.id},this.value)"><option value="a_receber" ${f.status==='a_receber'?'selected':''}>a_receber</option><option value="recebido" ${f.status==='recebido'?'selected':''}>recebido</option></select></div></td></tr>`;
    }).join(''):`<tr><td colspan="4" style="color:var(--text2);text-align:center;padding:18px;">Sem registros nesta aba.</td></tr>`}
    </table></div></div>
    <div class="card"><div class="card-header"><span style="color:var(--red);font-size:16px;">↓</span><span class="card-title">Contas a Pagar</span><button class="btn btn-primary btn-sm" onclick="openM('addPay')">+ Novo</button></div>
    <div style="display:flex;gap:8px;padding:12px 14px 0;">
      <button class="btn ${payTab==='a_pagar'?'btn-primary':'btn-ghost'} btn-sm" onclick="S.tabs.finPay='a_pagar';render()">A Pagar</button>
      <button class="btn ${payTab==='pago'?'btn-primary':'btn-ghost'} btn-sm" onclick="S.tabs.finPay='pago';render()">Pagos</button>
    </div>
    <div class="tw"><table><tr><th>Descrição</th><th>Valor</th><th>Vencimento</th><th>Status</th></tr>
    ${payRows.length?payRows.map(f=>{
      const due=f.data_vencimento||f.due||'';
      return`<tr><td>${f.desc}</td><td style="font-weight:600;color:var(--red)">${fmtVal(f.val)}</td><td><input type="date" class="fc" style="width:148px;padding:5px 7px;font-size:11.5px;" value="${due}" onchange="updatePayDue(${f.id},this.value)"></td><td><div style="display:flex;align-items:center;gap:6px;"><span class="badge ${f.status==='pago'?'b-green':'b-red'}">${f.status}</span><select class="fc" style="width:110px;padding:5px 7px;font-size:11.5px;" onchange="updatePayStatus(${f.id},this.value)"><option value="a_pagar" ${f.status==='a_pagar'?'selected':''}>a_pagar</option><option value="pago" ${f.status==='pago'?'selected':''}>pago</option></select></div></td></tr>`;
    }).join(''):`<tr><td colspan="4" style="color:var(--text2);text-align:center;padding:18px;">Sem registros nesta aba.</td></tr>`}
    </table></div></div>
  </div>
  <div class="card" style="margin-top:14px;"><div class="card-header"><span style="font-size:15px;">💳</span><span class="card-title">Formas de Pagamento / Recebimento</span><button class="btn btn-primary btn-sm" onclick="openM('addPaymentMethod')">+ Nova Forma</button></div>
  <div class="tw"><table><tr><th>Nome</th><th>Descrição</th><th>Ações</th></tr>
  ${DB.paymentMethods.map(pm=>`<tr>
    <td style="font-weight:500">${esc(pm.name)}</td>
    <td style="color:var(--text2);font-size:12px;">${esc(pm.description)}</td>
    <td><button class="btn btn-ghost btn-sm" onclick="deletePaymentMethod(${pm.id})" title="Remover">🗑</button></td>
  </tr>`).join('')}
  </table></div></div>
  <div class="card" style="margin-top:14px;"><div class="card-header"><span style="font-size:15px;">🔁</span><span class="card-title">Despesas Recorrentes</span><button class="btn btn-primary btn-sm" onclick="openM('addRecurringExpense')">+ Nova Recorrente</button></div>
  <div class="tw"><table><tr><th>Nome</th><th>Valor</th><th>Frequência</th><th>Vencimento Base</th><th>Próx. Geração</th><th>Status</th><th>Ações</th></tr>
  ${recurringRows||'<tr><td colspan="7" style="color:var(--text2);text-align:center;padding:18px;">Nenhuma despesa recorrente cadastrada.</td></tr>'}
  </table></div></div>`;
}

async function addSystemUser(){
  if(!requireRole(['admin'],'Apenas administradores podem criar usuários.'))return;
  const compId=Number(S.companyId||1);
  const employees=(DB_ALL?.users||[]).filter(u=>Number(u.empresa_id)===compId&&roleNorm(u.role)!=='admin');
  if(employees.length>=3){toast('Limite de usuários atingido para o plano atual.','err');return;}

  const nome=(document.getElementById('suNome')?.value||'').trim();
  const email=(document.getElementById('suEmail')?.value||'').trim().toLowerCase();
  const senha=(document.getElementById('suSenha')?.value||'').trim();
  const role=(document.getElementById('suRole')?.value||'employee');

  if(!nome){toast('Informe o nome do usuário.','err');return;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('Informe um email válido.','err');return;}
  if(senha.length<6){toast('A senha deve ter pelo menos 6 caracteres.','err');return;}
  if((DB_ALL?.users||[]).some(u=>String(u.email).toLowerCase()===email)){
    toast('Este email já está em uso.','err');return;
  }

  const pwdHash=await hashPassword(senha);
  const newId=nextId(DB_ALL.users||[{id:0}]);
  const newUser={id:newId,name:nome,email,role:roleNorm(role),empresa_id:compId,initials:initialsFromName(nome),passwordHash:pwdHash};
  DB_ALL.users.push(newUser);
  localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
  document.getElementById('sysUserModal')?.remove();
  toast(`Usuário ${nome.split(' ')[0]} criado com sucesso! 👤`,'ok');
  render();
}

function removeSystemUser(userId){
  if(!requireRole(['admin'],'Apenas administradores podem remover usuários.'))return;
  if(Number(userId)===Number(S.currentUser?.id)){toast('Não é possível remover sua própria conta.','err');return;}
  const user=(DB_ALL?.users||[]).find(u=>Number(u.id)===Number(userId));
  if(!user){toast('Usuário não encontrado.','err');return;}
  if(roleNorm(user.role)==='admin'){toast('Não é possível remover um administrador.','err');return;}
  if(!confirm(`Remover usuário "${user.name}"? Esta ação não pode ser desfeita.`))return;
  DB_ALL.users=DB_ALL.users.filter(u=>Number(u.id)!==Number(userId));
  localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
  toast(`Usuário ${user.name.split(' ')[0]} removido.`,'ok');
  render();
}

  viewClient:{
    title:'Perfil do Cliente',
    body:()=>{
      const c=DB.clients.find(i=>i.id===Number(S.viewClientId));
      if(!c)return '<div class="empty"><div class="empty-ico">⚠️</div><div>Cliente não encontrado.</div></div>';
      const summary=getClientSummary(c);
      const history=summary.events;
      const statusClass={confirmado:'b-green',proposta:'b-amber',finalizado:'b-gray'};

      const historyHtml=history.length
        ?`<div class="tw"><table><tr><th>Evento</th><th>Data</th><th>Local</th><th>Status</th><th>Valor</th></tr>${history.map(ev=>`<tr><td style="font-weight:500">${ev.name}</td><td>${fmtDateBR(ev.date)} ${ev.time||''}</td><td>${ev.venue||'-'}</td><td><span class="badge ${statusClass[ev.status]||'b-blue'}">${ev.status||'sem status'}</span></td><td style="font-weight:700;color:var(--green)">${fmtVal(Number(ev.value||0))}</td></tr>`).join('')}</table></div>`
        :'<div class="empty" style="padding:16px 8px;"><div class="empty-ico">📭</div><div>Nenhum evento encontrado para este cliente.</div></div>';

      return `<div style="display:grid;gap:10px;"><div class="grid g3"><div class="stat"><div class="stat-val">${summary.eventCount}</div><div class="stat-lbl">Eventos</div></div><div class="stat"><div class="stat-val" style="font-size:20px;color:var(--green)">${fmtVal(summary.totalValue)}</div><div class="stat-lbl">Faturamento</div></div><div class="stat"><div class="stat-val" style="font-size:16px;">${summary.lastEventDate==='-'?'-':fmtDateBR(summary.lastEventDate)}</div><div class="stat-lbl">Último Evento</div></div></div><div class="card"><div class="card-body" style="padding:12px;display:grid;gap:6px;"><div><strong>Nome:</strong> ${c.name}</div><div><strong>Tipo:</strong> ${c.type||'PF'}</div><div><strong>Documento:</strong> ${maskDocument(c.doc,c.type||'PF')}</div><div><strong>Email:</strong> ${c.email||'-'}</div><div><strong>Telefone:</strong> ${c.phone||'-'}</div><div><strong>Endereço:</strong> ${c.address||'-'}</div><div><strong>Nascimento:</strong> ${c.type==='PF'&&c.birth?fmtDateBR(c.birth):'-'}</div></div></div><div class="card"><div class="card-header"><span class="card-title">Histórico de Eventos</span></div><div class="card-body" style="padding-top:6px;">${historyHtml}</div></div></div>`;
    },
    ok:()=>true,
  },

  newContract:{title:'Gerar Contrato',body:()=>{
    const eid=S.contractPrefillEventId;
    const ev=eid?DB.events.find(e=>e.id===eid):null;
    const cl=ev?DB.clients.find(c=>c.name===ev.client):null;
    const linkedProposal=ev?findProposalForEvent(ev):null;
    const preSelectedServices=new Set(Array.isArray(linkedProposal?.serviceCategories)?linkedProposal.serviceCategories:[]);
    const eventOpts=DB.events.filter(e=>e.status==='confirmado').map(e=>`<option value="${e.id}" ${eid===e.id?'selected':''}>${e.name}</option>`).join('');
    const cats=['Som','Iluminação','Estrutura','Painel de LED','Gerador','Vídeo','DJ'];
    
    return`
    <div class="fg"><label class="fl">Evento</label><select id="newContractEvent" class="fc" onchange="S.contractEventTmp=Number(this.value);render()">${eventOpts}</select></div>
    ${ev?`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:10px;font-size:11.5px;">
      <div><strong>Cliente:</strong> ${ev.client}</div>
      <div><strong>Data:</strong> ${ev.date} ${ev.time}${ev.endDate&&ev.endDate!==ev.date?` a ${ev.endDate} ${ev.endTime}`:''}</div>
      <div><strong>Local:</strong> ${ev.venue}</div>
      <div><strong>Valor:</strong> ${fmtVal(ev.value)}</div>
    </div>`:''}
    ${cl?`<div class="fg"><label class="fl">Dados do Cliente</label><div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px;font-size:10.5px;"><strong>${cl.name}</strong> (${cl.type})<br>${cl.type==='PJ'?`CNPJ: ${cl.doc}`:`CPF: ${cl.doc}`}<br>Email: ${cl.email}<br>Endereço: ${cl.address||'—'}</div></div>`:`<div class="fg"><label class="fl">Cliente não encontrado - informe CNPJ/Razão Social</label><input id="contractClientDoc" class="fc" placeholder="CNPJ ou CPF"></div>`}
    <div class="fg"><label class="fl">Endereço do Contratante</label><input id="contractClientAddr" class="fc" placeholder="Endereço do cliente" value="${cl?.address||''}"></div>
    <div class="fg"><label class="fl">Categorias de Serviços Contratados</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;">
        ${cats.map(cat=>`<label style="display:flex;align-items:center;gap:5px;font-size:12.5px;cursor:pointer;"><input type="checkbox" name="contractService" value="${cat}" ${preSelectedServices.has(cat)?'checked':''}> ${cat}</label>`).join('')}

    <div class="fg"><label class="fl">Observações / Detalhes</label><textarea id="contractNotes" class="fc" placeholder="Informações adicionais..."></textarea></div>
    <p style="font-size:10.5px;color:var(--text3);margin-top:6px;">O contrato será gerado com base no modelo oficial da empresa.</p>`;
  },
    ok:createContract},

      if(!d)return '<div class="empty"><div class="empty-ico">⚠️</div><div>Nenhum custo pendente de consumíveis.</div></div>';
      return `
      <div class="fg"><label class="fl">Evento</label><input class="fc" value="${esc(d.eventName||'')}" disabled></div>
      <div class="fg"><label class="fl">Valor (R$)</label><input id="consVal" type="number" min="0" step="0.01" class="fc" value="${Number(d.amount||0)}"></div>
      <div class="fg"><label class="fl">Para quem pagar <span style="color:var(--red)">*</span></label><input id="consPayee" class="fc" placeholder="Ex: Fornecedor X, Mercado Y"></div>
      <div class="fg"><label class="fl">Quando pagar (vencimento) <span style="color:var(--red)">*</span></label><input id="consDue" type="date" class="fc" value="${esc(d.due||new Date().toISOString().slice(0,10))}"></div>
      <p style="font-size:11px;color:var(--text2);line-height:1.5;">Ao salvar, a despesa será lançada em <strong>Contas a Pagar</strong> no financeiro.</p>`;
    },
    ok:createConsumablePayable,
  },
};

function renderModal(){
  if(!S.modal)return'';
  const m=MODS[S.modal];
  if(!m)return'';
  const title=typeof m.title==='function'?m.title():m.title;
  const body=typeof m.body==='function'?m.body():m.body;
  if(S.modal==='newProposal')setTimeout(updateProposalAvailabilityPreview,0);
  if(S.modal==='addClient')setTimeout(onClientTypeChange,0);
  if(S.modal==='editClient')setTimeout(onEditClientTypeChange,0);
  return`<div class="modal-ov open" onclick="if(event.target===this)closeM()">
  <div class="modal">
    <div class="modal-hd"><span class="modal-title">${title}</span><button class="btn btn-ghost btn-icon" onclick="closeM()" style="font-size:19px;border:none;line-height:1;">×</button></div>
    <div class="modal-bd">${body}</div>
    <div class="modal-ft"><button class="btn btn-ghost" onclick="closeM()">Cancelar</button><button class="btn btn-primary" onclick="if(MODS['${S.modal}'].ok()!==false)closeM()">Salvar</button></div>
  </div></div>`;
}

async function doLogin(){
  const email=(document.getElementById('lemail')?.value||'').trim().toLowerCase();
  const pass=(document.getElementById('lpass')?.value||'').trim();
  if(!email||!pass){toast('Informe email e senha.','err');return;}

  if(!Array.isArray(DB_ALL?.users)||!DB_ALL.users.length){
    loadDB();
  }

  const candidate=(DB_ALL?.users||[]).find(u=>String(u.email).toLowerCase()===email);
  if(!candidate){toast('Usuário ou senha inválidos.','err');return;}

  try{
    const ok=await verifyPassword(pass,candidate.passwordHash||candidate.password||'');
    if(!ok){toast('Usuário ou senha inválidos.','err');return;}

    if(window.EventProSupabase){
      const remoteLogin = await window.EventProSupabase.signInWithPassword(email,pass);
      if(remoteLogin?.error)console.warn('Login Supabase ignorado para preservar o fluxo local:',remoteLogin.error);
    }

    applyTenantScope(candidate);
    S.in=true;
    S.page='dashboard';
    localStorage.setItem('eventpro_session_user',String(candidate.id));
    toast(`Bem-vindo ao EventPro, ${candidate.name.split(' ')[0]}! 👋`);
    render();
  }catch(err){
    console.error('Erro no login:',err);
    toast('Falha ao entrar. Os dados locais foram restaurados; tente novamente.','err');
    resetToDefaultStores();
    localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
    localStorage.setItem('eventpro_clists_all',JSON.stringify(CLISTS_ALL));
    localStorage.removeItem('eventpro_session_user');
    S.in=false;
    S.page='login';
    render();
  }
}

async function registerEmpresa(){
  const nomeEmpresa=(document.getElementById('rEmpresa')?.value||'').trim();
  const nomeAdmin=(document.getElementById('rNome')?.value||'').trim();
  const email=(document.getElementById('rEmail')?.value||'').trim().toLowerCase();
  const senha=(document.getElementById('rSenha')?.value||'').trim();
  const senha2=(document.getElementById('rSenha2')?.value||'').trim();
  const lgpd=document.getElementById('rLGPD')?.checked;

  if(!nomeEmpresa){toast('Informe o nome da empresa.','err');return;}
  if(!nomeAdmin){toast('Informe seu nome completo.','err');return;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('Informe um email válido.','err');return;}
  if(senha.length<6){toast('A senha deve ter pelo menos 6 caracteres.','err');return;}
  if(senha!==senha2){toast('As senhas não conferem.','err');return;}
  if(!lgpd){toast('Aceite os termos de uso de dados (LGPD) para continuar.','err');return;}

  if((DB_ALL?.users||[]).some(u=>String(u.email).toLowerCase()===email)){
    toast('Este email já está em uso.','err');return;
  }

  if(window.EventProSupabase){
    const remoteSignup = await window.EventProSupabase.signUp(email,senha,{ full_name:nomeAdmin, company_name:nomeEmpresa });
    if(remoteSignup?.error)console.warn('Cadastro Supabase ignorado para preservar o fluxo local:',remoteSignup.error);
  }

  const newEmpresaId=nextId(DB_ALL.companies||[{id:0}]);
  const newUserId=nextId(DB_ALL.users||[{id:0}]);
  const pwdHash=await hashPassword(senha);

  const newEmpresa={id:newEmpresaId,name:nomeEmpresa,owner:nomeAdmin,cnpj:'',address:'',phone:'',email,specialties:''};
  const newAdmin={id:newUserId,name:nomeAdmin,email,role:'admin',empresa_id:newEmpresaId,initials:initialsFromName(nomeAdmin),passwordHash:pwdHash};

  DB_ALL.companies=DB_ALL.companies||[];
  DB_ALL.companies.push(newEmpresa);
  DB_ALL.users=DB_ALL.users||[];
  DB_ALL.users.push(newAdmin);

  // init empty tenant tables
  MT_TABLES.forEach(t=>{DB_ALL[t]=DB_ALL[t]||[];});
  if(!DB_ALL.finance){DB_ALL.finance={rec:[],pay:[]};}

  CLISTS_ALL[String(newEmpresaId)]={};

  localStorage.setItem('eventpro_db_all',JSON.stringify(DB_ALL));
  localStorage.setItem('eventpro_clists_all',JSON.stringify(CLISTS_ALL));

  applyTenantScope(newAdmin);
  S.in=true;
  S.page='dashboard';
  S.loginView='login';
  localStorage.setItem('eventpro_session_user',String(newAdmin.id));
  toast(`Bem-vindo ao EventPro, ${nomeAdmin.split(' ')[0]}! Empresa criada com sucesso 🎉`);
  render();
}

// PWA Service Worker
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='eventpro-v1';
const ASSETS=['/'];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/')))));
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
