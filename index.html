}

function normalizeEquipmentCategory(rawCategory,name=''){
  const raw=String(rawCategory||'').trim().toLowerCase();
  const label=String(name||'').trim().toLowerCase();
  const customMatch=getEquipmentCategories().find(item=>categoryKey(item)===categoryKey(rawCategory));
  if(customMatch)return customMatch;
  if(raw==='som'||raw==='áudio'||raw==='audio'||raw==='dj')return 'Som';
  if(raw==='iluminação'||raw==='iluminacao'||raw==='luz')return 'Iluminação';
  if(raw==='estrutura'||raw==='rigging'||raw==='geral')return 'Estrutura';
  if(raw==='painel de led'||raw==='painel led'||raw==='led')return 'Painel de LED';
  if(raw==='gerador'||raw==='energia')return 'Gerador';
  if(raw==='vídeo'||raw==='video'||raw==='projeção'||raw==='projecao')return 'Vídeo';
  if(/som|subwoofer|caixa|line array|monitor|mixer|dj|cdj|microfone|mesa/.test(label))return 'Som';
  if(/luz|moving|beam|wash|par|spot|dmx|ilumina/.test(label))return 'Iluminação';
  if(/painel|led/.test(label))return 'Painel de LED';
  if(/gerador|energia/.test(label))return 'Gerador';
  if(/video|vídeo|projetor|projecao|projeção|tv|tel[aã]/.test(label))return 'Vídeo';
  return 'Estrutura';
}

function updateEquipAvailability(eq){
  const qty=Math.max(1,Number(eq.qty||1));
  const fallbackOccupied=Math.max(0,qty-Number(eq.avail||0));
  let occupied=Number.isFinite(Number(eq.occupied))?Number(eq.occupied):fallbackOccupied;
  occupied=Math.max(0,Math.min(qty,occupied));

  if(eq.status==='locado'||eq.status==='indisponível') occupied=qty;

  eq.qty=qty;
  eq.occupied=occupied;
  eq.avail=qty-occupied;
}

function recalcEquipmentMaintenanceState(equipId){
  const eq=DB.equipment.find(e=>Number(e.id)===Number(equipId));
  if(!eq)return;

  const qtyTotal=Math.max(1,Number(eq.qty||1));
  const maintenanceQty=DB.maintenance
    .filter(m=>Number(m.equipId)===Number(eq.id)&&(m.status||'pendente')!=='feito')
    .reduce((acc,m)=>acc+Math.max(1,Number(m.qty||1)),0);
  const clamped=Math.max(0,Math.min(qtyTotal,maintenanceQty));

  if(clamped>0){
    eq.status='manutenção';
    eq.occupied=clamped;
  }else if(eq.status==='manutenção'){
    eq.status='disponível';
    eq.occupied=0;
  }

  updateEquipAvailability(eq);
}

function getReservedQtyForDate(eqId,date){
  if(!date)return 0;
  const proposalReserved=DB.proposals
    .filter(p=>p.date===date&&p.status==='aprovado')
    .reduce((acc,p)=>{
      if(Array.isArray(p.equipPlan)&&p.equipPlan.length){
        const found=p.equipPlan.find(i=>i.eqId===eqId);
        return acc+(found?Number(found.qty||0):0);
      }
      if(Array.isArray(p.equipIds)&&p.equipIds.includes(eqId))return acc+1;
      return acc;
    },0);

  const eventReserved=(DB.events||[])
    .filter(ev=>String(ev.date)===String(date)&&ev.status!=='finalizado')
    .reduce((acc,ev)=>{
      const extraPlan=Array.isArray(ev.extraEquipPlan)?ev.extraEquipPlan:[];
      const found=extraPlan.find(i=>Number(i.eqId)===Number(eqId));
      return acc+(found?Number(found.qty||0):0);
    },0);

  return Math.max(0,proposalReserved+eventReserved);
}

function getReservedQtyForDateRange(eqId,startDate,endDate){
  if(!startDate||!endDate)return 0;
  const s=new Date(startDate).getTime();
  const e=new Date(endDate).getTime();
  const proposalReserved=DB.proposals
    .filter(p=>{
      const pStart=new Date(p.date).getTime();
      const pEnd=new Date(p.endDate||p.date).getTime();
      return (pStart<=e&&pEnd>=s)&&p.status==='aprovado';
    })
    .reduce((acc,p)=>{
      if(Array.isArray(p.equipPlan)&&p.equipPlan.length){
        const found=p.equipPlan.find(i=>i.eqId===eqId);
        return acc+(found?Number(found.qty||0):0);
      }
      if(Array.isArray(p.equipIds)&&p.equipIds.includes(eqId))return acc+1;
      return acc;
    },0);

  const eventReserved=(DB.events||[])
    .filter(ev=>{
      if(ev.status==='finalizado')return false;
      const evStart=new Date(ev.date).getTime();
      const evEnd=new Date(ev.endDate||ev.date).getTime();
      return evStart<=e&&evEnd>=s;
    })
    .reduce((acc,ev)=>{
      const extraPlan=Array.isArray(ev.extraEquipPlan)?ev.extraEquipPlan:[];
      const found=extraPlan.find(i=>Number(i.eqId)===Number(eqId));
      return acc+(found?Number(found.qty||0):0);
    },0);

  return Math.max(0,proposalReserved+eventReserved);
}

function getProposalPlannedQty(proposal,eqId){
  if(!proposal)return 0;
  if(Array.isArray(proposal.equipPlan)&&proposal.equipPlan.length){
    const found=proposal.equipPlan.find(i=>Number(i.eqId)===Number(eqId));
    return found?Math.max(0,Number(found.qty||0)):0;
  }
  if(Array.isArray(proposal.equipIds)&&proposal.equipIds.length){
    return proposal.equipIds.filter(id=>Number(id)===Number(eqId)).length;
  }
  return 0;
}

function getAvailableQtyForEvent(eq,ev,proposal){
  if(!eq||!ev)return Math.max(0,Number(eq?.avail||0));
  const currentAvail=Math.max(0,Number(eq.avail||0));
  const start=ev.date;
  const end=ev.endDate||ev.date;
  if(!start||!end)return currentAvail;

  const s=new Date(start).getTime();
  const e=new Date(end).getTime();
  const reservedOther=DB.proposals
    .filter(p=>{
      if(p.status!=='aprovado')return false;
      if(proposal&&p.id===proposal.id)return false;
      const pStart=new Date(p.date).getTime();
      const pEnd=new Date(p.endDate||p.date).getTime();
      return pStart<=e&&pEnd>=s;
    })
    .reduce((acc,p)=>acc+getProposalPlannedQty(p,eq.id),0);

  const reservedEventExtras=(DB.events||[])
    .filter(other=>{
      if(Number(other.id)===Number(ev.id))return false;
      if(other.status==='finalizado')return false;
      const otherStart=new Date(other.date).getTime();
      const otherEnd=new Date(other.endDate||other.date).getTime();
      return otherStart<=e&&otherEnd>=s;
    })
    .reduce((acc,other)=>{
      const extraPlan=Array.isArray(other.extraEquipPlan)?other.extraEquipPlan:[];
      const found=extraPlan.find(item=>Number(item.eqId)===Number(eq.id));
      return acc+(found?Number(found.qty||0):0);
    },0);

  return Math.max(0,currentAvail-reservedOther-reservedEventExtras);
}

function deleteEvent(eventId){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem excluir eventos.'))return false;
  const eid=Number(eventId);
  const ev=DB.events.find(item=>Number(item.id)===eid);
  if(!ev){toast('Evento não encontrado.','err');return false;}

  const ok=window.confirm(`Excluir o evento "${ev.name}"? Esta ação também removerá receitas e despesas vinculadas.`);
  if(!ok)return false;

  // Devolve estoque reservado em saída já concluída.
  (clists[eid]||[])
    .filter(task=>task.type==='saida'&&task.done&&Array.isArray(task.reserveBatch)&&task.reserveBatch.length)
    .forEach(task=>{
      task.reserveBatch.forEach(row=>{
        const eq=DB.equipment.find(item=>Number(item.id)===Number(row.eqId));
        if(!eq)return;
        eq.occupied=Math.max(0,Number(eq.occupied||0)-Math.max(0,Number(row.qty||0)));
        updateEquipAvailability(eq);
      });
      task.reserveBatch=[];
    });

  // Devolve consumíveis baixados no evento.
  const eventConsumables=Array.isArray(ev.consumables)?ev.consumables:[];
  if(eventConsumables.length)applyEventConsumableStockDelta(eventConsumables,[]);

  const contractsToRemove=(DB.contracts||[])
    .filter(c=>Number(c.eventId)===eid)
    .map(c=>Number(c.id));

  const recBefore=(DB.finance?.rec||[]).length;
  const payBefore=(DB.finance?.pay||[]).length;

  DB.finance.rec=(DB.finance.rec||[]).filter(r=>
    Number(r.eid)!==eid&&
    !(r.type==='contract-revenue'&&contractsToRemove.includes(Number(r.contractId)))
  );
  DB.finance.pay=(DB.finance.pay||[]).filter(p=>Number(p.eid)!==eid);

  DB.contracts=(DB.contracts||[]).filter(c=>Number(c.eventId)!==eid);
  DB.events=(DB.events||[]).filter(item=>Number(item.id)!==eid);

  (DB.proposals||[]).forEach(p=>{
    if(Number(p.linkedEventId)===eid)delete p.linkedEventId;
  });

  delete clists[eid];

  if(Number(S.selEv)===eid)S.selEv=(DB.events[0]?.id||null);
  if(Number(S.agendaEventDetailId)===eid)S.agendaEventDetailId=null;

  const recRemoved=Math.max(0,recBefore-(DB.finance.rec||[]).length);

function createProposal(){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem criar orçamentos.'))return false;
  const client=document.getElementById('proposalClient')?.value;
  const event=document.getElementById('proposalEvent')?.value.trim();
  const date=document.getElementById('proposalDate')?.value;
  const endDate=document.getElementById('proposalEndDate')?.value||date;
  const time=document.getElementById('proposalTime')?.value||'19:00';
  const validityDays=Number(document.getElementById('proposalValidityDays')?.value||7);
  const val=Number(document.getElementById('proposalValue')?.value||0);
  const checks=Array.from(document.querySelectorAll('#proposalEquipList input[data-eq-check="1"]:checked'));
  const consumableChecks=Array.from(document.querySelectorAll('#proposalEquipList input[data-cons-check="1"]:checked'));
  const equipIds=checks.map(c=>Number(c.value));
  const equipPlan=equipIds.map(eqId=>({
    eqId,
    qty:Math.max(1,Number(document.getElementById(`proposalQty-${eqId}`)?.value||1)),
  }));
  const consumablePlan=consumableChecks
    .map(c=>{
      const consumableId=Number(c.value);
      const meta=DB.consumables.find(item=>Number(item.id)===consumableId);
      if(!meta)return null;
      return {
        consumableId,
        name:meta.name,
        unit:meta.unit||'unidade',
        qty:Math.max(1,Number(document.getElementById(`proposalConsQty-${consumableId}`)?.value||1)),
      };
    })
    .filter(Boolean);
  const items=[
    ...equipIds.map(id=>DB.equipment.find(e=>e.id===id)?.name).filter(Boolean),
    ...consumablePlan.map(item=>`${item.qty}x ${item.name}`),
  ];
  const selectedCategories=Array.from(document.querySelectorAll('[name="proposalService"]:checked')).map(el=>el.value);
  const catMap={
    'audio':'Som',
    'áudio':'Som',
    'iluminacao':'Iluminação',
    'iluminação':'Iluminação',
    'estrutura':'Estrutura',
    'painel de led':'Painel de LED',
    'gerador':'Gerador',
    'energia':'Gerador',
    'video':'Vídeo',
    'vídeo':'Vídeo',
    'dj':'DJ',
  };
  const inferredCategories=equipIds
    .map(id=>DB.equipment.find(e=>e.id===id)?.cat||'')
    .map(v=>String(v).toLowerCase().trim())
    .map(v=>catMap[v])
    .filter(Boolean);
  const serviceCategories=[...new Set([...(selectedCategories||[]),...inferredCategories])];
  const allowedValidity=[3,7,15,30];
  const normalizedValidity=allowedValidity.includes(validityDays)?validityDays:7;

  if(!client||!event||!date||!endDate||val<=0){toast('Preencha cliente, evento, datas e valor.','err');return false;}
  if(equipIds.length===0&&consumablePlan.length===0){toast('Selecione ao menos um item (permanente ou consumível).','err');return false;}

  DB.proposals.push({
    id:nextId(DB.proposals),
    client,
    event,
    val,
    date,
    endDate,
    time,
    validityDays:normalizedValidity,
    status:'pendente',
    items,
    serviceCategories,
    equipIds,
    equipPlan,
    consumablePlan,
    empresa_id:Number(S.companyId||1),
  });

  toast('Proposta criada! A disponibilidade será validada na aprovação do contrato. 📄');
  saveDB();
  render();
  return true;
}

function ensureEventForProposal(p){
  let ev=DB.events.find(e=>e.id===p.linkedEventId)||DB.events.find(e=>e.proposalId===p.id);
  if(ev){p.linkedEventId=ev.id;return ev;}

  const expanded=[];
  const plan=Array.isArray(p.equipPlan)&&p.equipPlan.length
    ?p.equipPlan
    :Array.isArray(p.equipIds)?p.equipIds.map(eqId=>({eqId,qty:1})):[];

  plan.forEach(i=>{
    const qty=Math.max(1,Number(i.qty||1));
    for(let n=0;n<qty;n++)expanded.push(Number(i.eqId));
  });

  const proposalConsPlan=Array.isArray(p.consumablePlan)?p.consumablePlan:[];
  const eventConsumables=proposalConsPlan.map(item=>{
    const meta=DB.consumables.find(c=>Number(c.id)===Number(item.consumableId));
    const unitCost=Math.max(0,Number(meta?.unitCost||0));
    const qty=Math.max(1,Number(item.qty||1));
    return {consumableId:Number(item.consumableId),name:item.name||meta?.name||`Consumível #${item.consumableId}`,unit:item.unit||meta?.unit||'unidade',qty,unitCost,checklistProfile:meta?getConsumableChecklistProfile(meta):'consumivel',totalCost:qty*unitCost};
  }).filter(item=>item.consumableId);
  const consumablesTotalCost=eventConsumables.reduce((a,b)=>a+b.totalCost,0);
  if(eventConsumables.length)applyEventConsumableStockDelta([],eventConsumables);

  ev={
    id:nextId(DB.events),
    name:p.event,
    client:p.client,
    date:p.date,
    time:p.time||'19:00',
    endDate:p.endDate||p.date,
    endTime:p.endTime||'23:00',
    venue:'A definir',
    status:'confirmado',
    value:Number(p.val||0),
    cat:'Corporativo',
    equip:expanded,
    extraEquipPlan:[],
    consumables:eventConsumables,
    consumablesTotalCost,
    notes:'Gerado automaticamente via orçamento aprovado',
    proposalId:p.id,
  };
  DB.events.push(ev);
  p.linkedEventId=ev.id;
  return ev;
}

function ensureChecklistForEvent(ev,p){
  const proposal=p||{};
  const current=Array.isArray(clists[ev.id])?[...clists[ev.id]]:[];
  const plan=getEventLoadPlan(ev.id);

  const desired=[];
  plan.forEach(item=>{
    const eq=DB.equipment.find(e=>e.id===Number(item.eqId));
    const name=eq?eq.name:`Equipamento ${item.eqId}`;
    const qty=Math.max(1,Number(item.qty||1));
    const isTemp=eq&&eq.temporary;
    if(isTemp){
      desired.push({task:`Solicitar/confirmar aluguel de ${qty}x ${name} com fornecedor`,type:'saida'});
      desired.push({task:`Receber e montar ${qty}x ${name} no local`,type:'montagem'});
      desired.push({task:`Desmontar ${qty}x ${name} após evento`,type:'desmontagem'});
      desired.push({task:`Devolver ${qty}x ${name} ao fornecedor`,type:'entrega'});
    }else{
      desired.push({task:`Separar ${qty}x ${name} para carga`,type:'saida'});
      desired.push({task:`Montar ${qty}x ${name} no local`,type:'montagem'});
      desired.push({task:`Desmontar ${qty}x ${name} após evento`,type:'desmontagem'});
      desired.push({task:`Entregar/conferir ${qty}x ${name}`,type:'entrega'});
    }
  });

  if(!desired.length&&Array.isArray(proposal.items)&&proposal.items.length){
    proposal.items
      .map(item=>typeof item==='string'?item:(item?.name||''))
      .map(v=>String(v||'').trim())
      .filter(Boolean)
      .forEach(name=>{
        desired.push({task:`Separar item do orçamento: ${name}`,type:'saida'});
        desired.push({task:`Montar item do orçamento: ${name}`,type:'montagem'});
        desired.push({task:`Desmontar item do orçamento: ${name}`,type:'desmontagem'});
        desired.push({task:`Entregar/conferir item do orçamento: ${name}`,type:'entrega'});
      });
  }

  if(!desired.length){
    desired.push({task:'Checklist automático do evento',type:'saida'});
    desired.push({task:'Montagem geral do evento',type:'montagem'});
    desired.push({task:'Desmontagem geral do evento',type:'desmontagem'});
    desired.push({task:'Entrega e conferência final',type:'entrega'});
  }

  desired.push(...buildConsumableChecklistTasks(ev.consumables));

  const existingKeys=new Set(current.map(t=>`${t.type}|${t.task}`));
  let id=current.length?Math.max(...current.map(t=>Number(t.id)||0))+1:1;
  desired.forEach(d=>{
    const key=`${d.type}|${d.task}`;
    if(existingKeys.has(key))return;
    current.push({id:id++,task:d.task,done:false,type:d.type,ts:null,empresa_id:Number(S.companyId||1)});
    existingKeys.add(key);
  });

  clists[ev.id]=current;
}

function findProposalForEvent(ev){
  if(!ev)return null;
  if(ev.proposalId){
    const linked=DB.proposals.find(p=>p.id===ev.proposalId&&!p.deletedAt);
    if(linked)return linked;
  }
  const related=DB.proposals
    .filter(p=>!p.deletedAt&&p.client===ev.client&&p.event===ev.name&&p.date===ev.date&&p.status!=='rejeitado')
    .sort((a,b)=>{
      const pri={aprovado:3,pendente:2,alterar:1,rejeitado:0};
      return (pri[b.status]||0)-(pri[a.status]||0)||b.id-a.id;
    });
  return related[0]||null;
}

function updateProposalStatus(pid,newStatus){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem alterar status do orçamento.'))return;
  const p=DB.proposals.find(x=>x.id===pid&&!x.deletedAt);
  if(!p)return;
  const prev=p.status;
  p.status=newStatus;

  if(newStatus==='aprovado'&&prev!=='aprovado'){
    const ev=ensureEventForProposal(p);
    ensureChecklistForEvent(ev,p);
    const consPayCreated=generateConsumablePayable(ev);
    const tempPayCreated=generateTempRentalPayable(ev);
    const extras=[consPayCreated>0?'consumíveis':null,tempPayCreated>0?'terceiros':null].filter(Boolean);
    const consMsg=extras.length>0?` + despesa de ${extras.join(' e ')} lançada no financeiro`:'';
    toast(`Orçamento aprovado! Evento adicionado à agenda${consMsg}. ✅`);
    saveDB();

    const goContract=window.confirm('Orçamento aprovado. Gerar contrato agora?');
    if(goContract){
      S.contractPrefillEventId=ev.id;
      nav('contratos');
      openM('newContract');
      return;
    }
    nav('agenda');
  }else{
    toast('Status do orçamento atualizado.');
  }
  saveDB();
  render();
}

function mergeEquipmentPlans(...plans){
  const qtyByEqId={};
  plans.forEach(plan=>{
    (Array.isArray(plan)?plan:[]).forEach(item=>{
      const eqId=Number(item.eqId);
      const qty=Math.max(0,Number(item.qty||0));
      if(!eqId||qty<=0)return;
      qtyByEqId[eqId]=(qtyByEqId[eqId]||0)+qty;
    });
  });
  return Object.keys(qtyByEqId).map(eqId=>({eqId:Number(eqId),qty:Math.max(1,Number(qtyByEqId[eqId]||0))}));
}

function getEventBaseLoadPlan(ev,proposal){
  if(!ev)return [];
  if(proposal&&Array.isArray(proposal.equipPlan)&&proposal.equipPlan.length){
    return proposal.equipPlan.map(i=>({eqId:Number(i.eqId),qty:Math.max(1,Number(i.qty||1))}));
  }

  if(proposal&&Array.isArray(proposal.equipIds)&&proposal.equipIds.length){
    return proposal.equipIds.map(eqId=>({eqId:Number(eqId),qty:1}));
  }

  const counts={};
  (ev.equip||[]).forEach(id=>{counts[id]=(counts[id]||0)+1;});
  return Object.keys(counts).map(id=>({eqId:Number(id),qty:counts[id]}));
}

function getEventLoadPlan(eid){
  const ev=DB.events.find(e=>e.id===eid);
  if(!ev)return[];

  const proposal=findProposalForEvent(ev);
  const basePlan=getEventBaseLoadPlan(ev,proposal);
  const extraPlan=Array.isArray(ev.extraEquipPlan)?ev.extraEquipPlan:[];
  return mergeEquipmentPlans(basePlan,extraPlan);
}

function applyEventEquipmentReservationDelta(eid,previousPlan,nextPlan){
  const doneOutTask=(clists[eid]||[]).find(task=>task.type==='saida'&&task.done&&Array.isArray(task.reserveBatch));
  if(!doneOutTask)return {ok:true};

  const prevByEq={};
  const nextByEq={};
  (Array.isArray(previousPlan)?previousPlan:[]).forEach(item=>{
    const eqId=Number(item.eqId);
    prevByEq[eqId]=(prevByEq[eqId]||0)+Math.max(0,Number(item.qty||0));
  });
  (Array.isArray(nextPlan)?nextPlan:[]).forEach(item=>{
    const eqId=Number(item.eqId);
    nextByEq[eqId]=(nextByEq[eqId]||0)+Math.max(0,Number(item.qty||0));
  });

  const eqIds=Array.from(new Set([...Object.keys(prevByEq),...Object.keys(nextByEq)])).map(Number);
  for(const eqId of eqIds){
    const prevQty=Math.max(0,Number(prevByEq[eqId]||0));
    const nextQty=Math.max(0,Number(nextByEq[eqId]||0));
    const delta=nextQty-prevQty;
    if(delta<=0)continue;
    const eq=DB.equipment.find(item=>item.id===eqId);
    if(!eq)return {ok:false,error:'Equipamento vinculado não encontrado.'};
    updateEquipAvailability(eq);
    if(Number(eq.avail||0)<delta){
      return {ok:false,error:`Sem disponibilidade para ajustar ${eq.name}. Faltam ${delta-Number(eq.avail||0)} unidade(s).`};
    }
  }

  eqIds.forEach(eqId=>{
    const prevQty=Math.max(0,Number(prevByEq[eqId]||0));
    const nextQty=Math.max(0,Number(nextByEq[eqId]||0));
    const delta=nextQty-prevQty;
    if(delta===0)return;
    const eq=DB.equipment.find(item=>item.id===eqId);
    if(!eq)return;
    eq.occupied=Math.max(0,Number(eq.occupied||0)+delta);
    updateEquipAvailability(eq);
  });

  doneOutTask.reserveBatch=(Array.isArray(nextPlan)?nextPlan:[])
    .filter(item=>Math.max(0,Number(item.qty||0))>0)
    .map(item=>({eqId:Number(item.eqId),qty:Math.max(1,Number(item.qty||1))}));

  return {ok:true};
}

function normalizeSelectorSearchText(v){

    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .trim();
}

function filterEventItemSelector(prefix,kind){
  const input=document.getElementById(`${prefix}${kind}Search`);
  const query=normalizeSelectorSearchText(input?.value||'');
  const rows=Array.from(document.querySelectorAll(`[data-event-item="${prefix}-${kind}"]`));
  let visible=0;

  rows.forEach(row=>{
    const haystack=normalizeSelectorSearchText(row.getAttribute('data-filter')||'');
    const show=!query||haystack.includes(query);
    row.style.display=show?'flex':'none';
    if(show)visible+=1;
  });

  const empty=document.getElementById(`${prefix}${kind}Empty`);
  if(empty)empty.style.display=visible?'none':'block';
}

function addConsumableEntry(){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem dar entrada em consumíveis.'))return false;
  const c=DB.consumables.find(i=>i.id===Number(S.selCons));
  if(!c){toast('Consumível não encontrado.','err');return false;}

  const entryQty=Math.max(0,Number(document.getElementById('entryConsQty')?.value||0));
  const newCostRaw=document.getElementById('entryConsCost')?.value;
  const hasNewCost=String(newCostRaw||'').trim()!=='';
  const newCost=Number(newCostRaw||0);
  const useAvg=Boolean(document.getElementById('entryConsAvg')?.checked);

  if(entryQty<=0){toast('Informe uma quantidade de entrada válida.','err');return false;}
  if(hasNewCost&&newCost<0){toast('Novo custo não pode ser negativo.','err');return false;}

  const oldQty=Math.max(0,Number(c.qtyStock||0));
  const oldCost=Math.max(0,Number(c.unitCost||0));

  c.qtyStock=oldQty+entryQty;

  if(hasNewCost){
    if(useAvg&&c.qtyStock>0){
      c.unitCost=((oldQty*oldCost)+(entryQty*newCost))/c.qtyStock;
    }else{
      c.unitCost=newCost;
    }
  }

  saveDB();
  toast('Entrada de estoque registrada.');
  render();
  return true;
}

function getConsumableChecklistProfile(item){
  const explicit=item?.checklistProfile;
  if(explicit==='reutilizavel'||explicit==='consumivel')return explicit;
  const name=String(item?.name||'').toLowerCase();
  if(/cabo|cabos|adaptador|extensao|extensão/.test(name))return 'reutilizavel';
  return 'consumivel';
}

const DEFAULT_CONSUMABLE_CATEGORIES=['Fitas','Fixação','Pilhas e Baterias','Cabos e Adaptadores','Limpeza','Outros'];

function getConsumableCategories(){
  const raw=Array.isArray(DB.company?.consumableCategories)?DB.company.consumableCategories:DEFAULT_CONSUMABLE_CATEGORIES;
  const seen=new Set();
  const categories=[];
  raw.forEach(item=>{
    const label=String(item||'').trim();
    const key=categoryKey(label);
    if(!label||seen.has(key))return;
    seen.add(key);
    categories.push(label);
  });
  DEFAULT_CONSUMABLE_CATEGORIES.forEach(item=>{
    const key=categoryKey(item);
    if(seen.has(key))return;
    seen.add(key);
    categories.push(item);
  });
  return categories;
}

function normalizeConsumableCategory(rawCategory,name=''){
  const customMatch=getConsumableCategories().find(item=>categoryKey(item)===categoryKey(rawCategory));
  if(customMatch)return customMatch;
  const raw=String(rawCategory||'').trim().toLowerCase();
  const label=String(name||'').trim().toLowerCase();
  if(raw==='fitas'||raw==='fita')return 'Fitas';
  if(raw==='fixacao'||raw==='fixação'||raw==='abracadeira'||raw==='abraçadeira')return 'Fixação';
  if(raw==='pilhas'||raw==='pilhas e baterias'||raw==='baterias')return 'Pilhas e Baterias';
  if(raw==='cabos'||raw==='cabos e adaptadores'||raw==='adaptadores')return 'Cabos e Adaptadores';
  if(raw==='limpeza')return 'Limpeza';
  if(/fita/.test(label))return 'Fitas';
  if(/abrac|abraç|fixa/.test(label))return 'Fixação';
  if(/pilha|bateria/.test(label))return 'Pilhas e Baterias';
  if(/cabo|adaptador|extensao|extensão/.test(label))return 'Cabos e Adaptadores';
  if(/limpeza|alcool|álcool|pano|detergente/.test(label))return 'Limpeza';
  return 'Outros';
}

function buildConsumableChecklistTasks(consumables){
  const eventConsumables=Array.isArray(consumables)?consumables:[];
  const desired=[];
  eventConsumables.forEach(item=>{
    const qty=Math.max(1,Number(item.qty||0)||1);
    const unit=String(item.unit||'unidade').trim();
    const baseName=String(item.name||`Item ${item.consumableId||''}`).trim();
    const label=`${qty} ${unit}${qty>1&&unit!=='unidade'?'s':''} de ${baseName}`;

    desired.push({task:`Separar ${label} para carga`,type:'saida'});
    desired.push({task:`Usar/aplicar ${label} na montagem`,type:'montagem'});

    if(getConsumableChecklistProfile(item)==='reutilizavel'){
      desired.push({task:`Recolher ${label} na desmontagem`,type:'desmontagem'});
      desired.push({task:`Conferir retorno de ${label}`,type:'entrega'});
    }
  });
  return desired;
}

function removeChecklistTasks(eid,tasksToRemove){

  clists[eid]=current.filter(item=>!keys.has(`${item.type}|${item.task}`));

function buildEventExtraEquipmentPlan(ev,selectedEquipment){
  const proposal=findProposalForEvent(ev);
  const basePlan=getEventBaseLoadPlan(ev,proposal);
  const nextExtras=mergeEquipmentPlans(selectedEquipment||[]);
  const previousFullPlan=getEventLoadPlan(ev.id);
  const fullPlan=mergeEquipmentPlans(basePlan,nextExtras);
  const previousByEq=previousFullPlan.reduce((acc,item)=>{
    const eqId=Number(item.eqId);
    acc[eqId]=(acc[eqId]||0)+Math.max(0,Number(item.qty||0));
    return acc;
  },{});

  for(const item of fullPlan){
    const eq=DB.equipment.find(row=>row.id===Number(item.eqId));
    if(!eq)return {error:'Equipamento selecionado não encontrado.'};
    const prevQty=Math.max(0,Number(previousByEq[Number(item.eqId)]||0));
    const nextQty=Math.max(1,Number(item.qty||1));
    if(nextQty<=prevQty)continue;
    const availForEvent=getAvailableQtyForEvent(eq,ev,proposal);
    if(nextQty>availForEvent){
      return {error:`Disponibilidade insuficiente para ${eq.name} no período do evento.`};
    }
  }

  return {plan:nextExtras,fullPlan};
}

function buildEventConsumablesPlan(selectedConsumables){
  const consumablesPlan=[];
  for(const row of selectedConsumables){
    const c=DB.consumables.find(i=>i.id===Number(row.consumableId));
    if(!c)return {error:'Consumível selecionado não encontrado.'};
    const qty=Math.max(1,Number(row.qty||1));
    const unitCost=Math.max(0,Number(c.unitCost||0));
    consumablesPlan.push({
      consumableId:c.id,
      name:c.name,
      unit:c.unit||'unidade',
      qty,
      unitCost,
      checklistProfile:getConsumableChecklistProfile(c),
      totalCost:qty*unitCost,
    });
  }
  return {plan:consumablesPlan};
}

function applyEventConsumableStockDelta(previousPlan,nextPlan){
  const deltaByConsumable=new Map();
  (Array.isArray(previousPlan)?previousPlan:[]).forEach(item=>{
    const id=Number(item.consumableId);
    deltaByConsumable.set(id,(deltaByConsumable.get(id)||0)+Math.max(0,Number(item.qty||0)));
  });
  (Array.isArray(nextPlan)?nextPlan:[]).forEach(item=>{
    const id=Number(item.consumableId);
    deltaByConsumable.set(id,(deltaByConsumable.get(id)||0)-Math.max(0,Number(item.qty||0)));
  });

  for(const [consumableId,deltaToStock] of deltaByConsumable.entries()){
    const c=DB.consumables.find(item=>item.id===Number(consumableId));
    if(!c)return {ok:false,error:'Consumível selecionado não encontrado.'};
    const stock=Math.max(0,Number(c.qtyStock||0));
    if(deltaToStock<0&&stock<Math.abs(deltaToStock)){
      return {ok:false,error:`Estoque insuficiente para ${c.name}. Disponível: ${stock}.`};
    }
  }

  for(const [consumableId,deltaToStock] of deltaByConsumable.entries()){
    const c=DB.consumables.find(item=>item.id===Number(consumableId));
    c.qtyStock=Math.max(0,Number(c.qtyStock||0)+deltaToStock);
  }

  return {ok:true};
}

function getNotifications(){
  const notifications=[];
  const tenantEvents=getTenantEvents().slice().sort((a,b)=>startTsOfEvent(a)-startTsOfEvent(b));
  const todayISO=isoToday();
  const npsRows=Array.isArray(DB.nps)?DB.nps:[];
  const normalizeText=v=>String(v||'').trim().toLowerCase();

  tenantEvents.forEach(ev=>{
    const tasks=clists[ev.id]||[];
    const pendingReturns=tasks.filter(t=>t.type==='entrega'&&!t.done&&/^Conferir retorno de /i.test(String(t.task||'')));
    const started=tasks.some(t=>t.done);
    if(pendingReturns.length&&started){
      notifications.push({
        ic:'🔁',
        t:`${pendingReturns.length} retorno${pendingReturns.length===1?'':'s'} pendente${pendingReturns.length===1?'':'s'}`,
        s:`${ev.name} · marcar devolução na etapa de entrega`,
        c:'b-red',
        tm:fmtRelativeDayLabel(ev.endDate||ev.date),
      });
    }
  });

  tenantEvents.filter(ev=>String(ev.date||'')>=todayISO&&ev.status!=='finalizado').slice(0,3).forEach(ev=>{
    notifications.push({
      ic:'📅',
      t:`${ev.name} ${fmtRelativeDayLabel(ev.date)}`,
      s:`${fmtDateBR(ev.date)} às ${ev.time||'00:00'} · ${ev.venue||'-'}`,
      c:String(ev.date||'')===todayISO?'b-blue':'b-amber',
      tm:fmtRelativeDayLabel(ev.date),
    });
  });

  tenantEvents
    .filter(ev=>{
      const endDate=String(ev.endDate||ev.date||'');
      if(!endDate)return false;
      if(String(ev.status||'').toLowerCase()==='proposta')return false;
      const dueReminder=shiftISODate(endDate,2);
      if(String(dueReminder)>todayISO)return false;

      const hasEvaluation=npsRows.some(n=>
        Number(n?.eventId||0)===Number(ev.id)||
        normalizeText(n?.event)===normalizeText(ev.name)
      );
      return !hasEvaluation;
    })
    .slice(0,3)
    .forEach(ev=>{
      const dueReminder=shiftISODate(String(ev.endDate||ev.date),2);
      notifications.push({
        ic:'⭐',
        t:'Lembrete de colher avaliação',
        s:`${ev.name} · solicitar NPS do cliente`,
        c:'b-amber',
        tm:fmtRelativeDayLabel(dueReminder),
      });
    });

  (DB.finance?.pay||[])
    .filter(entry=>entry.status==='a_pagar'&&entry.due)
    .sort((a,b)=>String(a.due).localeCompare(String(b.due)))
    .slice(0,2)
    .forEach(entry=>{
      notifications.push({
        ic:'💰',
        t:`Pagamento ${fmtVal(Number(entry.val||0))} ${fmtRelativeDayLabel(entry.due)}`,
        s:entry.desc||'Conta a pagar',
        c:'b-red',
        tm:fmtRelativeDayLabel(entry.due),
      });
    });

  return notifications.slice(0,8);
}

function syncEventFinalizationFromChecklist(eid){
  const eventId=Number(eid);
  if(!Number.isFinite(eventId))return false;

  const ev=(DB.events||[]).find(e=>Number(e.id)===eventId);
  if(!ev)return false;

  const tasks=(clists[eventId]||[]);
  const total=tasks.length;
  const done=tasks.filter(t=>Boolean(t.done)).length;
  const completed=total>0&&done===total;

  if(completed&&ev.status!=='finalizado'){
    ev.prevStatusBeforeFinalized=ev.status||'confirmado';
    ev.status='finalizado';
    S.tabs.agendaFilter='finalizados';
    toast('Checklist em 100%: evento movido para Finalizados. ✅');
    return true;
  }

  if(!completed&&ev.status==='finalizado'&&ev.prevStatusBeforeFinalized){
    ev.status=ev.prevStatusBeforeFinalized;
    delete ev.prevStatusBeforeFinalized;
    return true;
  }

  return false;
}

function getDashboardMetrics(){
  const today=new Date();
  const events=(DB.events||[]);
  const totalEvents=events.length;
  const activeEvents=events.filter(e=>e.status!=='finalizado');
  const upcomingCandidates=activeEvents
    .map(e=>({event:e,date:parseISODateSafe(e.date)}))
    .filter(x=>x.date)
    .sort((a,b)=>a.date-b.date);

  let upcoming=upcomingCandidates.filter(x=>x.date>=new Date(today.getFullYear(),today.getMonth(),today.getDate())).map(x=>x.event);
  if(!upcoming.length)upcoming=upcomingCandidates.map(x=>x.event);
  upcoming=upcoming.slice(0,3);

  const rec=(DB.finance?.rec||[]).map(r=>normalizeFinanceEntry(r,'rec'));
  const pay=(DB.finance?.pay||[]).map(p=>normalizeFinanceEntry(p,'pay'));
  const tRec=rec.filter(f=>f.status==='a_receber').reduce((a,b)=>a+Number(b.val||0),0);
  const tPay=pay.filter(f=>f.status==='a_pagar').reduce((a,b)=>a+Number(b.val||0),0);
  const tRecTotal=rec.reduce((a,b)=>a+Number(b.val||0),0);

  const paidReceivables=rec.filter(f=>f.status==='recebido');
  const anchorDate=paidReceivables
    .map(f=>parseISODateSafe(f.received_at||f.data_vencimento||f.due))
    .filter(Boolean)
    .sort((a,b)=>b-a)[0]||today;

  const monthKeys=[];
  for(let i=5;i>=0;i--){
    const d=new Date(anchorDate.getFullYear(),anchorDate.getMonth()-i,1);
    monthKeys.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }

  const revenueByMonth={};
  monthKeys.forEach(k=>{revenueByMonth[k]=0;});
  paidReceivables.forEach(f=>{
    const d=parseISODateSafe(f.received_at||f.data_vencimento||f.due);
    if(!d)return;
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(revenueByMonth[k]===undefined)return;
    revenueByMonth[k]+=Number(f.val||0);
  });

  const revs=monthKeys.map(k=>revenueByMonth[k]||0);
  const ms=monthKeys.map(k=>{
    const [y,m]=k.split('-').map(Number);
    const lbl=new Date(y,m-1,1).toLocaleDateString('pt-BR',{month:'short'}).replace('.','');
    return lbl.charAt(0).toUpperCase()+lbl.slice(1,3);
  });

  const pendingTasks=Object.entries(clists||{}).flatMap(([eid,list])=>
    (list||[])
      .filter(t=>!t.done)
      .map(t=>({eid:Number(eid),id:t.id,task:t.task,type:t.type,ts:t.ts}))
  );

  const maintenanceEquipments=(DB.equipment||[]).filter(eq=>eq.status==='manutenção').length;
  const totalEquipments=(DB.equipment||[]).length;

  const npsVals=(DB.nps||[]).map(n=>Number(n.score)).filter(n=>Number.isFinite(n));
  const npsAvg=npsVals.length?(npsVals.reduce((a,b)=>a+b,0)/npsVals.length):null;
  const npsCount=npsVals.length;

  const activeEventsPct=totalEvents?Math.round((activeEvents.length/totalEvents)*100):0;
  const receivablesPct=tRecTotal?Math.round((tRec/tRecTotal)*100):0;
  const maintenancePct=totalEquipments?Math.round((maintenanceEquipments/totalEquipments)*100):0;

  const tRecReal=rec.filter(f=>f.status==='recebido').reduce((a,b)=>a+Number(b.val||0),0);
  const tPayReal=pay.filter(f=>f.status==='pago').reduce((a,b)=>a+Number(b.val||0),0);

  return{
    activeEventsCount:activeEvents.length,
    totalEvents,
    activeEventsPct,
    upcoming,
    tRec,
    tRecTotal,
    receivablesPct,
    tPay,
    revs,
    months:ms,
    pendingTasks,
    maintenanceEquipments,
    totalEquipments,
    maintenancePct,
    npsAvg,
    npsCount,
    tRecReal,
    tPayReal,
  };
}

function toggleTask(eid,iid){
  if(!clists[eid])return;
  const item=clists[eid].find(c=>c.id===iid);
  if(!item)return;

  if(!item.done&&item.type==='saida'){
    const existingBatch=(clists[eid]||[]).find(t=>t.type==='saida'&&t.done&&Array.isArray(t.reserveBatch)&&t.reserveBatch.length);
    if(!existingBatch){
      const plan=getEventLoadPlan(eid);
      if(plan.length===0){toast('Sem planejamento de equipamentos no orçamento/contrato para esse evento.','err');return;}

      const approvedContract=DB.contracts.find(c=>c.eventId===eid&&c.status==='aprovado');
      if(!approvedContract){
        item.done=!item.done;
        item.ts=item.done?new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):null;
        toast('Contrato ainda não aprovado: tarefa marcada sem reservar estoque.');
        saveDB();
        render();
        return;
      }

      const insufficient=plan.find(p=>{
        const eq=DB.equipment.find(e=>e.id===p.eqId);
        if(!eq)return true;
        updateEquipAvailability(eq);
        return Number(eq.avail||0)<Number(p.qty||1);
      });
      if(insufficient){toast('Quantidade indisponível no estoque atual para realizar a saída.','err');return;}

      item.reserveBatch=[];
      plan.forEach(p=>{
        const eq=DB.equipment.find(e=>e.id===p.eqId);
        const qty=Math.max(1,Number(p.qty||1));
        eq.occupied=Math.max(0,Number(eq.occupied||0))+qty;
        updateEquipAvailability(eq);
        item.reserveBatch.push({eqId:eq.id,qty});
      });
    }
  }

  if(item.done&&item.type==='saida'&&Array.isArray(item.reserveBatch)&&item.reserveBatch.length){
    item.reserveBatch.forEach(r=>{
      const eq=DB.equipment.find(e=>e.id===r.eqId);
      if(eq){
        eq.occupied=Math.max(0,Number(eq.occupied||0)-Number(r.qty||1));
        updateEquipAvailability(eq);
      }
    });
    item.reserveBatch=[];
  }

  item.done=!item.done;
  item.ts=item.done?new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):null;
  syncEventFinalizationFromChecklist(eid);
  toast(item.done?'Tarefa concluída! ✅':'Tarefa reaberta');
  saveDB();
  render();
}

function pgAgenda(){
  ensureAgendaDay();
  const sc={confirmado:'b-green',proposta:'b-amber',finalizado:'b-gray'};
  const cc={Casamento:'b-purple',Corporativo:'b-blue',Festival:'b-cyan',Formatura:'b-amber'};
  const tenantEvents=getTenantEvents().sort((a,b)=>startTsOfEvent(a)-startTsOfEvent(b));
  const todayISO=isoToday();
  const weekEndISO=shiftISODate(todayISO,6);
  const filterOptions=[
    {id:'agendados',label:'Agendados'},
    {id:'hoje',label:'Hoje'},
    {id:'semana',label:'Nessa semana'},
    {id:'finalizados',label:'Finalizados'},
  ];
  const agendaFilter=filterOptions.some(f=>f.id===S.tabs.agendaFilter)?S.tabs.agendaFilter:'agendados';
  S.tabs.agendaFilter=agendaFilter;
  const filteredTenantEvents=tenantEvents.filter(e=>{
    const d=String(e.date||'');
    if(agendaFilter==='finalizados')return e.status==='finalizado';
    if(agendaFilter==='hoje')return d===todayISO&&e.status!=='finalizado';
    if(agendaFilter==='semana')return d>=todayISO&&d<=weekEndISO&&e.status!=='finalizado';
    return e.status!=='finalizado';
  });
  const selectedDay=S.agendaDay||isoToday();
  const selectedDayEvents=filteredTenantEvents.filter(e=>String(e.date)===String(selectedDay)).sort((a,b)=>startTsOfEvent(a)-startTsOfEvent(b));

  const filterCounts={
    agendados:tenantEvents.filter(e=>e.status!=='finalizado').length,
    hoje:tenantEvents.filter(e=>String(e.date||'')===todayISO&&e.status!=='finalizado').length,
    semana:tenantEvents.filter(e=>{const d=String(e.date||'');return d>=todayISO&&d<=weekEndISO&&e.status!=='finalizado';}).length,
    finalizados:tenantEvents.filter(e=>e.status==='finalizado').length,
  };

  const filterControl=`<div class="card" style="margin-bottom:12px;"><div class="card-body" style="padding:10px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><span style="font-size:11.5px;color:var(--text2);">Filtro de eventos:</span><select class="fc" style="width:220px;padding:7px 10px;font-size:12px;" onchange="S.tabs.agendaFilter=this.value;render()">${filterOptions.map(opt=>`<option value="${opt.id}" ${agendaFilter===opt.id?'selected':''}>${opt.label} (${filterCounts[opt.id]||0})</option>`).join('')}</select></div></div>`;

  const dayStrip=Array.from({length:7},(_,idx)=>{
    const iso=shiftISODate(selectedDay,idx-3);
    const dt=new Date(`${iso}T12:00:00`);
    const dow=dt.toLocaleDateString('pt-BR',{weekday:'short'}).replace('.','');
    const dd=String(dt.getDate()).padStart(2,'0');
    const mm=String(dt.getMonth()+1).padStart(2,'0');

    return `<div class="day-pill${iso===selectedDay?' active':''}" onclick="agendaSetDay('${iso}')"><div class="day-pill-dow">${dow}</div><div class="day-pill-date">${dd}/${mm}</div><div style="font-size:10px;color:var(--text2);">${count} evento${count===1?'':'s'}</div></div>`;
  }).join('');

  const dayListHtml=selectedDayEvents.length
    ?selectedDayEvents.map(e=>`<div class="agenda-day-card" onclick="openEventDetail(${e.id})"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;"><div style="font-family:var(--fh);font-size:14px;font-weight:600;flex:1;min-width:0;">${e.name}</div><span class="badge ${sc[e.status]||'b-gray'}">${e.status||'sem status'}</span></div><div style="font-size:12px;color:var(--text2);margin-bottom:6px;">🕐 ${e.time||'00:00'} · 👤 ${e.client||'-'}</div><div style="font-size:12px;color:var(--text2);margin-bottom:10px;">📍 ${e.venue||'-'}</div>${renderEventNotesPreview(e)}<div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-family:var(--fh);font-weight:700;font-size:14px;color:var(--green);">${fmtVal(Number(e.value||0))}</span><div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">${isCompanyOwner()?`<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEventProfitability(${e.id})">📈</button>`:''}<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEditEvent(${e.id})">✏️</button><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteEvent(${e.id})">🗑</button><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEventDetail(${e.id})">Detalhes</button></div></div></div>`).join('')

// ESTOQUE
function pgEstoque(){
  const sc={disponível:'b-green',indisponível:'b-red',locado:'b-amber',manutenção:'b-purple'};
  const permanentes=DB.equipment.filter(e=>!e.temporary);
  const temporarios=DB.equipment.filter(e=>e.temporary);
  const consumiveis=DB.consumables||[];
  const activeTab=['permanentes','temporarios','consumiveis'].includes(S.tabs.estoque)?S.tabs.estoque:'permanentes';
  const managedCategories=getEquipmentCategories();
  const activeCategory=['todos',...managedCategories].includes(S.tabs.estoqueCategoria)?S.tabs.estoqueCategoria:'todos';
  const activeConsumableCategory=['todos',...getConsumableCategories()].includes(S.tabs.estoqueConsCategoria)?S.tabs.estoqueConsCategoria:'todos';
  S.tabs.estoque=activeTab;
  S.tabs.estoqueCategoria=activeCategory;
  S.tabs.estoqueConsCategoria=activeConsumableCategory;

  if(activeTab==='consumiveis'){
    const totalItens=consumiveis.length;
    const totalUnidades=consumiveis.reduce((a,b)=>a+Math.max(0,Number(b.qtyStock||0)),0);
    const valorEstoque=consumiveis.reduce((a,b)=>a+(Math.max(0,Number(b.qtyStock||0))*Math.max(0,Number(b.unitCost||0))),0);
    const baixoEstoque=consumiveis.filter(c=>Math.max(0,Number(c.qtyStock||0))<=5).length;
    const renderConsumableRows=list=>list.map(c=>{
      const qty=Math.max(0,Number(c.qtyStock||0));
      const unitCost=Math.max(0,Number(c.unitCost||0));
      const rowTotal=qty*unitCost;

      return`<tr>
          <td style="font-weight:500">${esc(c.name)}<div style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap;"><span class="badge ${meta.badge}" style="font-size:9.5px;">${meta.short}</span><span class="badge b-gray" style="font-size:9.5px;">${esc(category)}</span></div></td>
          <td>${esc(c.unit||'unidade')}</td>
          <td style="font-weight:700;color:${qty<=5?'var(--amber)':'var(--green)'};">${qty}</td>
          <td>${fmtVal(unitCost)}</td>
          <td style="font-weight:600;">${fmtVal(rowTotal)}</td>
          <td><div style="display:flex;align-items:center;gap:6px;"><button class="btn btn-ghost btn-sm" onclick="openConsumableEntry(${c.id})">+ Entrada</button><button class="btn btn-ghost btn-sm" onclick="openEditConsumable(${c.id})">✏️</button><button class="btn btn-ghost btn-sm" onclick="deleteConsumable(${c.id})">🗑</button></div></td>
        </tr>`;
    }).join('')||'<tr><td colspan="6"><div class="empty" style="padding:18px 10px;">Nenhum item nesta categoria.</div></td></tr>';
    const groupedConsumableCategories=(activeConsumableCategory==='todos'?getConsumableCategories():[activeConsumableCategory]).filter(cat=>consumiveis.some(c=>normalizeConsumableCategory(c.category,c.name)===cat)||activeConsumableCategory===cat);
    const renderConsumableSections=()=>groupedConsumableCategories.map(category=>{
      const rows=consumiveis.filter(c=>normalizeConsumableCategory(c.category,c.name)===category);
      return `<div><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><span class="badge b-gray">${esc(category)}</span><span style="font-size:11.5px;color:var(--text2);">${rows.length} item(ns)</span></div><div class="tw"><table><tr><th>Item</th><th>Unidade</th><th>Estoque</th><th>Custo Unitário</th><th>Valor em Estoque</th><th>Ações</th></tr>${renderConsumableRows(rows)}</table></div></div>`;
    }).join('')||'<div class="empty" style="padding:18px 10px;">Nenhum consumível nesta categoria.</div>';

    return`
    <div class="grid g4" style="margin-bottom:14px;">
      <div class="stat"><div class="stat-top"><div class="stat-ico" style="background:var(--glow)">🧪</div></div><div class="stat-val">${totalItens}</div><div class="stat-lbl">Tipos de Consumíveis</div></div>
      <div class="stat"><div class="stat-top"><div class="stat-ico" style="background:var(--gbg)">📦</div></div><div class="stat-val" style="color:var(--green)">${totalUnidades}</div><div class="stat-lbl">Unidades em Estoque</div></div>
      <div class="stat"><div class="stat-top"><div class="stat-ico" style="background:var(--abg)">⚠️</div></div><div class="stat-val" style="color:var(--amber)">${baixoEstoque}</div><div class="stat-lbl">Baixo Estoque (≤5)</div></div>

    <div class="card"><div class="card-header"><span class="card-title">Estoque de Consumíveis</span><div class="tabs"><div class="tab${activeTab==='permanentes'?' active':''}" onclick="S.tabs.estoque='permanentes';render()">Permanentes</div><div class="tab${activeTab==='temporarios'?' active':''}" onclick="S.tabs.estoque='temporarios';render()">Terceiros</div><div class="tab${activeTab==='consumiveis'?' active':''}" onclick="S.tabs.estoque='consumiveis';render()">Consumíveis</div></div><button class="btn btn-primary btn-sm" onclick="openM('addConsumable')">+ Adicionar Consumível</button></div>
    <div class="card-body" style="padding-top:12px;display:grid;gap:14px;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-size:11.5px;color:var(--text2);">Categoria:</span>
        <select class="fc" style="width:220px;padding:7px 10px;font-size:12px;" onchange="S.tabs.estoqueConsCategoria=this.value;render()">
          <option value="todos" ${activeConsumableCategory==='todos'?'selected':''}>Todas (${consumiveis.length})</option>
          ${getConsumableCategories().map(cat=>`<option value="${esc(cat)}" ${activeConsumableCategory===cat?'selected':''}>${esc(cat)} (${consumiveis.filter(c=>normalizeConsumableCategory(c.category,c.name)===cat).length})</option>`).join('')}
        </select>
      </div>
      ${renderConsumableSections()}
    </div></div>`;
  }

  const listaBase=activeTab==='temporarios'?temporarios:permanentes;
  const total=DB.equipment.reduce((a,b)=>a+b.qty,0);
  const avail=DB.equipment.reduce((a,b)=>a+b.avail,0);
  const tempLocados=temporarios.filter(e=>e.status==='locado').length;
  const custoTemp=temporarios.filter(e=>e.status==='locado').reduce((a,b)=>a+Number(b.rentalCost||0),0);
  const categoryCounts={todos:listaBase.length};
  managedCategories.forEach(cat=>{
    categoryCounts[cat]=listaBase.filter(eq=>normalizeEquipmentCategory(eq.cat,eq.name)===cat).length;
  });
  const groupedCategories=(activeCategory==='todos'?managedCategories:[activeCategory]).filter(cat=>categoryCounts[cat]>0||activeCategory===cat);
  const getCategoryBadgeClass=category=>category==='Som'?'b-blue':category==='Iluminação'?'b-amber':category==='Estrutura'?'b-purple':category==='Painel de LED'?'b-cyan':category==='Gerador'?'b-red':'b-gray';
  const renderEquipmentRows=(rows,isTemporaryView)=>rows.map(eq=>{
    const occupied=Math.max(0,Number(eq.occupied??(Number(eq.qty||0)-Number(eq.avail||0))));
    const available=Math.max(0,Number(eq.qty||0)-occupied);
    const displayStatus=isTemporaryView
      ?String(eq.status||'disponível')
      :(available>0?'disponível':'indisponível');
    return `<tr>
      <td style="font-weight:500">${esc(eq.name)}</td>

      <td>${esc(eq.imei||'-')}</td>
      <td><span class="badge ${sc[displayStatus]||'b-gray'}">${displayStatus}</span></td>
      <td>${Number(eq.qty||0)}</td>
      <td style="color:var(--green);font-weight:700;">${available}</td>
      ${isTemporaryView?`<td style="font-weight:600;color:var(--amber);">${fmtVal(Number(eq.rentalCost||0))}</td>`:''}
      <td><div style="display:flex;align-items:center;gap:6px;"><button class="btn btn-ghost btn-sm" onclick="openEditEquip(${eq.id})">✏️</button><button class="btn btn-ghost btn-sm" onclick="deleteEquip(${eq.id})">🗑</button></div></td>
    </tr>`;
  }).join('')||`<tr><td colspan="${isTemporaryView?8:7}"><div class="empty" style="padding:18px 10px;">Nenhum equipamento nesta categoria.</div></td></tr>`;
  const renderEquipmentSections=()=>groupedCategories.map(category=>{
    const rows=listaBase.filter(eq=>normalizeEquipmentCategory(eq.cat,eq.name)===category);
    if(activeCategory!=='todos'&&category!==activeCategory)return '';
    return `<div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><span class="badge ${getCategoryBadgeClass(category)}">${category}</span><span style="font-size:11.5px;color:var(--text2);">${rows.length} item(ns)</span></div>
      <div class="tw"><table>
        <tr><th>Equipamento</th><th>Marca</th><th>IMEI</th><th>Status</th><th>Total</th><th>Disponível</th>${activeTab==='temporarios'?'<th>Valor Aluguel</th>':''}<th>Ações</th></tr>
        ${renderEquipmentRows(rows,activeTab==='temporarios')}
      </table></div>
    </div>`;
  }).join('');
  return`
  <div class="grid g4" style="margin-bottom:14px;">
    <div class="stat"><div class="stat-top"><div class="stat-ico" style="background:var(--glow)">📦</div></div><div class="stat-val">${total}</div><div class="stat-lbl">Total Itens</div></div>
    <div class="stat"><div class="stat-top"><div class="stat-ico" style="background:var(--gbg)">✅</div></div><div class="stat-val" style="color:var(--green)">${avail}</div><div class="stat-lbl">Disponível</div></div>

    <div class="stat"><div class="stat-top"><div class="stat-ico" style="background:var(--rbg)">💸</div></div><div class="stat-val" style="color:var(--red)">${fmtVal(custoTemp)}</div><div class="stat-lbl">Custo Locação</div></div>
  </div>
  <div class="card"><div class="card-header"><span class="card-title">Inventário de Equipamentos</span><div class="tabs"><div class="tab${activeTab==='permanentes'?' active':''}" onclick="S.tabs.estoque='permanentes';render()">Permanentes</div><div class="tab${activeTab==='temporarios'?' active':''}" onclick="S.tabs.estoque='temporarios';render()">Terceiros</div><div class="tab${activeTab==='consumiveis'?' active':''}" onclick="S.tabs.estoque='consumiveis';render()">Consumíveis</div></div><div style="display:flex;align-items:center;gap:8px;"><button class="btn btn-ghost btn-sm" onclick="nav('categorias_estoque')">Gerir categorias</button><button class="btn btn-primary btn-sm" onclick="openM('addEquip')">+ Adicionar</button></div></div>
  <div class="card-body" style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <span style="font-size:11.5px;color:var(--text2);">Categoria:</span>
    <select class="fc" style="width:220px;padding:7px 10px;font-size:12px;" onchange="S.tabs.estoqueCategoria=this.value;render()">
      <option value="todos" ${activeCategory==='todos'?'selected':''}>Todas (${categoryCounts.todos})</option>
      ${managedCategories.map(cat=>`<option value="${esc(cat)}" ${activeCategory===cat?'selected':''}>${esc(cat)} (${categoryCounts[cat]||0})</option>`).join('')}
    </select>
  </div>
  <div class="card-body" style="padding-top:12px;display:grid;gap:14px;">${renderEquipmentSections()||`<div class="empty" style="padding:18px 10px;">Nenhum equipamento nesta categoria.</div>`}</div></div>`;
}

function addObjectivePurchase(){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem cadastrar objetivos de compra.'))return false;
  const name=document.getElementById('objItemName')?.value.trim();
  const priority=document.getElementById('objItemPriority')?.value||'media';
  const targetQty=Math.max(1,Number(document.getElementById('objItemQty')?.value||1));
  const notes=document.getElementById('objItemNotes')?.value.trim()||'';

  if(!name){toast('Informe o item desejado.','err');return false;}

  DB.objectivesPurchases.push({
    id:nextId(DB.objectivesPurchases),
    name,
    priority,
    targetQty,
    status:'planejado',
    notes,
    createdAt:new Date().toISOString().slice(0,10),
    boughtAt:'',
    empresa_id:Number(S.companyId||1),
  });

  S.tabs.objCompras='planejado';
  saveDB();
  toast('Objetivo de compra adicionado. 🎯');
  render();
  return true;
}

function updateObjectivePurchasePriority(itemId,newPriority){
  const allowed=['alta','media','baixa'];
  if(!allowed.includes(newPriority))return;
  const item=(DB.objectivesPurchases||[]).find(i=>i.id===Number(itemId));
  if(!item)return;
  item.priority=newPriority;
  saveDB();
  render();
}

function updateObjectivePurchaseStatus(itemId,newStatus){
  if(!requireRole(['admin','manager'],'Apenas admin/manager podem atualizar status de compras.'))return;
  const allowed=['planejado','comprado'];
  if(!allowed.includes(newStatus)){toast('Status inválido.','err');return;}
  const item=(DB.objectivesPurchases||[]).find(i=>i.id===Number(itemId));
  if(!item)return;

  item.status=newStatus;
  if(newStatus==='comprado'){
    item.boughtAt=new Date().toISOString().slice(0,10);
    S.tabs.objCompras='historico';
    toast('Item marcado como comprado e enviado para o histórico. ✅');
  }else{
    item.boughtAt='';
    S.tabs.objCompras='planejado';
    toast('Item retornou para planejamento.');
  }

  saveDB();
  render();
}

function pgCategoriasEstoque(){
  const categories=getEquipmentCategories();
  const counts={};
  categories.forEach(cat=>{counts[cat]=0;});
  (DB.equipment||[]).forEach(eq=>{
    const category=normalizeEquipmentCategory(eq.cat,eq.name);
    counts[category]=(counts[category]||0)+1;
  });
  const usedCategories=categories.filter(cat=>(counts[cat]||0)>0).length;
  const unusedCategories=categories.length-usedCategories;

      <td><div style="display:flex;align-items:center;gap:6px;"><span class="badge ${statusClass[status]||'b-gray'}">${status}</span><select class="fc" style="width:120px;padding:5px 7px;font-size:11.5px;" onchange="updateMaintenanceStatus(${m.id},this.value)"><option value="pendente" ${status==='pendente'?'selected':''}>pendente</option><option value="aprovado" ${status==='aprovado'?'selected':''}>aprovado</option><option value="feito" ${status==='feito'?'selected':''}>feito</option></select></div></td>

// FINANCEIRO
function pgFinanceiro(){
  const generated=ensureRecurringPayables(isoToday());
  if(generated>0)saveDB();

  const rec=(DB.finance.rec||[]).map(r=>normalizeFinanceEntry(r,'rec'));
  const pay=(DB.finance.pay||[]).map(p=>normalizeFinanceEntry(p,'pay'));
  const recurring=(DB.recurringExpenses||[]).map(item=>({
    ...item,
    frequency:normalizeRecurringFrequency(item.frequency),
    status:(item.status||'ativo')==='pausado'?'pausado':'ativo',
  }));
  const recTab=S.tabs.finRec==='recebido'?'recebido':'a_receber';
  const payTab=S.tabs.finPay==='pago'?'pago':'a_pagar';

  const tRecPaid=rec.filter(f=>f.status==='recebido').reduce((a,b)=>a+b.val,0);
  const tRecPend=rec.filter(f=>f.status==='a_receber').reduce((a,b)=>a+b.val,0);
  const tPayPend=pay.filter(f=>f.status==='a_pagar').reduce((a,b)=>a+b.val,0);
  const tPayPaid=pay.filter(f=>f.status==='pago').reduce((a,b)=>a+b.val,0);

  const recRows=rec.filter(f=>f.status===recTab);
  const payRows=pay.filter(f=>f.status===payTab);

  const recurringRows=recurring.map(item=>{
    let nextDue=String(item.due||'').slice(0,10);
    let guard=0;
    const today=isoToday();
    while(nextDue&&nextDue<today&&guard<1000){
      nextDue=getNextRecurringDueDate(nextDue,item.frequency);
      guard+=1;
    }
    const pendingCount=(DB.finance.pay||[]).filter(pay=>
      pay.type==='recurring-pay'&&
      Number(pay.recurringId)===Number(item.id)&&
      pay.status==='a_pagar'
    ).length;
    return `<tr>
      <td style="font-weight:500">${esc(item.name)}</td>
      <td style="font-weight:600;color:var(--red)">${fmtVal(Number(item.val||0))}</td>
      <td>${esc(item.frequency)}</td>
      <td>${fmtDateBR(item.due)}</td>
      <td>${nextDue?fmtDateBR(nextDue):'-'}</td>
      <td><span class="badge ${item.status==='ativo'?'b-green':'b-gray'}">${item.status}</span> <span style="font-size:11px;color:var(--text2);margin-left:6px;">pendentes: ${pendingCount}</span></td>
      <td><div style="display:flex;gap:6px;"><button class="btn btn-ghost btn-sm" onclick="toggleRecurringExpenseStatus(${item.id})">${item.status==='ativo'?'⏸':'▶️'}</button><button class="btn btn-ghost btn-sm" onclick="deleteRecurringExpense(${item.id})">🗑</button></div></td>
    </tr>`;
  }).join('');

  return`
  <div class="grid g4" style="margin-bottom:14px;">
    <div class="stat"><div class="stat-top"><div class="stat-ico" style="background:var(--gbg)">💚</div></div><div class="stat-val" style="color:var(--green)">${fmtVal(tRecPaid)}</div><div class="stat-lbl">Recebido</div></div>
    <div class="stat"><div class="stat-top"><div class="stat-ico" style="background:var(--abg)">⏳</div></div><div class="stat-val" style="color:var(--amber)">${fmtVal(tRecPend)}</div><div class="stat-lbl">A Receber</div></div>
    <div class="stat"><div class="stat-top"><div class="stat-ico" style="background:var(--rbg)">📤</div></div><div class="stat-val" style="color:var(--red)">${fmtVal(tPayPend)}</div><div class="stat-lbl">A Pagar</div></div>
    <div class="stat"><div class="stat-top"><div class="stat-ico" style="background:var(--glow)">📊</div></div><div class="stat-val">${fmtVal(tRecPaid+tRecPend-(tPayPend+tPayPaid))}</div><div class="stat-lbl">Lucro Projetado</div></div>
  </div>
  <div class="grid g2">
    <div class="card"><div class="card-header"><span style="color:var(--green);font-size:16px;">↑</span><span class="card-title">Contas a Receber</span><button class="btn btn-primary btn-sm" onclick="openM('addRec')">+ Novo</button></div>
    <div style="display:flex;gap:8px;padding:12px 14px 0;">
      <button class="btn ${recTab==='a_receber'?'btn-primary':'btn-ghost'} btn-sm" onclick="S.tabs.finRec='a_receber';render()">A Receber</button>
      <button class="btn ${recTab==='recebido'?'btn-primary':'btn-ghost'} btn-sm" onclick="S.tabs.finRec='recebido';render()">Pagamentos Recebidos</button>
    </div>
    <div class="tw"><table><tr><th>Descrição</th><th>Valor</th><th>Vencimento</th><th>Status</th></tr>
    ${recRows.length?recRows.map(f=>{
      const due=f.data_vencimento||f.due||'';
      return`<tr><td>${f.desc}</td><td style="font-weight:600;color:var(--green)">${fmtVal(f.val)}</td><td><input type="date" class="fc" style="width:148px;padding:5px 7px;font-size:11.5px;" value="${due}" onchange="updateRecDue(${f.id},this.value)"></td><td><div style="display:flex;align-items:center;gap:6px;"><span class="badge ${f.status==='recebido'?'b-green':'b-amber'}">${f.status}</span><select class="fc" style="width:118px;padding:5px 7px;font-size:11.5px;" onchange="updateRecStatus(${f.id},this.value)"><option value="a_receber" ${f.status==='a_receber'?'selected':''}>a_receber</option><option value="recebido" ${f.status==='recebido'?'selected':''}>recebido</option></select></div></td></tr>`;
    }).join(''):`<tr><td colspan="4" style="color:var(--text2);text-align:center;padding:18px;">Sem registros nesta aba.</td></tr>`}
    </table></div></div>
    <div class="card"><div class="card-header"><span style="color:var(--red);font-size:16px;">↓</span><span class="card-title">Contas a Pagar</span><button class="btn btn-primary btn-sm" onclick="openM('addPay')">+ Novo</button></div>
    <div style="display:flex;gap:8px;padding:12px 14px 0;">
      <button class="btn ${payTab==='a_pagar'?'btn-primary':'btn-ghost'} btn-sm" onclick="S.tabs.finPay='a_pagar';render()">A Pagar</button>
      <button class="btn ${payTab==='pago'?'btn-primary':'btn-ghost'} btn-sm" onclick="S.tabs.finPay='pago';render()">Pagos</button>
    </div>
    <div class="tw"><table><tr><th>Descrição</th><th>Valor</th><th>Vencimento</th><th>Status</th></tr>
    ${payRows.length?payRows.map(f=>{
      const due=f.data_vencimento||f.due||'';
      return`<tr><td>${f.desc}</td><td style="font-weight:600;color:var(--red)">${fmtVal(f.val)}</td><td><input type="date" class="fc" style="width:148px;padding:5px 7px;font-size:11.5px;" value="${due}" onchange="updatePayDue(${f.id},this.value)"></td><td><div style="display:flex;align-items:center;gap:6px;"><span class="badge ${f.status==='pago'?'b-green':'b-red'}">${f.status}</span><select class="fc" style="width:110px;padding:5px 7px;font-size:11.5px;" onchange="updatePayStatus(${f.id},this.value)"><option value="a_pagar" ${f.status==='a_pagar'?'selected':''}>a_pagar</option><option value="pago" ${f.status==='pago'?'selected':''}>pago</option></select></div></td></tr>`;
    }).join(''):`<tr><td colspan="4" style="color:var(--text2);text-align:center;padding:18px;">Sem registros nesta aba.</td></tr>`}
    </table></div></div>
  </div>
  <div class="card" style="margin-top:14px;"><div class="card-header"><span style="font-size:15px;">💳</span><span class="card-title">Formas de Pagamento / Recebimento</span><button class="btn btn-primary btn-sm" onclick="openM('addPaymentMethod')">+ Nova Forma</button></div>
  <div class="tw"><table><tr><th>Nome</th><th>Descrição</th><th>Ações</th></tr>
  ${DB.paymentMethods.map(pm=>`<tr>
    <td style="font-weight:500">${esc(pm.name)}</td>
    <td style="color:var(--text2);font-size:12px;">${esc(pm.description)}</td>
    <td><button class="btn btn-ghost btn-sm" onclick="deletePaymentMethod(${pm.id})" title="Remover">🗑</button></td>
  </tr>`).join('')}
  </table></div></div>
  <div class="card" style="margin-top:14px;"><div class="card-header"><span style="font-size:15px;">🔁</span><span class="card-title">Despesas Recorrentes</span><button class="btn btn-primary btn-sm" onclick="openM('addRecurringExpense')">+ Nova Recorrente</button></div>
  <div class="tw"><table><tr><th>Nome</th><th>Valor</th><th>Frequência</th><th>Vencimento Base</th><th>Próx. Geração</th><th>Status</th><th>Ações</th></tr>
  ${recurringRows||'<tr><td colspan="7" style="color:var(--text2);text-align:center;padding:18px;">Nenhuma despesa recorrente cadastrada.</td></tr>'}
  </table></div></div>`;
}

function pgResultadosEvento(){
  if(!isCompanyOwner())return '<div class="card"><div class="card-body" style="padding:24px;"><div class="empty"><div class="empty-ico">🔒</div><div>Somente o dono da empresa pode visualizar resultados por evento.</div></div></div></div>';

  const selectedEventId=Number(S.resultEventId||0);
  const allRows=getEventProfitabilityRows();

  const selectedEvent=selectedEventId?(DB.events||[]).find(ev=>Number(ev.id)===selectedEventId):null;
  const selectedRow=selectedEventId?allRows.find(row=>Number(row.event.id)===selectedEventId):null;
  const selectedCostRows=selectedEvent?getEventCostDetailRows(selectedEvent):[];

      <div class="stat"><div class="stat-val" style="color:${Number(selectedRow?.projectedProfit||0)>=0?'var(--green)':'var(--red)'};">${fmtVal(selectedRow?.projectedProfit||0)}</div><div class="stat-lbl">Lucro</div></div>

    </div>

      <div class="card" style="margin:0;"><div class="card-header"><span class="card-title">Todos os Custos do Evento</span><span style="font-size:11px;color:var(--text2);">Inclui vinculados no financeiro e consumíveis planejados</span></div><div class="card-body" style="padding-top:8px;display:grid;gap:8px;max-height:420px;overflow:auto;">
        ${selectedCostRows.length?selectedCostRows.map(cost=>`<div style="border:1px solid var(--border);border-radius:10px;padding:10px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;"><div style="min-width:0;flex:1;"><div style="font-weight:600;">${esc(cost.label)}</div><div style="font-size:11px;color:var(--text2);margin-top:4px;display:flex;gap:6px;flex-wrap:wrap;"><span class="badge b-gray">${esc(cost.typeLabel)}</span><span>${cost.due?fmtDateBR(cost.due):'Sem vencimento'}</span></div></div><div style="text-align:right;flex-shrink:0;"><div style="font-weight:700;color:var(--red);">${fmtVal(cost.amount)}</div><div style="margin-top:4px;"><span class="badge ${cost.badge}">${esc(cost.status)}</span></div></div></div>`).join(''):'<div class="empty" style="padding:18px 12px;"><div class="empty-ico">💸</div><div>Nenhum custo registrado para este evento.</div></div>'}

    return `<tr onclick="openResultEventCosts(${row.event.id})" style="cursor:pointer;">

      <td><div style="font-weight:700;color:${row.projectedProfit>=0?'var(--green)':'var(--red)'};">${fmtVal(row.projectedProfit)}</div><div style="font-size:11px;color:var(--text2);">Realizado: ${fmtVal(row.realizedProfit)}</div></td>

async function addSystemUser(){
  const role=currentRole();
  if(role!=='admin'&&role!=='manager'){toast('Sem permissão para criar usuários.','err');return;}
  const compId=Number(S.companyId||1);
  const employees=(DB_ALL?.users||[]).filter(u=>Number(u.empresa_id)===compId&&roleNorm(u.role)!=='admin');
  if(employees.length>=3){toast('Limite de usuários atingido para o plano atual.','err');return;}

  const nome=(document.getElementById('suNome')?.value||'').trim();
  const email=(document.getElementById('suEmail')?.value||'').trim().toLowerCase();
  const senha=(document.getElementById('suSenha')?.value||'').trim();
  const senha2=(document.getElementById('suSenha2')?.value||'').trim();
  const selectedRole=(document.getElementById('suRole')?.value||'employee');
  // Gerente só pode criar funcionário
  const role2=currentRole();
  const finalRole=(role2==='manager'&&selectedRole==='manager')?'employee':selectedRole;

  if(!nome){toast('Informe o nome do usuário.','err');return;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('Informe um email válido.','err');return;}
  const passwordValidation=validatePasswordPolicy(senha,senha2);
  if(!passwordValidation.ok){toast(passwordValidation.message,'err');return;}
  if((DB_ALL?.users||[]).some(u=>String(u.email).toLowerCase()===email)){
    toast('Este email já está em uso.','err');return;
  }

  if(window.EventProSupabase?.createManagedUser){
    const remoteSignup=await window.EventProSupabase.createManagedUser(email,senha,{ full_name:nome, role:roleNorm(finalRole), company_id:compId });
    if(remoteSignup?.error){
      console.error('Falha ao criar usuário no Supabase:',remoteSignup.error);
      toast('Não foi possível criar o login no Supabase. Verifique Auth e tente novamente.','err');
      return;
    }
  }

  const pwdHash=await hashPassword(senha);
  const newId=nextId(DB_ALL.users||[{id:0}]);
  const newUser={id:newId,name:nome,email,role:roleNorm(finalRole),empresa_id:compId,initials:initialsFromName(nome),passwordHash:pwdHash,mustResetPassword:true};
  DB_ALL.users.push(newUser);
  document.getElementById('sysUserModal')?.remove();
  toast(`Usuário ${nome.split(' ')[0]} criado com sucesso! 👤`,'ok');
  saveDB(); // persiste localmente e sincroniza com a nuvem
  render();
}

function removeSystemUser(userId){
  if(!requireRole(['admin'],'Apenas administradores podem remover usuários.'))return;
  if(Number(userId)===Number(S.currentUser?.id)){toast('Não é possível remover sua própria conta.','err');return;}
  const user=(DB_ALL?.users||[]).find(u=>Number(u.id)===Number(userId));
  if(!user){toast('Usuário não encontrado.','err');return;}
  if(roleNorm(user.role)==='admin'){toast('Não é possível remover um administrador.','err');return;}
  if(!confirm(`Remover usuário "${user.name}"? Esta ação não pode ser desfeita.`))return;
  DB_ALL.users=DB_ALL.users.filter(u=>Number(u.id)!==Number(userId));
  toast(`Usuário ${user.name.split(' ')[0]} removido.`,'ok');
  saveDB();
  render();
}

// NPS
function pgNPS(){
  const avg=(DB.nps.reduce((a,b)=>a+b.score,0)/DB.nps.length).toFixed(1);
  const prom=DB.nps.filter(n=>n.score>=9).length;
  const det=DB.nps.filter(n=>n.score<=6).length;
  const npsS=Math.round(((prom-det)/DB.nps.length)*100);
  return`
  <div class="grid g4" style="margin-bottom:14px;">
    <div class="stat"><div class="stat-val" style="color:var(--green)">${avg}</div><div class="stat-lbl">Nota Média</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--accent2)">${npsS}</div><div class="stat-lbl">Score NPS</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--green)">${prom}</div><div class="stat-lbl">Promotores (9-10)</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--red)">${det}</div><div class="stat-lbl">Detratores (0-6)</div></div>
  </div>
  <div class="grid g2">
    <div class="card"><div class="card-header"><span class="card-title">Avaliações Recentes</span></div>
    <div class="card-body" style="padding-top:6px;">
      ${DB.nps.map(n=>`<div class="li"><div class="li-ico" style="background:var(--glow)">⭐</div>
        <div style="flex:1;min-width:0;">
          <div class="li-title">${n.client}</div>
          <div class="li-sub">${n.event}</div>
          ${n.feedback?`<div style="font-size:11px;color:var(--text2);margin-top:2px;font-style:italic;">"${n.feedback}"</div>`:''}
        </div>
        <div style="text-align:center;"><div style="font-family:var(--fh);font-size:20px;font-weight:700;color:${n.score>=9?'var(--green)':n.score>=7?'var(--amber)':'var(--red)'};">${n.score}</div><div style="font-size:10px;color:var(--text3)">/10</div></div>
      </div>`).join('')}
    </div></div>
    <div class="card"><div class="card-header"><span class="card-title">Enviar Nova Avaliação</span></div>
    <div class="card-body">
      <div class="fg"><label class="fl">Cliente</label><select class="fc">${DB.clients.map(c=>`<option>${c.name}</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">Evento</label><select class="fc">${DB.events.map(e=>`<option>${e.name}</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">Nota (0–10)</label>
        <div class="nps-row">${Array.from({length:11},(_,i)=>`<div class="nps-d${S.nps===i?' sel':''}" onclick="S.nps=${i};render()">${i}</div>`).join('')}</div>
      </div>
      <div class="fg"><label class="fl">Comentário</label><textarea class="fc" placeholder="Como foi a sua experiência?"></textarea></div>
      <button class="btn btn-primary" onclick="toast('Avaliação enviada ao cliente! 📨');S.nps=null;render()">Enviar Avaliação</button>
    </div></div>
  </div>`;
}

    <div class="fg"><label class="fl">Tipo</label><select id="addTaskType" class="fc" onchange="onAddTaskTypeChange()"><option value="operacional" ${isOperational?'selected':''}>Operacional</option><option value="saida" ${isOperational?'':'selected'}>Saída</option><option value="montagem">Montagem</option><option value="desmontagem">Desmontagem</option><option value="entrega">Entrega</option></select></div>
    <div class="fg"><label class="fl">Vínculo</label><select id="addTaskLinkKind" class="fc" onchange="onAddTaskLinkKindChange()">${isOperational?'<option value="none">Manual</option><option value="maintenance">Vincular manutenção</option>':'<option value="none">Manual</option><option value="stock">Vincular item do estoque</option>'}</select></div>
    <div id="addTaskStockWrap" class="fg" style="display:none;"><label class="fl">Item do Estoque</label><select id="addTaskStock" class="fc"><option value="">Selecione...</option><optgroup label="Equipamentos Permanentes">${DB.equipment.map(eq=>`<option value="equipment:${eq.id}">${esc(eq.name)} · ${esc(formatEquipmentIdentity(eq).label)}</option>`).join('')}</optgroup><optgroup label="Consumíveis">${DB.consumables.map(item=>`<option value="consumable:${item.id}">${esc(item.name)} · ${esc(normalizeConsumableCategory(item.category,item.name))}</option>`).join('')}</optgroup></select></div>
    <div id="addTaskQtyWrap" class="fg" style="display:none;"><label class="fl">Quantidade vinculada</label><input id="addTaskQty" type="number" min="1" step="1" class="fc" value="1"></div>
    <div id="addTaskMaintenanceWrap" class="fg" style="display:none;"><label class="fl">Manutenção</label><select id="addTaskMaintenance" class="fc"><option value="">Selecione...</option>${pendingMaintenance.map(item=>{const eq=DB.equipment.find(e=>Number(e.id)===Number(item.equipId));return `<option value="${item.id}">${esc(eq?.name||'Equipamento')} · ${esc(item.service||'Serviço')} · ${esc(item.status||'pendente')}</option>`;}).join('')}</select></div>
    <p id="addTaskLinkHelp" style="font-size:10.5px;color:var(--text3);margin-top:6px;">A tarefa será criada manualmente no tipo selecionado.</p>
    `;
  },
    ok:addTaskHandler},
  addClient:{title:'+ Novo Cliente',body:`
    <div class="fg"><label class="fl">Tipo</label><select id="clientType" class="fc" onchange="onClientTypeChange()"><option value="PF">Pessoa Física (PF)</option><option value="PJ">Pessoa Jurídica (PJ)</option></select></div>

    <div class="fg"><label id="clientDocLabel" class="fl">CPF</label><input id="clientDoc" class="fc" placeholder="Digite CPF ou CNPJ"></div>
    <div id="clientBirthWrap" class="fg"><label class="fl">Data de Nascimento (PF)</label><input id="clientBirth" type="date" class="fc" required></div>

    <div class="fg"><label class="fl">Telefone / WhatsApp</label><input id="clientPhone" class="fc" placeholder="(11) 99999-9999"></div>
    <div class="fg"><label class="fl">Endereço (Opcional)</label><input id="clientAddress" class="fc" placeholder="Rua, número, bairro, cidade/UF"></div>
    <div class="fg" style="margin-top:10px;"><label style="display:flex;gap:8px;align-items:flex-start;font-size:11.5px;color:var(--text2);cursor:pointer;"><input id="clientLgpdConsent" type="checkbox" style="margin-top:2px;"> Declaro que possuo consentimento para tratamento dos dados pessoais conforme LGPD (Lei 13.709/2018), para finalidades de orçamento, contrato e operação do evento.</label></div>
    <p style="font-size:10.5px;color:var(--text3);line-height:1.5;">Privacidade: CPF/CNPJ e data de nascimento são exibidos de forma mascarada na listagem para reduzir exposição.</p>`,

  editClient:{
    title:'Editar Cliente',

      const c=DB.clients.find(i=>i.id===Number(S.editClientId));
      if(!c)return '<div class="empty"><div class="empty-ico">⚠️</div><div>Cliente não encontrado.</div></div>';

      <div class="fg"><label class="fl">Nome / Empresa</label><input id="editClientName" class="fc" value="${esc(c.name||'')}" placeholder="Razão social ou nome completo"></div>
      <div class="fg"><label id="editClientDocLabel" class="fl">CPF</label><input id="editClientDoc" class="fc" value="${esc(c.doc||'')}" placeholder="Digite CPF ou CNPJ"></div>
